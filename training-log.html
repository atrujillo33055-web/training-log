<style>
  :root {
    --bg: #0b0d12;
    --card: #14171f;
    --card-hi: #191d27;
    --line: #262b36;
    --text: #f2f3f5;
    --sub: #8a90a0;
    --push: #2f6fd1;
    --pull: #22945a;
    --legs: #c1531f;
    --gold: #e8b84b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
    padding-bottom: 40px;
  }
  header {
    padding: 22px 18px 14px;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-size: 20px;
    font-weight: 800;
    margin: 0 0 2px;
    letter-spacing: -0.02em;
  }
  header p {
    margin: 0;
    color: var(--sub);
    font-size: 12.5px;
  }
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 14px 18px 0;
  }
  .tab {
    padding: 10px 6px;
    border-radius: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    background: var(--card);
    color: var(--sub);
    border: 1px solid var(--line);
    cursor: pointer;
  }
  .tab.active[data-type="push"] { background: var(--push); color: white; border-color: var(--push); }
  .tab.active[data-type="pull"] { background: var(--pull); color: white; border-color: var(--pull); }
  .tab.active[data-type="legs"] { background: var(--legs); color: white; border-color: var(--legs); }
  .sub {
    color: var(--sub);
    font-weight: 500;
    font-size: 10.5px;
    display: block;
    margin-top: 1px;
  }
  main { padding: 16px 18px 0; }
  .exercise {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .ex-head {
    padding: 14px 14px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    cursor: pointer;
  }
  .ex-name { font-size: 14.5px; font-weight: 700; }
  .ex-hint { color: var(--sub); font-size: 11px; margin-top: 2px; }
  .pr {
    font-size: 12px;
    font-weight: 800;
    color: var(--gold);
    white-space: nowrap;
    margin-left: 10px;
  }
  .pr span { color: var(--sub); font-weight: 500; font-size: 10px; display: block; text-align: right; }
  .history {
    padding: 0 14px 10px;
    color: var(--sub);
    font-size: 11.5px;
    line-height: 1.6;
  }
  .logrow {
    display: flex;
    gap: 8px;
    padding: 10px 14px 14px;
    border-top: 1px solid var(--line);
  }
  .logrow input {
    background: var(--card-hi);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 8px;
    font-size: 14px;
    width: 100%;
    text-align: center;
  }
  .logrow input::placeholder { color: #565c6b; }
  .logrow button {
    background: var(--text);
    color: #0b0d12;
    border: none;
    border-radius: 8px;
    font-weight: 800;
    font-size: 13px;
    padding: 0 16px;
    white-space: nowrap;
  }
  .expand {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease;
  }
  .expand.open { max-height: 400px; overflow-y: auto; }
  .entry-row {
    display: flex;
    justify-content: space-between;
    padding: 8px 14px;
    border-top: 1px solid var(--line);
    font-size: 12.5px;

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #14171f;
    padding: 10px 18px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;

  .toast.show { opacity: 1; }
  .empty { color: var(--sub); font-size: 12.5px; text-align: center; padding: 30px 0; }
  .loading { color: var(--sub); font-size: 13px; text-align: center; padding: 40px 0; }

    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;

  .pep-top {

    justify-content: space-between;
    align-items: flex-start;
  }
  .pep-name {
    font-size: 15px;
    font-weight: 800;
  }
  .pep-sub {
    color: var(--sub);
    font-size: 11.5px;
    margin-top: 2px;

  .pill {

    font-weight: 800;

    white-space: nowrap;

  .pill.due { background: #1d3a24; color: #4fd97a; }
  .pill.off { background: #2a2d38; color: var(--sub); }
  .pill.done { background: #2a2d38; color: var(--sub); }
  .pill.taken { background: #33301a; color: var(--gold); }
  .pep-actions {

    gap: 8px;
    align-items: center;
  }
  .pep-btn {
    flex: 1;

    border: none;
    border-radius: 8px;
    font-weight: 800;
    font-size: 13px;
    padding: 10px;

  .pep-btn.done-btn {
    background: var(--card-hi);
    color: var(--sub);
    border: 1px solid var(--line);
  }
  .dots {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-top: 12px;
  }
  .dot {
    aspect-ratio: 1;
    border-radius: 6px;
    background: var(--card-hi);
    border: 1px solid var(--line);
  }
  .dot.taken { background: #22945a; border-color: #22945a; }
  .dot.partial {
    background: linear-gradient(90deg, #22945a 50%, var(--card-hi) 50%);
    border-color: var(--line);
  }
  .dot.na {
    background: repeating-linear-gradient(135deg, var(--card-hi), var(--card-hi) 3px, #1b1e26 3px, #1b1e26 6px);
    border: 1px dashed var(--line);
  }
  .day-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-bottom: 6px;
  }
  .day-header-row div {
    text-align: center;
    font-size: 10.5px;
    font-weight: 800;
    color: var(--sub);
    text-transform: uppercase;
  }

  .chart-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 16px;
  }
  .chart-stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .chart-stat-label { color: var(--sub); font-size: 10.5px; font-weight: 700; text-transform: uppercase; }
  .chart-stat-val { font-size: 20px; font-weight: 800; margin-top: 2px; }
</style>

const WORKOUT_CONFIG_KEY = "ale-workout-config-v1";
const REGISTRY_KEY = "ale-exercise-registry-v1";

// activeDays: what's actually shown/loggable today, editable per day.
// registry: every exercise name ever active for a given type, never shrinks,
// so swapping an exercise out never hides its history.
let activeDays = {};
let registry = { push: [], pull: [], legs: [] };

function loadWorkoutConfig() {
  activeDays = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  try {
    const overrides = JSON.parse(localStorage.getItem(WORKOUT_CONFIG_KEY) || "{}");
    Object.keys(overrides).forEach(day => {
      if (activeDays[day] && Array.isArray(overrides[day])) {
        activeDays[day].exercises = overrides[day];
      }
    });
  } catch (e) {}

  try {
    const stored = JSON.parse(localStorage.getItem(REGISTRY_KEY) || "null");
    registry = stored || { push: [], pull: [], legs: [] };
  } catch (e) {
    registry = { push: [], pull: [], legs: [] };
  }
  ["push", "pull", "legs"].forEach(type => {
    if (!registry[type]) registry[type] = [];
    Object.values(DEFAULT_DAYS).filter(d => d.type === type).forEach(d => {
      d.exercises.forEach(ex => { if (!registry[type].includes(ex)) registry[type].push(ex); });
    });
    Object.values(activeDays).filter(d => d.type === type).forEach(d => {
      d.exercises.forEach(ex => { if (!registry[type].includes(ex)) registry[type].push(ex); });
    });
  });
  saveRegistry();
}

function saveWorkoutConfig() {
  const overrides = {};
  Object.keys(activeDays).forEach(day => { overrides[day] = activeDays[day].exercises; });
  localStorage.setItem(WORKOUT_CONFIG_KEY, JSON.stringify(overrides));
}

function saveRegistry() {
  localStorage.setItem(REGISTRY_KEY, JSON.stringify(registry));
}

        <button id="confirmOkBtn" style="flex:1; background:var(--legs); color:white; border:none; border-radius:8px; padding:12px; font-weight:800; font-size:13.5px;">${confirmLabel}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector("#confirmCancelBtn").onclick = () => overlay.remove();
  overlay.querySelector("#confirmOkBtn").onclick = () => {
    overlay.remove();
    onConfirm();
  };
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}

function nowTimeStr() {
  const d = new Date();
  const h = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  return h + ":" + min;
}

function updateClock() {
  const el = document.getElementById("clocklabel");
  if (!el) return;
  const now = new Date();
  el.textContent = now.toLocaleString("en-US", { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit", timeZoneName: "short" });
}

async function loadLogs() {
  try {
    const value = localStorage.getItem(STORAGE_KEY);
    if (value) {
      logs = JSON.parse(value);
    } else {
      // Fresh install: seed with the corrected training history.
      logs = JSON.parse(JSON.stringify(DEFAULT_LOGS));
      await saveLogs();
    }
  } catch (e) {
    logs = [];
  }

  // One-time patch: fix the entries that were mis-dated by the old UTC bug,
  // wherever this data actually lives (won't touch anything logged since).
  if (!localStorage.getItem(FIX_FLAG_KEY)) {
    let changed = false;
    logs.forEach(l => {
      if (FIX_IDS.has(l.id) && l.date === "2026-07-08") {
        l.date = "2026-07-07";
        changed = true;
      }
    });
    if (changed) await saveLogs();
    localStorage.setItem(FIX_FLAG_KEY, "1");
  }

  storageReady = true;
  render();
}

async function saveLogs() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
  } catch (e) {
    showToast("Save failed, try again");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1400);
}

function getExerciseLogs(name) {
  return logs.filter(l => l.exercise === name).sort((a, b) => b.date.localeCompare(a.date));
}

function getPR(name) {
  const entries = getExerciseLogs(name);
  if (!entries.length) return null;
  return entries.reduce((max, e) => e.weight > max.weight ? e : max, entries[0]);
}

const PEPTIDES = [
  { id: "ghk", name: "GHK-Cu", dose: "6 units", start: "2026-07-02", pattern: "daily-finite", cycleDays: 50, color: "#c1531f" },
  { id: "reta", name: "Retatrutide", dose: "10 units, 1mg", start: "2026-07-01", pattern: "weekly", color: "#2f6fd1" },
  { id: "tesa", name: "Tesamorelin", dose: "20 units, PM", start: "2026-07-03", pattern: "5on2off", color: "#22945a" },
  { id: "ipam", name: "Ipamorelin", dose: "5 units AM + 5 PM", start: "2026-07-03", pattern: "daily", twiceDaily: true, color: "#e8b84b" },
];
const PEPTIDE_KEY = "ale-peptide-log-v1";
let peptideLog = { taken: {}, times: {} }; // taken: { [id]: [dateStr, ...] }, times: { [id]: { [key]: "HH:MM" } }

function parseUTC(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return Date.UTC(y, m - 1, d);
}
function dayDiff(startStr, dateStr) {
  return Math.round((parseUTC(dateStr) - parseUTC(startStr)) / 86400000);
}
function addDays(dateStr, n) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + n);
  return dt.toISOString().slice(0, 10);
}
function mondayOffset(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const wd = new Date(Date.UTC(y, m - 1, d)).getUTCDay(); // Sun=0..Sat=6
  return (wd + 6) % 7; // Mon=0..Sun=6
}
function buildGridDates(weeks) {
  const today = todayStr();
  const mondayThisWeek = addDays(today, -mondayOffset(today));
  const gridStart = addDays(mondayThisWeek, -7 * (weeks - 1));
  const dates = [];
  for (let i = 0; i < weeks * 7; i++) dates.push(addDays(gridStart, i));
  return dates;
}
function renderDayHeader() {
  const row = document.getElementById("dayHeaderRow");
  row.innerHTML = ["M", "T", "W", "T", "F", "S", "S"].map(l => `<div>${l}</div>`).join("");
}

function getPeptideStatus(p, dateStr) {
  const diff = dayDiff(p.start, dateStr);
  if (diff < 0) return { state: "not-started" };
  if (p.pattern === "daily") return { state: "due", dayNum: diff + 1 };
  if (p.pattern === "daily-finite") {
    if (diff >= p.cycleDays) return { state: "complete", dayNum: p.cycleDays };
    return { state: "due", dayNum: diff + 1, totalDays: p.cycleDays };
  }
  if (p.pattern === "weekly") {
    const dayNum = Math.floor(diff / 7) + 1;
    if (diff % 7 === 0) return { state: "due", dayNum };
    return { state: "off", dayNum, daysUntil: 7 - (diff % 7) };
  }
  if (p.pattern === "5on2off") {
    const cyclePos = diff % 7;
    const cycleNum = Math.floor(diff / 7) + 1;
    if (cyclePos < 5) return { state: "due", dayNum: cyclePos + 1, cycleNum, onOff: "on" };
    return { state: "off", dayNum: cyclePos - 4, cycleNum, onOff: "off" };
  }
  return { state: "due" };
}

async function loadPeptideLog() {
  try {
    const value = localStorage.getItem(PEPTIDE_KEY);
    if (value) {
      peptideLog = JSON.parse(value);
    } else {

      await savePeptideLog();
    }
  } catch (e) {
    peptideLog = { taken: {}, times: {} };
  }
  if (!peptideLog.taken) peptideLog.taken = {};
  if (!peptideLog.times) peptideLog.times = {};
}
async function savePeptideLog() {
  try {
    localStorage.setItem(PEPTIDE_KEY, JSON.stringify(peptideLog));
  } catch (e) {
    showToast("Save failed, try again");
  }
}

function renderPeptideView() {
  renderDayHeader();
  const dateInput = document.getElementById("peptideDate");
  if (!dateInput.value) dateInput.value = todayStr();
  dateInput.onchange = () => renderPeptideView();
  const today = dateInput.value;
  const wrap = document.getElementById("peptideCards");
  wrap.innerHTML = "";

  PEPTIDES.forEach(p => {
    const status = getPeptideStatus(p, today);
    const takenAM = p.twiceDaily ? (peptideLog.taken[p.id] || []).includes(today + "_AM") : false;
    const takenPM = p.twiceDaily ? (peptideLog.taken[p.id] || []).includes(today + "_PM") : false;
    const takenToday = p.twiceDaily ? (takenAM && takenPM) : (peptideLog.taken[p.id] || []).includes(today);

    const card = document.createElement("div");
    card.className = "pep-card";

    let pillHtml = "";
    let subText = "";
    if (status.state === "not-started") {
      pillHtml = `<span class="pill off">Not started</span>`;
      subText = `Starts ${p.start}`;
    } else if (status.state === "complete") {
      pillHtml = `<span class="pill done">Cycle complete</span>`;
      subText = `Finished day ${status.dayNum} of ${p.cycleDays}`;
    } else if (status.state === "off") {
      pillHtml = `<span class="pill off">Off today</span>`;
      subText = p.pattern === "5on2off"
        ? `Off day ${status.dayNum} of 2 &middot; cycle ${status.cycleNum}`
        : `Next dose in ${status.daysUntil} day${status.daysUntil === 1 ? "" : "s"}`;
    } else if (p.twiceDaily) {
      const amTime = (peptideLog.times[p.id] || {})[today + "_AM"];
      const pmTime = (peptideLog.times[p.id] || {})[today + "_PM"];
      pillHtml = takenToday
        ? `<span class="pill taken">Both doses taken</span>`
        : (takenAM || takenPM)
          ? `<span class="pill taken">1 of 2 taken</span>`
          : `<span class="pill due">Due today</span>`;
      const timeBits = [];
      if (takenAM) timeBits.push("AM" + (amTime ? " " + amTime : ""));
      if (takenPM) timeBits.push("PM" + (pmTime ? " " + pmTime : ""));
      subText = `Day ${status.dayNum}` + (timeBits.length ? ` &middot; ${timeBits.join(", ")}` : "");
    } else if (takenToday) {
      const takenTime = (peptideLog.times[p.id] || {})[today];
      pillHtml = `<span class="pill taken">Taken today${takenTime ? " &middot; " + takenTime : ""}</span>`;
      subText = p.pattern === "daily-finite" ? `Day ${status.dayNum} of ${p.cycleDays}`
        : p.pattern === "5on2off" ? `On day ${status.dayNum} of 5 &middot; cycle ${status.cycleNum}`
        : p.pattern === "weekly" ? `Week ${status.dayNum}`
        : `Day ${status.dayNum}`;
    } else {
      pillHtml = `<span class="pill due">Due today</span>`;
      subText = p.pattern === "daily-finite" ? `Day ${status.dayNum} of ${p.cycleDays}`
        : p.pattern === "5on2off" ? `On day ${status.dayNum} of 5 &middot; cycle ${status.cycleNum}`
        : p.pattern === "weekly" ? `Week ${status.dayNum}`
        : `Day ${status.dayNum}`;
    }

    card.innerHTML = `
      <div class="pep-top">
        <div>
          <div class="pep-name" style="color:${p.color}">${p.name}</div>
          <div class="pep-sub">${p.dose} &middot; ${subText}</div>
        </div>
        ${pillHtml}
      </div>
    `;

    if (status.state === "due" && p.twiceDaily) {
      const actions = document.createElement("div");
      actions.className = "pep-actions";
      actions.style.flexWrap = "wrap";
      actions.innerHTML = `
        <input type="time" class="pep-time-input" value="${nowTimeStr()}" style="flex:1; min-width:110px; background: var(--card-hi); border: 1px solid var(--line); border-radius: 8px; color: var(--text); padding: 9px 8px; font-size: 13px;">
        <button class="pep-btn ${takenAM ? 'done-btn' : ''}" data-slot="AM">${takenAM ? 'AM done' : 'Mark AM'}</button>
        <button class="pep-btn ${takenPM ? 'done-btn' : ''}" data-slot="PM">${takenPM ? 'PM done' : 'Mark PM'}</button>
      `;
      const timeInput = actions.querySelector(".pep-time-input");
      actions.querySelectorAll("button").forEach(btn => {
        btn.onclick = async () => {
          const key = today + "_" + btn.dataset.slot;
          if (!peptideLog.taken[p.id]) peptideLog.taken[p.id] = [];
          if (!peptideLog.times[p.id]) peptideLog.times[p.id] = {};
          const idx = peptideLog.taken[p.id].indexOf(key);
          if (idx >= 0) {
            peptideLog.taken[p.id].splice(idx, 1);
            delete peptideLog.times[p.id][key];
          } else {
            peptideLog.taken[p.id].push(key);
            peptideLog.times[p.id][key] = timeInput.value || nowTimeStr();
          }
          await savePeptideLog();
          renderPeptideView();
        };
      });
      card.appendChild(actions);
    } else if (status.state === "due" || status.state === "off") {
      const actions = document.createElement("div");
      actions.className = "pep-actions";
      actions.style.flexWrap = "wrap";
      const canToggle = status.state === "due";
      actions.innerHTML = `
        ${canToggle ? `<input type="time" class="pep-time-input" value="${nowTimeStr()}" style="flex:1; min-width:110px; background: var(--card-hi); border: 1px solid var(--line); border-radius: 8px; color: var(--text); padding: 9px 8px; font-size: 13px;">` : ''}
        <button class="pep-btn ${takenToday ? 'done-btn' : ''}" ${canToggle ? '' : 'disabled style="opacity:0.4"'}>${takenToday ? 'Mark not taken' : 'Mark taken'}</button>
      `;
      if (canToggle) {
        const timeInput = actions.querySelector(".pep-time-input");
        actions.querySelector("button").onclick = async () => {
          if (!peptideLog.taken[p.id]) peptideLog.taken[p.id] = [];
          if (!peptideLog.times[p.id]) peptideLog.times[p.id] = {};
          const idx = peptideLog.taken[p.id].indexOf(today);
          if (idx >= 0) {
            peptideLog.taken[p.id].splice(idx, 1);
            delete peptideLog.times[p.id][today];
          } else {
            peptideLog.taken[p.id].push(today);
            peptideLog.times[p.id][today] = timeInput.value || nowTimeStr();
          }
          await savePeptideLog();
          renderPeptideView();
        };
      }
      card.appendChild(actions);
    }

    const dotsWrap = document.createElement("div");
    dotsWrap.className = "dots";
    const gridDates = buildGridDates(3);
    gridDates.forEach(d => {
      const dStatus = getPeptideStatus(p, d);
      const dot = document.createElement("div");
      let cls = "dot";
      if (dStatus.state !== "due") {
        cls += " na";
      } else if (p.twiceDaily) {
        const amDone = (peptideLog.taken[p.id] || []).includes(d + "_AM");
        const pmDone = (peptideLog.taken[p.id] || []).includes(d + "_PM");
        if (amDone && pmDone) cls += " taken";
        else if (amDone || pmDone) cls += " partial";
      } else {
        const wasTaken = (peptideLog.taken[p.id] || []).includes(d);
        if (wasTaken) cls += " taken";
      }
      dot.className = cls;
      dot.title = d;
      dotsWrap.appendChild(dot);
    });
    card.appendChild(dotsWrap);

    const allTaken = (peptideLog.taken[p.id] || []).slice().sort().reverse();
    if (allTaken.length) {
      const expand = document.createElement("div");
      expand.className = "expand";
      expand.style.marginTop = "10px";
      allTaken.forEach(key => {
        const [dateStr, slot] = key.split("_");
        const time = (peptideLog.times[p.id] || {})[key];
        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML = `<span>${dateStr}${slot ? ' &middot; ' + slot : ''}${time ? ' &middot; ' + time : ''}</span><span class="del">Delete</span>`;
        row.querySelector(".del").onclick = (ev) => {
          ev.stopPropagation();
          showConfirmModal(`Delete this ${p.name} dose log (${dateStr}${slot ? ' ' + slot : ''})? This can't be undone.`, "Delete", async () => {
            peptideLog.taken[p.id] = peptideLog.taken[p.id].filter(k => k !== key);
            if (peptideLog.times[p.id]) delete peptideLog.times[p.id][key];
            await savePeptideLog();
            renderPeptideView();
          });
        };
        expand.appendChild(row);
      });
      card.appendChild(expand);
      card.querySelector(".pep-top").style.cursor = "pointer";
      card.querySelector(".pep-top").onclick = () => { expand.classList.toggle("open"); };
    }

    wrap.appendChild(card);
  });
}

// ---------- DATA VIEW (grouped, tap-to-expand history + chart) ----------
let currentDataType = "push";
let expandedExercise = null;

function buildChartHtml(entriesDesc) {
  const entries = entriesDesc.slice().sort((a, b) => a.date.localeCompare(b.date));
  const pr = entries.reduce((max, e) => e.weight > max.weight ? e : max, entries[0]);
  const latest = entries[entries.length - 1];
  const w = 300, h = 120, pad = 10;
  const weights = entries.map(e => e.weight);
  const minW = Math.min(...weights) * 0.95;
  const maxW = Math.max(...weights) * 1.05;
  const range = maxW - minW || 1;
  const points = entries.map((e, i) => {
    const x = pad + (i / Math.max(entries.length - 1, 1)) * (w - pad * 2);
    const y = h - pad - ((e.weight - minW) / range) * (h - pad * 2);
    return [x, y];
  });
  const pathD = points.map((pt, i) => (i === 0 ? "M" : "L") + pt[0].toFixed(1) + "," + pt[1].toFixed(1)).join(" ");
  const dotsSvg = points.map(pt => `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3" fill="#e8b84b"/>`).join("");
  return `
    <div class="chart-card">
      <div class="chart-stats">
        <div><div class="chart-stat-label">PR</div><div class="chart-stat-val" style="color:var(--gold)">${pr.weight}</div></div>
        <div><div class="chart-stat-label">Latest</div><div class="chart-stat-val">${latest.weight}</div></div>
        <div><div class="chart-stat-label">Sessions</div><div class="chart-stat-val">${entries.length}</div></div>
      </div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:120px; overflow:visible;">
        <path d="${pathD}" fill="none" stroke="#e8b84b" stroke-width="2"/>
        ${dotsSvg}
      </svg>
    </div>
  `;
}

function renderDataView() {
  const tabsEl = document.getElementById("dataTabs");
  tabsEl.innerHTML = "";
  ["push", "pull", "legs"].forEach(type => {
    const div = document.createElement("div");
    div.className = "tab" + (type === currentDataType ? " active" : "");
    div.dataset.type = type;
    div.textContent = type.charAt(0).toUpperCase() + type.slice(1);
    div.onclick = () => { currentDataType = type; expandedExercise = null; renderDataView(); };
    tabsEl.appendChild(div);
  });

  const list = document.getElementById("dataList");
  list.innerHTML = "";
  const exercisesForType = registry[currentDataType] || [];
  const activeNames = new Set(Object.values(activeDays).filter(d => d.type === currentDataType).flatMap(d => d.exercises));

  exercisesForType.forEach(name => {
    const entries = getExerciseLogs(name);
    const pr = getPR(name);
    const isRetired = !activeNames.has(name);

    const card = document.createElement("div");
    card.className = "exercise";

    const head = document.createElement("div");
    head.className = "ex-head";
    head.style.cursor = "pointer";
    head.innerHTML = `
      <div>
        <div class="ex-name">${name}${isRetired ? ' <span style="color:var(--sub); font-weight:600; font-size:10.5px;">(not in current routine)</span>' : ''}</div>
        <div class="ex-hint">${entries.length ? entries.length + ' session' + (entries.length === 1 ? '' : 's') + ' &middot; last ' + entries[0].date : 'No entries yet'}</div>
      </div>
      <div class="pr">${pr ? pr.weight : '—'}<span>PR</span></div>
    `;
    head.onclick = () => { expandedExercise = expandedExercise === name ? null : name; renderDataView(); };
    card.appendChild(head);

    if (expandedExercise === name) {
      if (entries.length) {
        const chartDiv = document.createElement("div");
        chartDiv.style.padding = "0 14px 14px";
        chartDiv.innerHTML = buildChartHtml(entries);
        card.appendChild(chartDiv);

        const expand = document.createElement("div");
        expand.className = "expand open";
        entries.forEach(e => {
          const row = document.createElement("div");
          row.className = "entry-row";
          row.innerHTML = `<span>${e.date} &middot; ${e.weight}${e.reps ? ' x ' + e.reps : ''}</span><span class="del">Delete</span>`;
          row.querySelector(".del").onclick = (ev) => {
            ev.stopPropagation();
            showConfirmModal(`Delete this entry (${e.date}, ${e.weight}${e.reps ? ' x ' + e.reps : ''})? This can't be undone.`, "Delete", async () => {
              logs = logs.filter(l => l.id !== e.id);
              await saveLogs();
              renderDataView();
            });
          };
          expand.appendChild(row);
        });
        card.appendChild(expand);
      } else {
        const emptyDiv = document.createElement("div");
        emptyDiv.style.padding = "0 14px 14px";
        emptyDiv.innerHTML = '<div class="empty">No sets logged for this exercise yet</div>';
        card.appendChild(emptyDiv);
      }

      const deleteAllWrap = document.createElement("div");
      deleteAllWrap.style.padding = "0 14px 14px";
      const deleteAllBtn = document.createElement("button");
      deleteAllBtn.textContent = entries.length ? "Delete all data for " + name : "Remove " + name;
      deleteAllBtn.style.cssText = "width:100%; background:var(--card-hi); color:var(--legs); border:1px solid var(--legs); border-radius:8px; padding:10px; font-weight:800; font-size:12.5px;";
      deleteAllBtn.onclick = (ev) => {
        ev.stopPropagation();
        const msg = entries.length
          ? `Permanently delete all ${entries.length} logged session${entries.length === 1 ? '' : 's'} for "${name}"? This removes its full history and cannot be undone.`
          : `Remove "${name}"? It has no logged data, this just takes it off your list.`;
        showConfirmModal(msg, entries.length ? "Delete" : "Remove", async () => {
          logs = logs.filter(l => l.exercise !== name);
          await saveLogs();
          registry[currentDataType] = registry[currentDataType].filter(n => n !== name);
          saveRegistry();
          // Also strip it out of any active day it's still assigned to, so it doesn't reappear.
          let configChanged = false;
          Object.keys(activeDays).forEach(day => {
            if (activeDays[day].exercises.includes(name)) {
              activeDays[day].exercises = activeDays[day].exercises.filter(n => n !== name);
              configChanged = true;
            }
          });
          if (configChanged) saveWorkoutConfig();
          expandedExercise = null;
          showToast(name + (entries.length ? " data deleted" : " removed"));
          renderDataView();
        });
      };
      deleteAllWrap.appendChild(deleteAllBtn);
      card.appendChild(deleteAllWrap);
    }

    list.appendChild(card);
  });
}

async function init() {
  loadWorkoutConfig();
  await loadLogs();
  await loadPeptideLog();
  updateClock();
  setInterval(updateClock, 1000);
}
init();

document.getElementById("exportBtn").onclick = () => {
  const workoutConfig = JSON.parse(localStorage.getItem(WORKOUT_CONFIG_KEY) || "{}");
  const data = { trainingLogs: logs, peptideLog: peptideLog, workoutConfig: workoutConfig, exerciseRegistry: registry, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "training-log-backup-" + todayStr() + ".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Backup downloaded");
};

document.getElementById("importBtn").onclick = () => {
  document.getElementById("importFile").click();
};

document.getElementById("importFile").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.trainingLogs) logs = data.trainingLogs;
    if (data.peptideLog) peptideLog = data.peptideLog;
    if (data.workoutConfig) localStorage.setItem(WORKOUT_CONFIG_KEY, JSON.stringify(data.workoutConfig));
    if (data.exerciseRegistry) registry = data.exerciseRegistry;
    await saveLogs();
    await savePeptideLog();
    saveRegistry();
    loadWorkoutConfig();
    render();
    showToast("Backup restored");
  } catch (err) {
    showToast("Import failed, bad file");
  }
  e.target.value = "";
};

</script>
