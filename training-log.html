<title>Training Log</title>
<style>
  :root {
    --bg: #0b0d12;
    --card: #14171f;
    --card-hi: #191d27;
    --line: #262b36;
    --text: #f2f3f5;
    --sub: #8a90a0;
    --push: #2f6fd1;
    --pull: #22945a;
    --legs: #c1531f;
    --gold: #e8b84b;

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
    padding-bottom: 40px;
  }
  header {

    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-size: 20px;
    font-weight: 800;
    margin: 0 0 2px;
    letter-spacing: -0.02em;
  }
  header p {
    margin: 0;
    color: var(--sub);
    font-size: 12.5px;
  }
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 14px 18px 0;
  }
  .tab {
    padding: 10px 6px;
    border-radius: 10px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    background: var(--card);
    color: var(--sub);
    border: 1px solid var(--line);
    cursor: pointer;
  }
  .tab.active[data-type="push"] { background: var(--push); color: white; border-color: var(--push); }
  .tab.active[data-type="pull"] { background: var(--pull); color: white; border-color: var(--pull); }
  .tab.active[data-type="legs"] { background: var(--legs); color: white; border-color: var(--legs); }
  .sub {
    color: var(--sub);
    font-weight: 500;
    font-size: 10.5px;
    display: block;
    margin-top: 1px;
  }
  main { padding: 16px 18px 0; }
  .exercise {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .ex-head {
    padding: 14px 14px 10px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    cursor: pointer;
  }
  .ex-name { font-size: 14.5px; font-weight: 700; }
  .ex-hint { color: var(--sub); font-size: 11px; margin-top: 2px; }
  .pr {
    font-size: 12px;
    font-weight: 800;
    color: var(--gold);
    white-space: nowrap;
    margin-left: 10px;
  }
  .pr span { color: var(--sub); font-weight: 500; font-size: 10px; display: block; text-align: right; }
  .history {
    padding: 0 14px 10px;
    color: var(--sub);
    font-size: 11.5px;
    line-height: 1.6;
  }
  .logrow {
    display: flex;
    gap: 8px;
    padding: 10px 14px 14px;
    border-top: 1px solid var(--line);
  }
  .logrow input {
    background: var(--card-hi);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 9px 8px;
    font-size: 14px;
    width: 100%;
    text-align: center;
  }
  .logrow input::placeholder { color: #565c6b; }
  .logrow button {
    background: var(--text);
    color: #0b0d12;
    border: none;
    border-radius: 8px;
    font-weight: 800;
    font-size: 13px;
    padding: 0 16px;
    white-space: nowrap;

  .expand {
    max-height: 0;
    overflow: hidden;

    display: flex;
    justify-content: space-between;
    padding: 8px 14px;
    border-top: 1px solid var(--line);
    font-size: 12.5px;
  }
  .entry-row .del { color: #c1531f; font-weight: 700; }
  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #14171f;
    padding: 10px 18px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .empty { color: var(--sub); font-size: 12.5px; text-align: center; padding: 30px 0; }
  .loading { color: var(--sub); font-size: 13px; text-align: center; padding: 40px 0; }

    grid-template-columns: repeat(3, 1fr);

    color: var(--sub);
    border-bottom: 2px solid var(--line);

  .navtab.active {

  .pep-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
  }
  .pep-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;

  .pep-name {
    font-size: 15px;
    font-weight: 800;

  .pep-sub {

  .pill {

    grid-template-columns: repeat(7, 1fr);

    margin-bottom: 6px;

<div class="navbar" id="navbar">

<div id="logView">
<div class="tabs" id="tabs"></div>

<main id="main">

</main>
</div>

<div id="dataView" style="display:none; padding: 16px 18px 0;">

    <div class="navtab" data-subview="muscle">By Muscle Group</div>
  </div>
  <div class="tabs" id="dataTabs" style="padding:0 0 12px;"></div>
  <div id="dataList"></div>
</div>

<div id="peptideView" style="display:none; padding: 16px 18px 0;">
  <div style="margin-bottom: 14px;">
    <label style="color: var(--sub); font-size: 11.5px; font-weight: 700; display: block; margin-bottom: 6px;">LOGGING FOR</label>
    <input type="date" id="peptideDate" style="width: 100%; background: var(--card); border: 1px solid var(--line); border-radius: 10px; color: var(--text); padding: 10px; font-size: 14px; font-weight: 700;">
    <div style="color: var(--sub); font-size: 10.5px; margin-top: 5px;">Past midnight before bed? Set this back one day before marking taken.</div>
  </div>
  <button id="calcToggleBtn" style="width:100%; background:var(--card); border:1px solid var(--line); color:var(--text); border-radius:10px; padding:10px; font-size:12.5px; font-weight:700; margin-bottom:12px;">Dose Calculator</button>
  <div id="calcPanel" style="display:none; margin-bottom:14px;"></div>
  <div class="day-header-row" id="dayHeaderRow"></div>
  <div id="peptideCards"></div>
</div>

const WORKOUT_CONFIG_KEY = "ale-workout-config-v1";
const REGISTRY_KEY = "ale-exercise-registry-v1";

// activeDays: what's actually shown/loggable today, editable per day.
// registry: every exercise name ever active for a given type, never shrinks,
// so swapping an exercise out never hides its history.
let activeDays = {};
let registry = { push: [], pull: [], legs: [] };

function loadWorkoutConfig() {
  activeDays = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  try {
    const overrides = JSON.parse(localStorage.getItem(WORKOUT_CONFIG_KEY) || "{}");
    Object.keys(overrides).forEach(day => {
      if (activeDays[day] && Array.isArray(overrides[day])) {
        activeDays[day].exercises = overrides[day];
      }
    });
  } catch (e) {}

  try {
    const stored = JSON.parse(localStorage.getItem(REGISTRY_KEY) || "null");
    registry = stored || { push: [], pull: [], legs: [] };
  } catch (e) {
    registry = { push: [], pull: [], legs: [] };
  }
  ["push", "pull", "legs"].forEach(type => {
    if (!registry[type]) registry[type] = [];
    Object.values(DEFAULT_DAYS).filter(d => d.type === type).forEach(d => {
      d.exercises.forEach(ex => { if (!registry[type].includes(ex)) registry[type].push(ex); });
    });
    Object.values(activeDays).filter(d => d.type === type).forEach(d => {
      d.exercises.forEach(ex => { if (!registry[type].includes(ex)) registry[type].push(ex); });
    });
  });
  saveRegistry();
}

function saveWorkoutConfig() {
  const overrides = {};
  Object.keys(activeDays).forEach(day => { overrides[day] = activeDays[day].exercises; });
  localStorage.setItem(WORKOUT_CONFIG_KEY, JSON.stringify(overrides));
}

function saveRegistry() {
  localStorage.setItem(REGISTRY_KEY, JSON.stringify(registry));
}

function showConfirmModal(message, confirmLabel, onConfirm) {
  const overlay = document.createElement("div");
  overlay.style.cssText = "position:fixed; inset:0; background:rgba(0,0,0,0.65); z-index:200; display:flex; align-items:center; justify-content:center; padding:24px;";
  overlay.innerHTML = `
    <div style="background:var(--card); border:1px solid var(--line); border-radius:14px; padding:20px; max-width:340px; width:100%;">
      <div style="font-size:14px; line-height:1.5; margin-bottom:18px; color:var(--text);">${message}</div>
      <div style="display:flex; gap:8px;">
        <button id="confirmCancelBtn" style="flex:1; background:var(--card-hi); color:var(--sub); border:1px solid var(--line); border-radius:8px; padding:12px; font-weight:800; font-size:13.5px;">Cancel</button>
        <button id="confirmOkBtn" style="flex:1; background:var(--legs); color:white; border:none; border-radius:8px; padding:12px; font-weight:800; font-size:13.5px;">${confirmLabel}</button>
      </div>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelector("#confirmCancelBtn").onclick = () => overlay.remove();
  overlay.querySelector("#confirmOkBtn").onclick = () => {
    overlay.remove();
    onConfirm();
  };
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}

function nowTimeStr() {
  const d = new Date();
  const h = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  return h + ":" + min;
}

function updateClock() {
  const el = document.getElementById("clocklabel");
  if (!el) return;
  const now = new Date();
  el.textContent = now.toLocaleString("en-US", { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit", timeZoneName: "short" });
}

async function loadLogs() {
  try {
    const value = localStorage.getItem(STORAGE_KEY);
    if (value) {
      logs = JSON.parse(value);
    } else {
      // Fresh install: seed with the corrected training history.
      logs = JSON.parse(JSON.stringify(DEFAULT_LOGS));
      await saveLogs();
    }
  } catch (e) {
    logs = [];
  }

  // One-time patch: fix the entries that were mis-dated by the old UTC bug,
  // wherever this data actually lives (won't touch anything logged since).
  if (!localStorage.getItem(FIX_FLAG_KEY)) {
    let changed = false;
    logs.forEach(l => {
      if (FIX_IDS.has(l.id) && l.date === "2026-07-08") {
        l.date = "2026-07-07";
        changed = true;
      }
    });
    if (changed) await saveLogs();
    localStorage.setItem(FIX_FLAG_KEY, "1");
  }

  storageReady = true;
  render();
}

async function saveLogs() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
  } catch (e) {
    showToast("Save failed, try again");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 1400);
}

function getExerciseLogs(name) {
  return logs.filter(l => l.exercise === name).sort((a, b) => b.date.localeCompare(a.date));
}

function getPR(name) {
  const entries = getExerciseLogs(name);
  if (!entries.length) return null;
  return entries.reduce((max, e) => e.weight > max.weight ? e : max, entries[0]);
}

// Best set from the most recent session before the given date, for
// "last time" reference while logging (progressive overload cue).
function getLastSession(name, beforeDate) {
  const entries = getExerciseLogs(name).filter(e => e.date < beforeDate);
  if (!entries.length) return null;
  const mostRecentDate = entries[0].date;
  const sameDay = entries.filter(e => e.date === mostRecentDate);
  const best = sameDay.reduce((max, e) => e.weight > max.weight ? e : max, sameDay[0]);
  return { date: mostRecentDate, weight: best.weight, reps: best.reps };
}

const TAB_ORDER = ["Push A", "Pull A", "Legs A", "Push B", "Pull B", "Legs B"];

function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  TAB_ORDER.filter(day => activeDays[day]).forEach(day => {
    const info = activeDays[day];
    const div = document.createElement("div");
    div.className = "tab" + (day === currentDay ? " active" : "");
    div.dataset.type = info.type;
    div.textContent = day;
    div.onclick = () => { currentDay = day; render(); };
    tabsEl.appendChild(div);
  });
}

function render() {
  renderTabs();
  const dateInput = document.getElementById("sessionDate");
  if (!dateInput.value) dateInput.value = sessionDate;
  dateInput.onchange = () => { sessionDate = dateInput.value; };

  const info = activeDays[currentDay];
  document.getElementById("daylabel").textContent = info.subtitle;
  const main = document.getElementById("main");

  if (!storageReady) {
    main.innerHTML = '<div class="loading">Loading your log...</div>';
    return;
  }

  const editBtn = document.getElementById("editExercisesBtn");
  editBtn.textContent = editMode ? "Done" : "Edit";
  editBtn.onclick = () => { editMode = !editMode; render(); };

  if (editMode) {
    renderExerciseEditor(main, info);
    return;
  }

  main.innerHTML = "";
  const deloadBanner = buildDeloadBanner();
  if (deloadBanner) main.appendChild(deloadBanner);
  main.appendChild(buildWeekSnapshot());
  info.exercises.forEach(name => {
    const pr = getPR(name);
    const last = getLastSession(name, sessionDate);
    const tip = getCoachTip(name, sessionDate);
    const todaysSets = logs.filter(l => l.exercise === name && l.date === sessionDate && l.day === currentDay);

    const card = document.createElement("div");
    card.className = "exercise";

    const head = document.createElement("div");
    head.className = "ex-head";
    head.innerHTML = `
      <div>
        <div class="ex-name">${name}</div>
        <div class="ex-hint">${todaysSets.length ? todaysSets.length + ' set' + (todaysSets.length === 1 ? '' : 's') + ' logged today' : 'No sets logged today'}</div>
        ${last ? `<div class="ex-hint" style="color:var(--gold);">Last: ${last.weight}${last.reps ? ' x ' + last.reps : ''} &middot; ${formatDateLabel(last.date)}</div>` : ''}
        ${tip ? `<div class="ex-hint" style="color:var(--pull); margin-top:3px; line-height:1.4;">💡 ${tip}</div>` : ''}
      </div>
      <div class="pr">${pr ? pr.weight : '—'}<span>PR</span></div>
    `;
    card.appendChild(head);

    const logrow = document.createElement("div");
    logrow.className = "logrow";
    logrow.innerHTML = `
      <input type="number" inputmode="decimal" placeholder="Weight" class="w-input" style="flex:1.3">
      <input type="number" inputmode="numeric" placeholder="Reps" class="r-input" style="flex:1">
      <button class="log-btn">Log</button>
    `;
    const wInput = logrow.querySelector(".w-input");
    const rInput = logrow.querySelector(".r-input");
    const btn = logrow.querySelector(".log-btn");
    btn.onclick = async () => {
      const weight = parseFloat(wInput.value);
      const reps = rInput.value ? parseInt(rInput.value) : null;
      if (!weight) { showToast("Enter a weight"); return; }
      logs.push({ id: Date.now() + Math.random(), date: sessionDate, day: currentDay, exercise: name, weight, reps });
      wInput.value = ""; rInput.value = "";
      await saveLogs();
      showToast(name + " logged");
      render();
    };
    card.appendChild(logrow);

    if (todaysSets.length) {
      const baseline = getBaseline1RM(name, sessionDate);
      const expand = document.createElement("div");
      expand.className = "expand open";
      todaysSets.forEach((s, i) => {
        const rpe = estimateRPE(s.weight, s.reps, baseline);
        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML = `<span>Set ${i + 1}: ${s.weight}${s.reps ? ' x ' + s.reps : ''}${rpe ? ` <span style="color:var(--sub);">&middot; est. RPE ${rpe}</span>` : ''}</span><span class="del">Delete</span>`;
        row.querySelector(".del").onclick = (ev) => {
          ev.stopPropagation();
          showConfirmModal(`Delete Set ${i + 1} (${s.weight}${s.reps ? ' x ' + s.reps : ''})? This can't be undone.`, "Delete", async () => {
            logs = logs.filter(l => l.id !== s.id);
            await saveLogs();
            render();
          });
        };
        expand.appendChild(row);
      });
      card.appendChild(expand);
    }

    main.appendChild(card);
  });

  const finishWrap = document.createElement("div");
  finishWrap.style.padding = "4px 0 20px";
  const doneKey = sessionDate + "_" + currentDay;
  const finished = getFinishedSessions().includes(doneKey);
  const finishBtn = document.createElement("button");
  finishBtn.textContent = finished ? "Session complete" : "Finish workout";
  finishBtn.style.cssText = `width:100%; padding:14px; border-radius:12px; border:none; font-weight:800; font-size:14px; ${finished ? "background: var(--card-hi); color: var(--sub); border:1px solid var(--line);" : "background: var(--gold); color: #14171f;"}`;
  finishBtn.onclick = () => {
    const list = getFinishedSessions();
    if (!list.includes(doneKey)) {
      list.push(doneKey);
      localStorage.setItem(FINISHED_KEY, JSON.stringify(list));
    }
    showToast("Workout saved. Nice work.");
    render();
  };
  finishWrap.appendChild(finishBtn);
  main.appendChild(finishWrap);

  main.appendChild(buildRecentSessionsSection());
}

let recentSessionsRange = 3; // days
function buildRecentSessionsSection() {
  const wrap = document.createElement("div");
  wrap.style.cssText = "margin-top:6px; padding-bottom:24px;";

  const header = document.createElement("div");
  header.style.cssText = "display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;";

  const rangeTabs = document.createElement("div");
  rangeTabs.style.cssText = "display:flex; gap:6px;";
  [[3, "3 Days"], [7, "1 Week"], [14, "2 Weeks"]].forEach(([days, label]) => {
    const btn = document.createElement("div");
    btn.textContent = label;
    const active = recentSessionsRange === days;
    btn.style.cssText = `font-size:10.5px; font-weight:800; padding:6px 9px; border-radius:8px; cursor:pointer; ${active ? "background:var(--gold); color:#14171f;" : "background:var(--card-hi); color:var(--sub); border:1px solid var(--line);"}`;
    btn.onclick = () => { recentSessionsRange = days; render(); };
    rangeTabs.appendChild(btn);
  });
  header.appendChild(rangeTabs);
  wrap.appendChild(header);

  const sessions = getRecentSessions(recentSessionsRange);
  if (!sessions.length) {
    const empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "No sessions logged in this range";
    wrap.appendChild(empty);
    return wrap;
  }

  sessions.forEach(s => {
    const card = document.createElement("div");
    card.className = "exercise";
    const head = document.createElement("div");
    head.className = "ex-head";
    head.style.cursor = "pointer";
    const dateLabel = formatDateLabel(s.date);
    head.innerHTML = `

function formatDateLabel(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  const today = todayStr();
  const yesterday = addDaysLocal(today, -1);
  if (dateStr === today) return "Today";
  if (dateStr === yesterday) return "Yesterday";
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function addDaysLocal(dateStr, n) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + n);
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth() + 1).padStart(2, "0");
  const dd = String(dt.getDate()).padStart(2, "0");
  return yy + "-" + mm + "-" + dd;
}

const DELOAD_KEY = "ale-last-deload-v1";

function computeAvgRPELast7Days() {
  const cutoff = addDaysLocal(todayStr(), -6);
  let total = 0, count = 0;
  logs.forEach(l => {
    if (l.date < cutoff || !l.reps) return;
    const baseline = getBaseline1RM(l.exercise, l.date);
    const rpe = estimateRPE(l.weight, l.reps, baseline);
    if (rpe !== null) { total += rpe; count++; }
  });
  return count ? total / count : null;
}

function countDecliningExercises() {
  let count = 0;
  const allNames = [...new Set(Object.values(registry).flat())];
  const cutoff = addDaysLocal(todayStr(), -14);
  allNames.forEach(name => {
    const entries = getExerciseLogs(name);
    const dates = [...new Set(entries.map(e => e.date))];
    if (dates.length < 2 || dates[0] < cutoff) return;
    const trend = getTrendArrow(name);
    if (trend && trend.arrow === "▼") count++;
  });
  return count;
}

function getDeloadStatus() {
  const lastDeload = localStorage.getItem(DELOAD_KEY);
  if (lastDeload && lastDeload >= addDaysLocal(todayStr(), -9)) return { flag: false };
  const avgRPE = computeAvgRPELast7Days();
  const declineCount = countDecliningExercises();
  if ((avgRPE !== null && avgRPE >= 9) || declineCount >= 3) {
    return { flag: true, avgRPE, declineCount };
  }
  return { flag: false };
}

function getRecentSessions(rangeDays) {
  const cutoff = addDaysLocal(todayStr(), -(rangeDays - 1));
  const grouped = {};
  logs.forEach(l => {
    if (l.date < cutoff) return;
    const key = l.date + "_" + l.day;
    if (!grouped[key]) grouped[key] = { date: l.date, day: l.day, sets: [] };
    grouped[key].sets.push(l);
  });
  return Object.values(grouped).sort((a, b) => b.date.localeCompare(a.date)).map(g => {
    const byExercise = {};
    g.sets.forEach(s => {
      if (!byExercise[s.exercise]) byExercise[s.exercise] = [];
      byExercise[s.exercise].push(s);
    });
    return {
      date: g.date,
      day: g.day,
      exerciseCount: Object.keys(byExercise).length,
      setCount: g.sets.length,
      byExercise
    };
  });
}

const INJECTION_SITES = ["Abdomen L", "Abdomen R", "Thigh L", "Thigh R", "Glute L", "Glute R", "Love Handle L", "Love Handle R"];
// Sites to skip for specific peptides, per Ale's preference.
const AVOID_SITES = {
  ghk: ["Abdomen L", "Abdomen R"],
  tesa: ["Abdomen L", "Abdomen R"],
};

function getEligibleSites(peptideId) {
  const avoid = AVOID_SITES[peptideId] || [];
  return INJECTION_SITES.filter(s => !avoid.includes(s));
}

// Suggests the eligible site that's gone longest without use (or never used).
function getSuggestedSite(peptideId) {
  const eligible = getEligibleSites(peptideId);
  const siteLog = peptideLog.sites[peptideId] || {};
  const lastUsedKey = {};
  Object.keys(siteLog).sort().forEach(key => {
    lastUsedKey[siteLog[key]] = key;
  });
  let best = eligible[0];
  let bestKey = lastUsedKey[best] || "";
  eligible.forEach(site => {
    const key = lastUsedKey[site] || "";
    if (key < bestKey) { best = site; bestKey = key; }
  });
  return best;
}

const PEPTIDES = [
  { id: "ghk", name: "GHK-Cu", dose: "6 units", start: "2026-07-02", pattern: "daily-finite", cycleDays: 50, color: "#c1531f", vialUnits: 300, unitsPerDose: 6 },
  { id: "reta", name: "Retatrutide", dose: "10 units, 1mg", start: "2026-07-01", pattern: "weekly", color: "#2f6fd1", vialUnits: 100, unitsPerDose: 10 },
  { id: "tesa", name: "Tesamorelin", dose: "20 units, PM", start: "2026-07-03", pattern: "5on2off", color: "#22945a", vialUnits: 200, unitsPerDose: 20 },
  { id: "ipam", name: "Ipamorelin", dose: "5 units AM + 5 PM", start: "2026-07-03", pattern: "daily", twiceDaily: true, color: "#e8b84b", vialUnits: 300, unitsPerDoseAM: 5, unitsPerDosePM: 5 },
];

function parseUTC(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return Date.UTC(y, m - 1, d);
}
function dayDiff(startStr, dateStr) {
  return Math.round((parseUTC(dateStr) - parseUTC(startStr)) / 86400000);
}
function addDays(dateStr, n) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + n);
  return dt.toISOString().slice(0, 10);
}
function mondayOffset(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const wd = new Date(Date.UTC(y, m - 1, d)).getUTCDay(); // Sun=0..Sat=6
  return (wd + 6) % 7; // Mon=0..Sun=6
}
function buildGridDates(weeks) {
  const today = todayStr();
  const mondayThisWeek = addDays(today, -mondayOffset(today));
  const gridStart = addDays(mondayThisWeek, -7 * (weeks - 1));
  const dates = [];
  for (let i = 0; i < weeks * 7; i++) dates.push(addDays(gridStart, i));
  return dates;
}

function getPeptideStatus(p, dateStr) {
  const diff = dayDiff(p.start, dateStr);
  if (diff < 0) return { state: "not-started" };
  if (p.pattern === "daily") return { state: "due", dayNum: diff + 1 };
  if (p.pattern === "daily-finite") {
    if (diff >= p.cycleDays) return { state: "complete", dayNum: p.cycleDays };
    return { state: "due", dayNum: diff + 1, totalDays: p.cycleDays };
  }
  if (p.pattern === "weekly") {
    const dayNum = Math.floor(diff / 7) + 1;
    if (diff % 7 === 0) return { state: "due", dayNum };
    return { state: "off", dayNum, daysUntil: 7 - (diff % 7) };
  }
  if (p.pattern === "5on2off") {
    const cyclePos = diff % 7;
    const cycleNum = Math.floor(diff / 7) + 1;
    if (cyclePos < 5) return { state: "due", dayNum: cyclePos + 1, cycleNum, onOff: "on" };
    return { state: "off", dayNum: cyclePos - 4, cycleNum, onOff: "off" };
  }
  return { state: "due" };
}

  if (!peptideLog.times) peptideLog.times = {};
  if (!peptideLog.sites) peptideLog.sites = {};
}

function estimateDaysRemaining(p, remaining) {
  let perWeekUnits;
  if (p.twiceDaily) perWeekUnits = (p.unitsPerDoseAM + p.unitsPerDosePM) * 7;
  else if (p.pattern === "weekly") perWeekUnits = p.unitsPerDose;
  else if (p.pattern === "5on2off") perWeekUnits = p.unitsPerDose * 5;
  else perWeekUnits = p.unitsPerDose * 7; // daily / daily-finite
  if (!perWeekUnits) return null;
  return Math.round((remaining / perWeekUnits) * 7);
}

function getVialRemaining(p) {
  const startDate = vialTracker[p.id] ? vialTracker[p.id].startDate : p.start;
  let used = 0;
  (peptideLog.taken[p.id] || []).forEach(key => {
    const date = key.split("_")[0];
    if (date < startDate) return;
    if (p.twiceDaily) {
      if (key.endsWith("_AM")) used += p.unitsPerDoseAM;
      else if (key.endsWith("_PM")) used += p.unitsPerDosePM;
    } else {
      used += p.unitsPerDose;
    }
  });
  return { remaining: Math.max(0, p.vialUnits - used), total: p.vialUnits, used };
}

function getWeeklyAdherence(p) {
  const today = todayStr();
  let due = 0, taken = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDaysLocal(today, -i);
    const status = getPeptideStatus(p, d);
    if (status.state !== "due") continue;
    due++;
    if (p.twiceDaily) {
      const amDone = (peptideLog.taken[p.id] || []).includes(d + "_AM");
      const pmDone = (peptideLog.taken[p.id] || []).includes(d + "_PM");
      if (amDone && pmDone) taken++;
    } else {
      if ((peptideLog.taken[p.id] || []).includes(d)) taken++;
    }
  }
  return { due, taken };
}

            peptideLog.taken[p.id].splice(idx, 1);
            delete peptideLog.times[p.id][today];
            delete peptideLog.sites[p.id][today];
          } else {
            peptideLog.taken[p.id].push(today);
            peptideLog.times[p.id][today] = timeInput.value || nowTimeStr();

          renderPeptideView();

    const dotsWrap = document.createElement("div");

    const vial = getVialRemaining(p);

      ${vialPct <= 30 ? `<div style="color:${vialColor}; font-size:11px; font-weight:700; margin-bottom:8px;">${vialPct <= 10 ? 'Critically low' : 'Getting low'}${daysLeft !== null ? ` &middot; ~${daysLeft} day${daysLeft === 1 ? '' : 's'} left at current pace` : ''}, reorder soon</div>` : ''}

        vialTracker[p.id] = { startDate: todayStr() };

    vialWrap.appendChild(newVialBtn);
    card.appendChild(vialWrap);

    const allTaken = (peptideLog.taken[p.id] || []).slice().sort().reverse();
    if (allTaken.length) {
      const expand = document.createElement("div");
      expand.className = "expand";
      expand.style.marginTop = "10px";
      allTaken.forEach(key => {

        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML = `<span>${dateStr}${slot ? ' &middot; ' + slot : ''}${time ? ' &middot; ' + time : ''}${site ? ' &middot; ' + site : ''}</span><span class="del">Delete</span>`;
        row.querySelector(".del").onclick = (ev) => {
          ev.stopPropagation();
          showConfirmModal(`Delete this ${p.name} dose log (${dateStr}${slot ? ' ' + slot : ''})? This can't be undone.`, "Delete", async () => {
            peptideLog.taken[p.id] = peptideLog.taken[p.id].filter(k => k !== key);
            if (peptideLog.times[p.id]) delete peptideLog.times[p.id][key];
            if (peptideLog.sites[p.id]) delete peptideLog.sites[p.id][key];
            await savePeptideLog();

          });
        };
        expand.appendChild(row);
      });

    }

  });

let currentDataType = "push";
let expandedExercise = null;

function buildChartHtml(entriesDesc) {
  const entries = entriesDesc.slice().sort((a, b) => a.date.localeCompare(b.date));
  const pr = entries.reduce((max, e) => e.weight > max.weight ? e : max, entries[0]);
  const latest = entries[entries.length - 1];
  const w = 300, h = 120, pad = 10;
  const weights = entries.map(e => e.weight);
  const minW = Math.min(...weights) * 0.95;
  const maxW = Math.max(...weights) * 1.05;
  const range = maxW - minW || 1;
  const points = entries.map((e, i) => {
    const x = pad + (i / Math.max(entries.length - 1, 1)) * (w - pad * 2);
    const y = h - pad - ((e.weight - minW) / range) * (h - pad * 2);
    return [x, y];
  });
  const pathD = points.map((pt, i) => (i === 0 ? "M" : "L") + pt[0].toFixed(1) + "," + pt[1].toFixed(1)).join(" ");
  const dotsSvg = points.map(pt => `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3" fill="#e8b84b"/>`).join("");
  return `
    <div class="chart-card">
      <div class="chart-stats">
        <div><div class="chart-stat-label">PR</div><div class="chart-stat-val" style="color:var(--gold)">${pr.weight}</div></div>
        <div><div class="chart-stat-label">Latest</div><div class="chart-stat-val">${latest.weight}</div></div>
        <div><div class="chart-stat-label">Sessions</div><div class="chart-stat-val">${entries.length}</div></div>
      </div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:120px; overflow:visible;">
        <path d="${pathD}" fill="none" stroke="#e8b84b" stroke-width="2"/>
        ${dotsSvg}
      </svg>
    </div>
  `;
}

// Compares the best set of the two most recent sessions for an exercise.
// ---------- AUTO-RPE ENGINE ----------
// Epley formula estimates a 1RM assuming the set was taken to true failure
// (0 reps in reserve). Comparing a new set's estimated 1RM against a recent
// known baseline tells us how far from failure it probably was, which maps
// to RPE. This is an estimate, not a lab measurement, and needs at least
// one prior logged session on that exercise to work.
function epley1RM(weight, reps) {
  return weight * (1 + reps / 30);
}

function getCoachTip(name, beforeDate) {
  const range = REP_RANGE_MAP[name];
  if (!range) return null;
  const entries = getExerciseLogs(name);
  const dates = [...new Set(entries.map(e => e.date))].filter(d => d < beforeDate).sort((a, b) => b.localeCompare(a));
  if (!dates.length) return "Log a session or two here and I'll start giving tips.";

  const lastDate = dates[0];
  const lastSets = entries.filter(e => e.date === lastDate);
  const topSet = lastSets.reduce((max, e) => e.weight > max.weight ? e : max, lastSets[0]);
  const baselineForLast = getBaseline1RM(name, lastDate);
  const rpeLast = estimateRPE(topSet.weight, topSet.reps, baselineForLast);

  let regressed = false;
  if (dates.length >= 2) {
    const priorSets = entries.filter(e => e.date === dates[1]);
    const priorTop = priorSets.reduce((max, e) => e.weight > max.weight ? e : max, priorSets[0]);
    if (topSet.weight < priorTop.weight) regressed = true;
  }

  const [lo, hi] = range;
  if (regressed) {
    return "Dropped from the session before that, hold here and check sleep/food before pushing more.";
  }
  if (topSet.reps && topSet.reps >= hi) {
    if (rpeLast !== null && rpeLast >= 9) {
      return `Topped your rep range last time at a hard effort (est. RPE ${rpeLast}). Hold this weight one more session.`;
    }
    return `Topped your rep range last time. Try adding weight this session.`;
  }
  if (topSet.reps && topSet.reps < lo) {
    return `Came in under range last time (${topSet.reps} reps). Hold weight, aim for ${lo}+.`;
  }
  return `In range last time. Build toward ${hi} reps before adding weight.`;
}

function getBaseline1RM(name, beforeDate) {
  const windowStart = addDaysLocal(beforeDate, -60);
  const priorSets = logs.filter(l => l.exercise === name && l.date < beforeDate && l.date >= windowStart && l.reps);
  if (!priorSets.length) return null;
  return Math.max(...priorSets.map(s => epley1RM(s.weight, s.reps)));
}

function estimateRPE(weight, reps, baseline1RM) {
  if (!baseline1RM || !reps) return null;
  const setE1RM = epley1RM(weight, reps);
  const gapPct = (baseline1RM - setE1RM) / baseline1RM;
  const rir = gapPct / 0.033; // ~3.3% of 1RM per rep in reserve, standard RPE-chart approximation
  const rpe = Math.round((10 - rir) * 2) / 2; // nearest 0.5
  return Math.max(1, Math.min(10, rpe));
}

function getTrendArrow(name) {
  const entries = getExerciseLogs(name); // newest first
  const dates = [...new Set(entries.map(e => e.date))];
  if (dates.length < 2) return null;
  const bestOnDate = d => entries.filter(e => e.date === d).reduce((max, e) => e.weight > max.weight ? e : max, entries[0]).weight;
  const latest = bestOnDate(dates[0]);
  const prior = bestOnDate(dates[1]);
  if (latest > prior) return { arrow: "▲", color: "var(--pull)" };
  if (latest < prior) return { arrow: "▼", color: "var(--legs)" };
  return { arrow: "▬", color: "var(--sub)" };
}

function renderMuscleGroupView(list) {
  list.innerHTML = "";

  const note = document.createElement("div");
  note.style.cssText = "color:var(--sub); font-size:11px; margin-bottom:12px; line-height:1.5;";
  note.textContent = "Working sets logged in the trailing 7 days per muscle group. Research range for growth is roughly 8-20 sets/week.";
  list.appendChild(note);

  const sevenDaysAgo = addDaysLocal(todayStr(), -6);
  const counts = {};
  logs.forEach(l => {
    if (l.date < sevenDaysAgo) return;
    const muscle = MUSCLE_MAP[l.exercise];
    if (!muscle) return;
    counts[muscle] = (counts[muscle] || 0) + 1;
  });

  const allMuscles = [...new Set(Object.values(MUSCLE_MAP))];
  const maxCount = Math.max(VOLUME_LANDMARKS.high, ...allMuscles.map(m => counts[m] || 0));

  allMuscles.forEach(muscle => {
    const count = counts[muscle] || 0;
    const inRange = count >= VOLUME_LANDMARKS.low && count <= VOLUME_LANDMARKS.high;
    const barColor = count === 0 ? "var(--card-hi)" : inRange ? "var(--pull)" : count < VOLUME_LANDMARKS.low ? "var(--legs)" : "var(--gold)";
    const label = count === 0 ? "No sets this week" : inRange ? "In range" : count < VOLUME_LANDMARKS.low ? "Below range" : "Above range";
    const pct = Math.min(100, (count / maxCount) * 100);

    const row = document.createElement("div");
    row.style.cssText = "margin-bottom:14px;";
    row.innerHTML = `
      <div style="display:flex; justify-content:space-between; margin-bottom:5px; font-size:12.5px;">
        <span style="font-weight:700;">${muscle}</span>
        <span style="color:var(--sub);">${count} sets &middot; ${label}</span>
      </div>
      <div style="background:var(--card-hi); border-radius:6px; height:10px; overflow:hidden;">
        <div style="width:${pct}%; height:100%; background:${barColor}; border-radius:6px;"></div>
      </div>
    `;
    list.appendChild(row);
  });
}

function renderDataView() {
  const tabsEl = document.getElementById("dataTabs");
  const list = document.getElementById("dataList");

  if (dataSubView === "muscle") {
    tabsEl.innerHTML = "";
    tabsEl.style.display = "none";
    renderMuscleGroupView(list);
    return;
  }
  tabsEl.style.display = "";

  tabsEl.innerHTML = "";
  ["push", "pull", "legs"].forEach(type => {
    const div = document.createElement("div");
    div.className = "tab" + (type === currentDataType ? " active" : "");
    div.dataset.type = type;
    div.textContent = type.charAt(0).toUpperCase() + type.slice(1);
    div.onclick = () => { currentDataType = type; expandedExercise = null; renderDataView(); };
    tabsEl.appendChild(div);
  });

  list.innerHTML = "";
  const exercisesForType = registry[currentDataType] || [];
  const activeNames = new Set(Object.values(activeDays).filter(d => d.type === currentDataType).flatMap(d => d.exercises));

  exercisesForType.forEach(name => {
    const entries = getExerciseLogs(name);
    const pr = getPR(name);
    const isRetired = !activeNames.has(name);
    const trend = getTrendArrow(name);

    const card = document.createElement("div");
    card.className = "exercise";

    const head = document.createElement("div");
    head.className = "ex-head";
    head.style.cursor = "pointer";
    head.innerHTML = `
      <div>
        <div class="ex-name">${name}${isRetired ? ' <span style="color:var(--sub); font-weight:600; font-size:10.5px;">(not in current routine)</span>' : ''}</div>
        <div class="ex-hint">${entries.length ? entries.length + ' session' + (entries.length === 1 ? '' : 's') + ' &middot; last ' + entries[0].date : 'No entries yet'}</div>
      </div>
      <div class="pr">${pr ? pr.weight : '—'}<span>PR</span> ${trend ? `<div style="text-align:center; margin-top:2px; font-size:12px; color:${trend.color};">${trend.arrow}</div>` : ''}</div>
    `;
    head.onclick = () => { expandedExercise = expandedExercise === name ? null : name; renderDataView(); };
    card.appendChild(head);

    if (expandedExercise === name) {
      if (entries.length) {
        const chartDiv = document.createElement("div");
        chartDiv.style.padding = "0 14px 14px";
        chartDiv.innerHTML = buildChartHtml(entries);
        card.appendChild(chartDiv);

        const expand = document.createElement("div");
        expand.className = "expand open";
        entries.forEach(e => {
          const row = document.createElement("div");
          row.className = "entry-row";
          row.innerHTML = `<span>${e.date} &middot; ${e.weight}${e.reps ? ' x ' + e.reps : ''}</span><span class="del">Delete</span>`;
          row.querySelector(".del").onclick = (ev) => {
            ev.stopPropagation();
            showConfirmModal(`Delete this entry (${e.date}, ${e.weight}${e.reps ? ' x ' + e.reps : ''})? This can't be undone.`, "Delete", async () => {
              logs = logs.filter(l => l.id !== e.id);
              await saveLogs();
              renderDataView();
            });
          };
          expand.appendChild(row);
        });
        card.appendChild(expand);
      } else {
        const emptyDiv = document.createElement("div");
        emptyDiv.style.padding = "0 14px 14px";
        emptyDiv.innerHTML = '<div class="empty">No sets logged for this exercise yet</div>';
        card.appendChild(emptyDiv);
      }

      const deleteAllWrap = document.createElement("div");
      deleteAllWrap.style.padding = "0 14px 14px";
      const deleteAllBtn = document.createElement("button");
      deleteAllBtn.textContent = entries.length ? "Delete all data for " + name : "Remove " + name;
      deleteAllBtn.style.cssText = "width:100%; background:var(--card-hi); color:var(--legs); border:1px solid var(--legs); border-radius:8px; padding:10px; font-weight:800; font-size:12.5px;";
      deleteAllBtn.onclick = (ev) => {
        ev.stopPropagation();
        const msg = entries.length
          ? `Permanently delete all ${entries.length} logged session${entries.length === 1 ? '' : 's'} for "${name}"? This removes its full history and cannot be undone.`
          : `Remove "${name}"? It has no logged data, this just takes it off your list.`;
        showConfirmModal(msg, entries.length ? "Delete" : "Remove", async () => {
          logs = logs.filter(l => l.exercise !== name);
          await saveLogs();
          registry[currentDataType] = registry[currentDataType].filter(n => n !== name);
          saveRegistry();
          // Also strip it out of any active day it's still assigned to, so it doesn't reappear.
          let configChanged = false;
          Object.keys(activeDays).forEach(day => {
            if (activeDays[day].exercises.includes(name)) {
              activeDays[day].exercises = activeDays[day].exercises.filter(n => n !== name);
              configChanged = true;
            }
          });
          if (configChanged) saveWorkoutConfig();
          expandedExercise = null;
          showToast(name + (entries.length ? " data deleted" : " removed"));
          renderDataView();
        });
      };
      deleteAllWrap.appendChild(deleteAllBtn);
      card.appendChild(deleteAllWrap);
    }

    list.appendChild(card);
  });
}

      </div>
      <div id="calcResult" style="background:var(--card-hi); border-radius:10px; padding:12px; text-align:center; font-weight:800; font-size:16px; color:var(--gold);">Enter values above</div>
      <div style="color:var(--sub); font-size:10px; margin-top:8px; line-height:1.5;">Assumes a U-100 syringe (1 mL = 100 units). Double check against your own protocol before drawing.</div>
    </div>
  `;
  const recalc = () => {
    const vialMg = parseFloat(document.getElementById("calcVialMg").value);
    const bacMl = parseFloat(document.getElementById("calcBacMl").value);
    const doseVal = parseFloat(document.getElementById("calcDose").value);
    const unit = document.getElementById("calcDoseUnit").value;
    const result = document.getElementById("calcResult");
    if (!vialMg || !bacMl || !doseVal) {
      result.textContent = "Enter values above";
      return;
    }
    const doseMg = unit === "mcg" ? doseVal / 1000 : doseVal;
    const concentration = vialMg / bacMl; // mg per mL
    const units = (doseMg / concentration) * 100;
    result.textContent = units.toFixed(1) + " units";
  };
  ["calcVialMg", "calcBacMl", "calcDose", "calcDoseUnit"].forEach(id => {
    document.getElementById(id).oninput = recalc;
  });
}

document.getElementById("calcToggleBtn").onclick = () => {
  const panel = document.getElementById("calcPanel");
  const isOpen = panel.style.display !== "none";
  if (isOpen) {
    panel.style.display = "none";
  } else {
    buildCalcPanel();
    panel.style.display = "block";
  }
};

document.getElementById("exportBtn").onclick = () => {
  const workoutConfig = JSON.parse(localStorage.getItem(WORKOUT_CONFIG_KEY) || "{}");
  const data = { trainingLogs: logs, peptideLog: peptideLog, workoutConfig: workoutConfig, exerciseRegistry: registry, vialTracker: vialTracker, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "training-log-backup-" + todayStr() + ".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Backup downloaded");
};

document.getElementById("importBtn").onclick = () => {
  document.getElementById("importFile").click();
};

document.getElementById("importFile").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.trainingLogs) logs = data.trainingLogs;
    if (data.peptideLog) peptideLog = data.peptideLog;
    if (data.workoutConfig) localStorage.setItem(WORKOUT_CONFIG_KEY, JSON.stringify(data.workoutConfig));
    if (data.exerciseRegistry) registry = data.exerciseRegistry;
    if (data.vialTracker) vialTracker = data.vialTracker;
    await saveLogs();
    await savePeptideLog();
    saveRegistry();
    saveVialTracker();
    loadWorkoutConfig();
    loadVialTracker();
    render();
    showToast("Backup restored");
  } catch (err) {
    showToast("Import failed, bad file");
  }
  e.target.value = "";
};

</script>

</body>
</html>
