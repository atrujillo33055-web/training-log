      </div>
      <div class="pr">${pr ? pr.weight : '—'}<span>PR</span> ${trend ? `<div style="text-align:center; margin-top:2px; font-size:12px; color:${trend.color};">${trend.arrow}</div>` : ''}</div>
    `;
    head.onclick = () => { expandedExercise = expandedExercise === name ? null : name; renderDataView(); };
    card.appendChild(head);

    if (expandedExercise === name) {
      if (entries.length) {
        const chartDiv = document.createElement("div");
        chartDiv.style.padding = "0 14px 14px";
        chartDiv.innerHTML = buildChartHtml(entries);
        card.appendChild(chartDiv);

        const expand = document.createElement("div");
        expand.className = "expand open";
        entries.forEach(e => {
          const row = document.createElement("div");
          row.className = "entry-row";
          row.innerHTML = `<span>${e.date} &middot; ${formatWeightDisplay(e)}${e.reps ? ' x ' + e.reps : ''}</span><span class="del"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-8 0 1 13a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-13"/></svg></span>`;
          row.querySelector(".del").onclick = (ev) => {
            ev.stopPropagation();
            showConfirmModal(`Delete this entry (${e.date}, ${e.weight}${e.reps ? ' x ' + e.reps : ''})? This can't be undone.`, "Delete", async () => {
              logs = logs.filter(l => l.id !== e.id);
              await saveLogs();
              renderDataView();
            });
          };
          expand.appendChild(row);
        });
        card.appendChild(expand);
      } else {
        const emptyDiv = document.createElement("div");
        emptyDiv.style.padding = "0 14px 14px";
        emptyDiv.innerHTML = '<div class="empty">No sets logged for this exercise yet</div>';
        card.appendChild(emptyDiv);
      }

      const deleteAllWrap = document.createElement("div");
      deleteAllWrap.style.padding = "0 14px 14px";
      const deleteAllBtn = document.createElement("button");
      deleteAllBtn.textContent = entries.length ? "Delete all data for " + name : "Remove " + name;
      deleteAllBtn.style.cssText = "width:100%; background:var(--card-hi); color:var(--legs); border:1px solid var(--legs); border-radius:12px; padding:10px; font-weight:800; font-size:12.5px;";
      deleteAllBtn.onclick = (ev) => {
        ev.stopPropagation();
        const msg = entries.length
          ? `Permanently delete all ${entries.length} logged session${entries.length === 1 ? '' : 's'} for "${name}"? This removes its full history and cannot be undone.`
          : `Remove "${name}"? It has no logged data, this just takes it off your list.`;
        showConfirmModal(msg, entries.length ? "Delete" : "Remove", async () => {
          logs = logs.filter(l => l.exercise !== name);
          await saveLogs();
          registry[currentDataType] = registry[currentDataType].filter(n => n !== name);
          saveRegistry();
          // Also strip it out of any active day it's still assigned to, so it doesn't reappear.
          let configChanged = false;
          Object.keys(activeDays).forEach(day => {
            if (activeDays[day].exercises.includes(name)) {
              activeDays[day].exercises = activeDays[day].exercises.filter(n => n !== name);
              configChanged = true;
            }
          });
          if (configChanged) saveWorkoutConfig();
          expandedExercise = null;
          showToast(name + (entries.length ? " data deleted" : " removed"));
          renderDataView();
        });
      };
      deleteAllWrap.appendChild(deleteAllBtn);
      card.appendChild(deleteAllWrap);
    }

    list.appendChild(card);
  });
}

// ---------- AI COACH TIPS ----------
// Layered on top of the local instant tips, never replaces them if the
// network or Supabase isn't reachable. Cached per day so it's one request
// per training day, not one per set, and reasons off the PRIOR day's data,
// not anything that changed today.
const AI_CACHE_KEY = "ale-ai-coach-cache-v1";
function loadAiCache() {
  try { return JSON.parse(localStorage.getItem(AI_CACHE_KEY) || "{}"); } catch (e) { return {}; }
}
function saveAiCache(cache) {
  localStorage.setItem(AI_CACHE_KEY, JSON.stringify(cache));
}

async function fetchAiCoachTips(day) {
  const info = activeDays[day];
  const exercisesPayload = info.exercises.map(name => {
    const entries = getExerciseLogs(name).slice(0, 6);
    return {
      name,
      repRange: REP_RANGE_MAP[name] || null,
      history: entries.map(e => ({ date: e.date, weight: e.weight, reps: e.reps, bodyweight: !!e.bodyweight })),
    };
  });
  const belowRange = getBelowRangeMuscles();
  const muscleVolume = belowRange.map(m => ({ muscle: m.muscle, count: m.count, status: "below range" }));
  const cutoff = addDaysLocal(todayStr(), -14);
  const recentNotes = Object.keys(scheduleNotes)
    .filter(d => d >= cutoff)
    .map(d => ({ date: d, text: scheduleNotes[d] }));

  const url = SUPABASE_URL.replace(/\/$/, "") + "/functions/v1/coach-tip";
  const res = await fetch(url, {
    method: "POST",
    headers: {
      "content-type": "application/json",
      "Authorization": "Bearer " + SUPABASE_ANON_KEY,
      "apikey": SUPABASE_ANON_KEY,
    },
    body: JSON.stringify({ day, exercises: exercisesPayload, muscleVolume, notes: recentNotes }),
  });
  if (!res.ok) throw new Error("AI coach request failed: " + res.status);
  return await res.json();
}

function getCachedAiTips(day, date) {
  const cache = loadAiCache();
  return cache[date + "_" + day] || null;
}

// Fire-and-forget: kicks off a fetch if nothing's cached for this day yet,
// re-renders once it lands. Never blocks the current render.
function ensureAiTipsFetched(day, date) {
  if (getCachedAiTips(day, date)) return;
  if (!supabaseClient || SUPABASE_URL.includes("YOUR_SUPABASE")) return;
  fetchAiCoachTips(day).then(result => {
    const cache = loadAiCache();
    cache[date + "_" + day] = result;
    saveAiCache(cache);
    if (currentDay === day && sessionDate === date) render();
  }).catch(e => console.error("AI coach tip fetch failed, local tips still active", e));
}

const SYNC_KEYS = [
  "ale-training-logs-v1", "ale-peptide-log-v1", "ale-workout-config-v1",
  "ale-exercise-registry-v1", "ale-vial-tracker-v1", "ale-peptide-config-v1",
  "ale-measurements-v1", "ale-schedule-notes-v1", "ale-day-override-v1",
  "ale-finished-sessions-v1", "ale-last-deload-v1",
];

let supabaseClient = null;
let syncDebounceTimer = null;

function scheduleSync() {
  if (!supabaseClient) return;
  clearTimeout(syncDebounceTimer);
  syncDebounceTimer = setTimeout(pushToCloud, 1500);
}

async function pushToCloud() {
  try {
    const { data: sessionData } = await supabaseClient.auth.getSession();
    const user = sessionData && sessionData.session && sessionData.session.user;
    if (!user) return;
    const blob = {};
    SYNC_KEYS.forEach(k => {
      const v = localStorage.getItem(k);
      if (v !== null) blob[k] = v;
    });
    await supabaseClient.from("app_state").upsert({
      user_id: user.id, data: blob, updated_at: new Date().toISOString(),
    });
  } catch (e) {
    console.error("Sync to cloud failed", e);
  }
}

async function pullFromCloud() {
  try {
    const { data: sessionData } = await supabaseClient.auth.getSession();
    const user = sessionData && sessionData.session && sessionData.session.user;
    if (!user) return false;
    const { data, error } = await supabaseClient
      .from("app_state")
      .select("data")
      .eq("user_id", user.id)
      .maybeSingle();
    if (error || !data || !data.data || Object.keys(data.data).length === 0) return false;
    Object.keys(data.data).forEach(k => {
      if (SYNC_KEYS.includes(k) && data.data[k] !== null && data.data[k] !== undefined) {
        localStorage.setItem(k, data.data[k]);
      }
    });
    return true;
  } catch (e) {
    console.error("Pull from cloud failed", e);
    return false;
  }
}

// Every write to a synced key schedules a debounced push. This means no
// individual save function anywhere in the app needed to change, sync is
// automatic the moment data actually changes.
(function patchLocalStorage() {
  const originalSetItem = localStorage.setItem.bind(localStorage);
  localStorage.setItem = function (key, value) {
    originalSetItem(key, value);
    if (SYNC_KEYS.includes(key)) scheduleSync();
  };
})();

function showAuthGate() {
  document.getElementById("authGate").style.display = "flex";
}
function hideAuthGate() {
  document.getElementById("authGate").style.display = "none";
}

async function startApp() {
  hideAuthGate();
  const hadRealCloudData = await pullFromCloud();
  await init();
  // Only auto-push if the cloud was genuinely empty (first-ever seed for
  // this account). Once a real record exists up there, signing in on some
  // other device never blind-pushes over it, pushes only happen from
  // actual new writes going forward. This is the fix for the exact bug
  // that wiped things: an emptier device can no longer stomp a fuller one
  // just by being opened.
  if (!hadRealCloudData) {
    await pushToCloud();
  }
}

}

        <div>
          <label style="color:var(--sub); font-size:10.5px; font-weight:700; display:block; margin-bottom:4px;">TARGET DOSE</label>
          <input type="number" id="calcDose" inputmode="decimal" style="width:100%; background:var(--card-hi); border:1px solid var(--line); border-radius:12px; color:var(--text); padding:9px; font-size:14px;">
        </div>
        <div>
          <label style="color:var(--sub); font-size:10.5px; font-weight:700; display:block; margin-bottom:4px;">UNIT</label>
          <select id="calcDoseUnit" style="width:100%; background:var(--card-hi); border:1px solid var(--line); border-radius:12px; color:var(--text); padding:9px; font-size:14px;">
            <option value="mg">mg</option>
            <option value="mcg">mcg</option>
          </select>
        </div>
      </div>
      <div id="calcResult" style="background:var(--card-hi); border-radius:12px; padding:12px; text-align:center; font-weight:800; font-size:16px; color:var(--gold); margin-bottom:12px;">Enter values above</div>
      <svg id="syringeSvg" viewBox="0 0 260 70" style="width:100%; height:70px; display:block;">
        <rect x="10" y="24" width="200" height="22" rx="3" fill="none" stroke="var(--line)" stroke-width="2"/>
        <rect id="syringeFill" x="10" y="24" width="0" height="22" rx="3" fill="var(--gold)" opacity="0.85"/>
        <line x1="10" y1="24" x2="10" y2="46" stroke="var(--sub)" stroke-width="2"/>
        <g stroke="var(--sub)" stroke-width="1">
          <line x1="30" y1="24" x2="30" y2="30"/><line x1="50" y1="24" x2="50" y2="34"/>
          <line x1="70" y1="24" x2="70" y2="30"/><line x1="90" y1="24" x2="90" y2="34"/>
          <line x1="110" y1="24" x2="110" y2="30"/><line x1="130" y1="24" x2="130" y2="34"/>
          <line x1="150" y1="24" x2="150" y2="30"/><line x1="170" y1="24" x2="170" y2="34"/>
          <line x1="190" y1="24" x2="190" y2="30"/>
        </g>
        <rect x="210" y="30" width="30" height="10" fill="var(--sub)"/>
        <line x1="240" y1="35" x2="256" y2="35" stroke="var(--sub)" stroke-width="2"/>
      </svg>
      <div style="color:var(--sub); font-size:10px; margin-top:8px; line-height:1.5;">Assumes a U-100 syringe (1 mL = 100 units). Double check against your own protocol before drawing.</div>
    </div>
  `;
  const recalc = () => {
    const vialMg = parseFloat(document.getElementById("calcVialMg").value);
    const bacMl = parseFloat(document.getElementById("calcBacMl").value);
    const doseVal = parseFloat(document.getElementById("calcDose").value);
    const unit = document.getElementById("calcDoseUnit").value;
    const result = document.getElementById("calcResult");
    const fillRect = document.getElementById("syringeFill");
    if (!vialMg || !bacMl || !doseVal) {
      result.textContent = "Enter values above";
      fillRect.setAttribute("width", 0);
      return;
    }
    const doseMg = unit === "mcg" ? doseVal / 1000 : doseVal;
    const concentration = vialMg / bacMl; // mg per mL
    const units = (doseMg / concentration) * 100;
    result.textContent = units.toFixed(1) + " units";
    const barrelUnits = bacMl * 100; // full syringe barrel = total mL capacity in units
    const fillWidth = Math.max(0, Math.min(200, (units / barrelUnits) * 200));
    fillRect.setAttribute("width", fillWidth);
  };
  ["calcVialMg", "calcBacMl", "calcDose", "calcDoseUnit"].forEach(id => {
    document.getElementById(id).oninput = recalc;
  });
}

document.getElementById("scheduleNoteBtn").onclick = () => {
  const existing = scheduleNotes[sessionDate] || "";
  showTextInputModal(`Note for ${sessionDate}`, existing, (value) => {
    if (value) {
      scheduleNotes[sessionDate] = value;
    } else {
      delete scheduleNotes[sessionDate];
    }
    saveScheduleNotes();
    renderScheduleNoteDisplay();
    showToast(value ? "Note saved" : "Note cleared");
  });
};

document.getElementById("calcToggleBtn").onclick = () => {
  const panel = document.getElementById("calcPanel");
  const isOpen = panel.style.display !== "none";
  document.getElementById("libraryPanel").style.display = "none";
  document.getElementById("stackPanel").style.display = "none";
  if (isOpen) {
    panel.style.display = "none";
  } else {
    buildCalcPanel();
    panel.style.display = "block";
  }
};

document.getElementById("libraryToggleBtn").onclick = () => {
  const panel = document.getElementById("libraryPanel");
  const isOpen = panel.style.display !== "none";
  document.getElementById("calcPanel").style.display = "none";
  document.getElementById("stackPanel").style.display = "none";
  if (isOpen) {
    panel.style.display = "none";
  } else {
    buildLibraryPanel();
    panel.style.display = "block";
  }
};

document.getElementById("stackToggleBtn").onclick = () => {
  const panel = document.getElementById("stackPanel");
  const isOpen = panel.style.display !== "none";
  document.getElementById("calcPanel").style.display = "none";
  document.getElementById("libraryPanel").style.display = "none";
  if (isOpen) {
    panel.style.display = "none";
  } else {
    buildStackPanel();
    panel.style.display = "block";
  }
};

document.getElementById("signOutBtn").onclick = () => signOutOfApp();

document.getElementById("exportBtn").onclick = () => {
  const workoutConfig = JSON.parse(localStorage.getItem(WORKOUT_CONFIG_KEY) || "{}");
  const data = { trainingLogs: logs, peptideLog: peptideLog, workoutConfig: workoutConfig, exerciseRegistry: registry, vialTracker: vialTracker, peptideConfig: peptides, measurements: measurements, scheduleNotes: scheduleNotes, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "training-log-backup-" + todayStr() + ".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Backup downloaded");
};

document.getElementById("importBtn").onclick = () => {
  document.getElementById("importFile").click();
};

document.getElementById("importFile").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    if (data.trainingLogs) logs = data.trainingLogs;
    if (data.peptideLog) peptideLog = data.peptideLog;
    if (!peptideLog.taken) peptideLog.taken = {};
    if (!peptideLog.times) peptideLog.times = {};
    if (!peptideLog.sites) peptideLog.sites = {};
    if (data.workoutConfig) localStorage.setItem(WORKOUT_CONFIG_KEY, JSON.stringify(data.workoutConfig));
    if (data.exerciseRegistry) registry = data.exerciseRegistry;
    if (data.vialTracker) vialTracker = data.vialTracker;
    if (data.peptideConfig) peptides = data.peptideConfig;
    if (data.measurements) measurements = data.measurements;
    if (data.scheduleNotes) scheduleNotes = data.scheduleNotes;
    await saveLogs();
    await savePeptideLog();
    saveRegistry();
    saveVialTracker();
    savePeptideConfig();
    saveMeasurements();
    saveScheduleNotes();
    loadWorkoutConfig();
    loadVialTracker();
    render();
    showToast("Backup restored");
  } catch (err) {
    showToast("Import failed, bad file");
  }
  e.target.value = "";
};

</script>

</body>
</html>
