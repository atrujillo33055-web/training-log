<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">
<meta name="theme-color" content="#0a0e12">
<title>Training Log</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  :root {
    --bg: #0a0e12;
    --card: #141b22;
    --card-hi: #1c2530;
    --line: rgba(200,220,255,0.08);
    --text: #eef4f8;
    --sub: #8a99a3;
    --sub-dim: #56636d;
    --push: #4dd4a0;
    --pull: #b8e94a;
    --legs: #ff6b4a;
    --gold: #2f8fff;
    --danger: #e2483f;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: inset 0 1px 0 rgba(200,220,255,0.05), 0 14px 28px -10px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.45);
    --shadow-sm: inset 0 1px 0 rgba(200,220,255,0.045), 0 8px 18px -8px rgba(0,0,0,0.65), 0 1px 4px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; background: var(--bg); }
  body {
    margin: 0;
    background: radial-gradient(ellipse 140% 60% at 50% -10%, #141b22 0%, var(--bg) 55%) fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
    padding-bottom: 100px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  button, input, select, textarea { font-family: inherit; }
  button { cursor: pointer; transition: opacity 0.15s ease, transform 0.1s ease; border: none; }
  button:active { transform: scale(0.97); opacity: 0.85; }
  input, select, textarea { outline: none; }

  /* ---- Auth gate ---- */
  #authGate {
    position: fixed; inset: 0; background: var(--bg); z-index: 500;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  #authGate .box { width: 100%; max-width: 340px; }
  #authGate h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 4px; text-align: center; }
  #authGate p { color: var(--sub); font-size: 12.5px; margin: 0 0 24px; text-align: center; }
  #authGate input {
    width: 100%; background: var(--card); border: none; border-radius: var(--radius-sm);
    color: var(--text); padding: 13px; font-size: 15px; margin-bottom: 10px; box-shadow: var(--shadow-sm);
  }
  #authGate .primary {
    width: 100%; background: var(--gold); color: var(--bg); border-radius: var(--radius-sm);
    padding: 14px; font-weight: 800; font-size: 14px; margin-bottom: 8px;
  }
  #authGate .secondary {
    width: 100%; background: var(--card); color: var(--text); border-radius: var(--radius-sm);
    padding: 14px; font-weight: 700; font-size: 13px; box-shadow: var(--shadow-sm);
  }
  #authError { color: var(--legs); font-size: 12px; margin-top: 12px; text-align: center; min-height: 16px; }
  #authStatus { color: var(--sub); font-size: 11.5px; margin-top: 8px; text-align: center; }

  /* ---- Header ---- */
  header {
    padding: calc(20px + env(safe-area-inset-top)) 20px 16px;
    position: sticky; top: 0;
    background: rgba(10,14,18,0.85);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    z-index: 30;
  }
  header h1 { font-size: 22px; font-weight: 800; margin: 0; letter-spacing: -0.03em; }
  header p { margin: 3px 0 0; color: var(--sub); font-size: 12.5px; }
  #saveIndicator {
    display: inline-flex; align-items: center; gap: 5px; font-size: 10.5px; font-weight: 700;
    color: var(--sub-dim); margin-left: 8px; opacity: 0; transition: opacity 0.2s ease;
  }
  #saveIndicator.show { opacity: 1; }
  #saveIndicator.err { color: var(--legs); }

  main, #homeView, #dataView, #peptideView { padding: 16px 18px 0; }

  /* ---- Bottom nav ---- */
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: grid; grid-template-columns: repeat(4, 1fr);
    background: rgba(20,27,34,0.85);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--line);
    padding: 8px 12px calc(10px + env(safe-area-inset-bottom));
    z-index: 40;
  }
  .navtab {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 6px 4px; font-size: 10.5px; font-weight: 700; letter-spacing: -0.01em;
    color: var(--sub-dim); transition: color 0.2s ease;
  }
  .navtab svg { width: 22px; height: 22px; stroke: var(--sub-dim); transition: stroke 0.2s ease; }
  .navtab.active { color: var(--gold); }
  .navtab.active svg { stroke: var(--gold); }

  /* ---- Day tabs (push/pull/legs) ---- */
  .tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 0 0 16px; }
  .tab {
    padding: 11px 6px; border-radius: var(--radius-sm); text-align: center;
    font-size: 12.5px; font-weight: 700; background: var(--card); color: var(--sub);
    transition: background 0.2s ease, color 0.2s ease;
  }
  .tab.active[data-type="push"] { background: var(--push); color: #0a0e12; }
  .tab.active[data-type="pull"] { background: var(--pull); color: #0a0e12; }
  .tab.active[data-type="legs"] { background: var(--legs); color: #0a0e12; }

  .segmented-nav { display: flex; background: var(--card-hi); border-radius: var(--radius-sm); padding: 3px; gap: 2px; margin-bottom: 14px; }
  .seg-tab { flex: 1; text-align: center; padding: 8px 4px; font-size: 11px; font-weight: 700; color: var(--sub); border-radius: 9px; transition: background 0.2s ease, color 0.2s ease; }
  .seg-tab.active { background: var(--card); color: var(--text); box-shadow: var(--shadow-sm); }

  /* ---- Cards ---- */
  .card { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow-sm); overflow: hidden; }
  .card-head { padding: 18px 18px 14px; display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer; }
  .card-title { font-size: 14.5px; font-weight: 700; letter-spacing: -0.01em; }
  .card-hint { color: var(--sub); font-size: 11px; margin-top: 3px; line-height: 1.4; }
  .pr { font-size: 13px; font-weight: 800; color: var(--gold); white-space: nowrap; margin-left: 10px; }
  .pr span { color: var(--sub); font-weight: 500; font-size: 9.5px; display: block; text-align: right; text-transform: uppercase; letter-spacing: 0.03em; }

  .logrow { display: flex; gap: 8px; padding: 8px 18px 18px; align-items: center; }
  .logrow input {
    background: var(--card-hi); border: none; border-radius: var(--radius-sm);
    color: var(--text); padding: 12px 8px; font-size: 16px; width: 100%; text-align: center; min-height: 44px;
  }
  .logrow input::placeholder { color: var(--sub-dim); }
  .logrow button {
    background: var(--text); color: var(--bg); border-radius: var(--radius-sm);
    font-weight: 800; font-size: 14px; padding: 12px 18px; white-space: nowrap; min-height: 44px; min-width: 60px;
  }
  .bw-toggle {
    flex: 0 0 auto; background: var(--card-hi); color: var(--sub); border-radius: var(--radius-sm);
    padding: 0 12px; font-weight: 800; font-size: 11px; height: 44px;
  }
  .bw-toggle.on { background: var(--gold); color: var(--bg); }

  .expand { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.22,1,0.36,1), opacity 0.25s ease; }
  .expand.open { max-height: 800px; opacity: 1; overflow-y: auto; }
  .entry-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 18px; border-top: 1px solid var(--line); font-size: 12.5px; }
  .entry-row .actions { display: flex; gap: 14px; align-items: center; }
  .entry-row .edit-set, .entry-row .del { cursor: pointer; color: var(--sub); }
  .entry-row .del { color: var(--danger); }
  .ex-label { padding: 9px 18px 2px; font-size: 11px; font-weight: 800; color: var(--sub-dim); text-transform: uppercase; letter-spacing: 0.03em; }

  .list-row { display: flex; justify-content: space-between; align-items: center; padding: 13px 2px; border-bottom: 1px solid var(--line); }
  .list-row:last-child { border-bottom: none; }
  .list-row-title { font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em; }
  .list-row-sub { font-size: 10.5px; color: var(--sub); margin-top: 2px; }

  .eyebrow { font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--sub-dim); }
  .hero-card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); margin-bottom: 12px; }
  .hero-number { font-size: 30px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.1; }
  .thin-bar { background: var(--card-hi); border-radius: 4px; height: 5px; overflow: hidden; margin-top: 12px; }
  .thin-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .quiet-stat { display: flex; align-items: center; gap: 8px; padding: 9px 0; }
  .quiet-stat-icon { color: var(--sub-dim); flex-shrink: 0; }
  .quiet-stat-label { font-size: 12px; color: var(--sub); flex: 1; }
  .quiet-stat-val { font-size: 12.5px; font-weight: 700; }

  .pill { font-size: 10.5px; font-weight: 800; padding: 5px 11px; border-radius: 20px; white-space: nowrap; }
  .pill.due { background: rgba(184,233,74,0.16); color: var(--pull); }
  .pill.off { background: var(--card-hi); color: var(--sub); }
  .pill.taken { background: rgba(47,143,255,0.16); color: var(--gold); }

  .toast {
    position: fixed; bottom: 96px; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: #0a0e12; padding: 11px 20px; border-radius: 30px;
    font-weight: 700; font-size: 13px; opacity: 0; transition: opacity 0.25s ease;
    pointer-events: none; box-shadow: var(--shadow); white-space: nowrap; z-index: 300;
  }
  .toast.show { opacity: 1; }
  .toast.pr-toast { background: linear-gradient(90deg, #2f8fff, #6bb8ff); font-size: 15px; padding: 14px 26px; box-shadow: 0 0 28px rgba(47,143,255,0.55); }
  .toast.err-toast { background: var(--danger); }

  .empty { color: var(--sub); font-size: 12.5px; text-align: center; padding: 30px 0; }
  .loading { color: var(--sub); font-size: 13px; text-align: center; padding: 40px 0; }

  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 24px; }
  .modal-box { background: var(--card); border-radius: 14px; padding: 20px; max-width: 340px; width: 100%; box-shadow: var(--shadow); }
  .modal-title { font-weight: 800; font-size: 14px; margin-bottom: 14px; }
  .modal-label { color: var(--sub); font-size: 10px; font-weight: 700; display: block; margin-bottom: 4px; }
  .modal-input { width: 100%; background: var(--card-hi); border: none; border-radius: 12px; color: var(--text); padding: 12px; font-size: 16px; margin-bottom: 10px; }
  .modal-btn-row { display: flex; gap: 8px; margin-top: 8px; }
  .modal-btn-row button { flex: 1; border-radius: 12px; padding: 12px; font-weight: 800; font-size: 13.5px; }
  .modal-cancel { background: var(--card-hi); color: var(--sub); }
  .modal-confirm { background: var(--gold); color: var(--bg); }
  .modal-danger { background: var(--danger); color: white; }

  @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; } }
</style>
</head>
<body>

<div id="authGate">
  <div class="box">
    <h1>Training Log</h1>
    <p>Sign in to sync your data</p>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password">
    <button class="primary" id="authSignInBtn">Sign In</button>
    <button class="secondary" id="authSignUpBtn">Create Account</button>
    <div id="authError"></div>
    <div id="authStatus"></div>
  </div>
</div>

<header>
  <h1>Training Log<span id="saveIndicator">●&nbsp;saving</span></h1>
  <p id="daylabel">Loading...</p>
  <p id="clocklabel" style="color: var(--sub); font-size: 11px; margin-top: 2px;"></p>
  <div style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
    <button id="exportBtn" style="background:var(--card); color:var(--sub); border-radius:12px; padding:6px 12px; font-size:11.5px; font-weight:700;">Export backup</button>
    <button id="importBtn" style="background:var(--card); color:var(--sub); border-radius:12px; padding:6px 12px; font-size:11.5px; font-weight:700;">Import backup</button>
    <button id="signOutBtn" style="background:var(--card); color:var(--sub); border-radius:12px; padding:6px 12px; font-size:11.5px; font-weight:700;">Sign Out</button>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
  </div>
</header>

<div class="bottom-nav" id="navbar">
  <div class="navtab active" data-view="home">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9.5a1 1 0 0 0 1 1h3.5v-6h3v6H17a1 1 0 0 0 1-1V10"/></svg>
    Home
  </div>
  <div class="navtab" data-view="log">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11v11h-11z"/><path d="M9 10h5M9 13h5M9 16h2"/></svg>
    Log
  </div>
  <div class="navtab" data-view="data">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19V10M12 19V5M19 19v-7"/></svg>
    Data
  </div>
  <div class="navtab" data-view="peptides">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="9.5" width="15" height="7" rx="3.5" transform="rotate(-30 12 13)"/><path d="M9.5 11.5l3-1.7" stroke-width="1.5"/></svg>
    Peptides
  </div>
</div>

<div id="homeView"></div>

<div id="logView" style="display:none;">
  <div class="tabs" id="tabs"></div>
  <div style="padding: 0 0 12px;">
    <label style="color: var(--sub); font-size: 11.5px; font-weight: 700; display: block; margin-bottom: 6px;">SESSION DATE</label>
    <input type="date" id="sessionDate" style="width: 100%; background: var(--card); border: none; border-radius: var(--radius-sm); color: var(--text); padding: 10px; font-size: 14px; font-weight: 700; box-shadow: var(--shadow-sm); margin-bottom: 8px;">
    <div style="display:flex; gap:8px;">
      <button id="scheduleNoteBtn" style="flex:1; min-width:0; background:var(--card); color:var(--sub); border-radius:var(--radius-sm); padding:10px 8px; font-size:12.5px; font-weight:700; box-shadow: var(--shadow-sm); display:flex; align-items:center; justify-content:center; gap:5px;">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M14 3v4a1 1 0 0 0 1 1h4M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><path d="M9 13h6M9 17h4"/></svg>
        Note
      </button>
      <button id="editExercisesBtn" style="flex:1; min-width:0; background:var(--card); color:var(--sub); border-radius:var(--radius-sm); padding:10px 8px; font-size:12.5px; font-weight:700; box-shadow: var(--shadow-sm);">Edit</button>
    </div>
  </div>
  <div id="scheduleNoteDisplay"></div>
  <main id="main"><div class="loading">Loading...</div></main>
</div>

<div id="dataView" style="display:none;">
  <div class="segmented-nav" id="dataSubNav">
    <div class="seg-tab active" data-subview="exercise">By Exercise</div>
    <div class="seg-tab" data-subview="muscle">By Muscle Group</div>
    <div class="seg-tab" data-subview="body">Body</div>
  </div>
  <div class="tabs" id="dataTabs" style="padding-bottom:12px;"></div>
  <div id="dataList"></div>
</div>

<div id="peptideView" style="display:none;">
  <div id="peptideSnapshot" class="hero-card" style="display:flex; gap:20px;"></div>
  <div style="margin-bottom: 14px;">
    <label style="color: var(--sub); font-size: 11.5px; font-weight: 700; display: block; margin-bottom: 6px;">LOGGING FOR</label>
    <input type="date" id="peptideDate" style="width: 100%; background: var(--card); border: none; border-radius: var(--radius-sm); color: var(--text); padding: 10px; font-size: 14px; font-weight: 700; box-shadow: var(--shadow-sm);">
  </div>
  <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px;">
    <button id="calcToggleBtn" style="background:var(--card); color:var(--text); border-radius:10px; padding:10px 4px; font-size:11.5px; font-weight:700; box-shadow:var(--shadow-sm);">Dose Calculator</button>
    <button id="libraryToggleBtn" style="background:var(--card); color:var(--text); border-radius:10px; padding:10px 4px; font-size:11.5px; font-weight:700; box-shadow:var(--shadow-sm);">Peptide Library</button>
    <button id="stackToggleBtn" style="background:var(--card); color:var(--text); border-radius:10px; padding:10px 4px; font-size:11.5px; font-weight:700; box-shadow:var(--shadow-sm);">Manage Stack</button>
  </div>
  <div id="calcPanel" style="display:none; margin-bottom:14px;"></div>
  <div id="libraryPanel" style="display:none; margin-bottom:14px;"></div>
  <div id="stackPanel" style="display:none; margin-bottom:14px;"></div>
  <div class="day-header-row" id="dayHeaderRow" style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:6px;"></div>
  <div id="peptideCards"></div>
</div>

<div class="toast" id="toast"></div>

<script>

// ============================================================

let appState = null;
let supabaseClient = null;
let cachedAccessToken = null;
let cachedUserId = null;
const LOCAL_CACHE_KEY = "ale-app-state-cache-v1";

function normalizeState(raw) {
  raw = raw || {};
  return {
    trainingLogs: raw.trainingLogs || [],
    peptideLog: {
      taken: (raw.peptideLog && raw.peptideLog.taken) || {},
      times: (raw.peptideLog && raw.peptideLog.times) || {},
      sites: (raw.peptideLog && raw.peptideLog.sites) || {},
    },
    workoutConfig: raw.workoutConfig || {},
    exerciseRegistry: raw.exerciseRegistry || { push: [], pull: [], legs: [] },
    vialTracker: raw.vialTracker || {},
    peptideConfig: raw.peptideConfig || JSON.parse(JSON.stringify(DEFAULT_PEPTIDES)),
    measurements: raw.measurements || [],
    scheduleNotes: raw.scheduleNotes || {},
    dayOverrides: raw.dayOverrides || {},
    finishedSessions: raw.finishedSessions || [],
    lastDeload: raw.lastDeload || null,
    weightBannerDismissedOn: raw.weightBannerDismissedOn || null,
  };
}

function setSaveIndicator(state) {
  const el = document.getElementById("saveIndicator");
  if (!el) return;
  if (state === "saving") {
    el.textContent = "● saving";
    el.className = "show";
  } else if (state === "saved") {
    el.textContent = "✓ saved";
    el.className = "show";
    setTimeout(() => { el.className = ""; }, 1200);
  } else if (state === "error") {
    el.textContent = "⚠ not saved";
    el.className = "show err";
  }
}

// This is the actual fix for every sync bug that came before: every save
// is a direct, awaited write to the database. Nothing is considered "done"
// until Supabase confirms it. No debounce, no background timer, no race
// between "did it save yet" and "the app just closed."
async function saveState() {
  setSaveIndicator("saving");
  try {
    const { error } = await supabaseClient.from("app_state").upsert({
      user_id: cachedUserId,
      data: appState,
      updated_at: new Date().toISOString(),
    });
    if (error) throw error;
    localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(appState));
    setSaveIndicator("saved");
  } catch (e) {
    console.error("Save failed", e);
    setSaveIndicator("error");
    showToast("Save failed, check your connection", true);
    throw e;
  }
}

async function loadStateFromCloud() {
  try {
    const { data, error } = await supabaseClient
      .from("app_state")
      .select("data")
      .eq("user_id", cachedUserId)
      .maybeSingle();
    if (error) throw error;
    if (data && data.data) {
      appState = normalizeState(data.data);
      localStorage.setItem(LOCAL_CACHE_KEY, JSON.stringify(appState));
    } else {
      appState = normalizeState({});
      await saveState();
    }
  } catch (e) {
    console.error("Load from cloud failed, falling back to local cache", e);
    const cached = localStorage.getItem(LOCAL_CACHE_KEY);
    appState = normalizeState(cached ? JSON.parse(cached) : {});
    showToast("Offline, showing last saved data", true);
  }
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}
function nowTimeStr() {
  const d = new Date();
  return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
}
function parseUTC(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return Date.UTC(y, m - 1, d);
}
function addDaysLocal(dateStr, n) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + n);
  return dt.getFullYear() + "-" + String(dt.getMonth() + 1).padStart(2, "0") + "-" + String(dt.getDate()).padStart(2, "0");
}
function formatDateLabel(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  const today = todayStr();
  const yesterday = addDaysLocal(today, -1);
  if (dateStr === today) return "Today";
  if (dateStr === yesterday) return "Yesterday";
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function epley1RM(weight, reps) { return weight * (1 + reps / 30); }
const RPE_MIN_WEIGHT = 10;
const RIR_PCT_DROPS = [0, 4, 8, 14, 22, 30, 38];
function pctDropToRIR(dropPct) {
  for (let i = 0; i < RIR_PCT_DROPS.length - 1; i++) {
    if (dropPct <= RIR_PCT_DROPS[i + 1]) {
      const frac = (dropPct - RIR_PCT_DROPS[i]) / (RIR_PCT_DROPS[i + 1] - RIR_PCT_DROPS[i]);
      return i + frac;
    }
  }
  return RIR_PCT_DROPS.length - 1;
}
function getBaseline1RM(name, beforeDate) {
  const windowStart = addDaysLocal(beforeDate, -60);
  const priorSets = appState.trainingLogs.filter(l => l.exercise === name && l.date < beforeDate && l.date >= windowStart && l.reps && l.weight >= RPE_MIN_WEIGHT);
  if (!priorSets.length) return null;
  return Math.max(...priorSets.map(s => epley1RM(s.weight, s.reps)));
}
function estimateRPE(weight, reps, baseline1RM) {
  if (!baseline1RM || !reps || weight < RPE_MIN_WEIGHT) return null;
  const setE1RM = epley1RM(weight, reps);
  const gapPct = ((baseline1RM - setE1RM) / baseline1RM) * 100;
  const rir = pctDropToRIR(Math.max(0, gapPct));
  const rpe = Math.round((10 - rir) * 2) / 2;
  return Math.max(1, Math.min(10, rpe));
}
function pickRepresentativeSet(sets, range) {
  if (!sets.length) return null;
  const byWeightThenReps = (max, s) => (s.weight > max.weight || (s.weight === max.weight && (s.reps || 0) > (max.reps || 0))) ? s : max;
  if (!range) return sets.reduce(byWeightThenReps, sets[0]);
  const [lo] = range;
  const qualifying = sets.filter(s => s.reps && s.reps >= lo);
  if (qualifying.length) return qualifying.reduce(byWeightThenReps, qualifying[0]);
  return sets.reduce((max, s) => (s.reps || 0) > (max.reps || 0) ? s : max, sets[0]);
}
function getLatestBodyweight() {
  const entries = getMeasurementEntries("Weight");
  return entries.length ? entries[0].value : null;
}
function formatWeightDisplay(entry) {
  if (entry.bodyweight) return entry.addedWeight ? `BW+${entry.addedWeight}` : "BW";
  return String(entry.weight);
}

function getExerciseLogs(name) {
  return appState.trainingLogs.filter(l => l.exercise === name).sort((a, b) => b.date.localeCompare(a.date));
}
function getPR(name) {
  const entries = getExerciseLogs(name);
  if (!entries.length) return null;
  return entries.reduce((max, e) => e.weight > max.weight ? e : max, entries[0]);
}
function getLastSession(name, beforeDate) {
  const entries = getExerciseLogs(name).filter(e => e.date < beforeDate);
  if (!entries.length) return null;
  const mostRecentDate = entries[0].date;
  const sameDay = entries.filter(e => e.date === mostRecentDate);
  const best = pickRepresentativeSet(sameDay, REP_RANGE_MAP[name]);
  return { date: mostRecentDate, weight: best.weight, reps: best.reps, bodyweight: best.bodyweight, addedWeight: best.addedWeight };
}
function getTrendArrow(name) {
  const entries = getExerciseLogs(name);
  const dates = [...new Set(entries.map(e => e.date))];
  if (dates.length < 2) return null;
  const range = REP_RANGE_MAP[name];
  const e1RMOnDate = d => {
    const rep = pickRepresentativeSet(entries.filter(e => e.date === d), range);
    return rep && rep.reps ? epley1RM(rep.weight, rep.reps) : (rep ? rep.weight : 0);
  };
  const latest = e1RMOnDate(dates[0]);
  const prior = e1RMOnDate(dates[1]);
  if (latest > prior * 1.01) return { arrow: "▲", color: "var(--push)" };
  if (latest < prior * 0.99) return { arrow: "▼", color: "var(--legs)" };
  return { arrow: "▬", color: "var(--sub)" };
}
// A note on a date means the lifter already explained what happened, don't
// second-guess it with the automatic regression math.
function getCoachTip(name, beforeDate) {
  const range = REP_RANGE_MAP[name];
  if (!range) return null;
  const entries = getExerciseLogs(name);
  const dates = [...new Set(entries.map(e => e.date))].filter(d => d < beforeDate).sort((a, b) => b.localeCompare(a));
  if (!dates.length) return "Log a session or two here and I'll start giving tips.";

  const lastDate = dates[0];
  if (appState.scheduleNotes[lastDate]) {
    return `Note from that day: "${appState.scheduleNotes[lastDate]}" — not reading this as a decline.`;
  }
  const lastSets = entries.filter(e => e.date === lastDate);
  const topSet = pickRepresentativeSet(lastSets, range);
  const baselineForLast = getBaseline1RM(name, lastDate);
  const rpeLast = estimateRPE(topSet.weight, topSet.reps, baselineForLast);

  let regressed = false;
  if (dates.length >= 2) {
    const priorSets = entries.filter(e => e.date === dates[1]);
    const priorTop = pickRepresentativeSet(priorSets, range);
    if (priorTop && topSet.reps && priorTop.reps) {
      const currentE1RM = epley1RM(topSet.weight, topSet.reps);
      const priorE1RM = epley1RM(priorTop.weight, priorTop.reps);
      if (currentE1RM < priorE1RM * 0.97) regressed = true;
    } else if (priorTop && topSet.weight < priorTop.weight) {
      regressed = true;
    }
  }
  const [lo, hi] = range;
  if (regressed) return "Dropped from the session before that, hold here and check sleep/food before pushing more.";
  if (topSet.reps && topSet.reps >= hi) {
    if (rpeLast !== null && rpeLast >= 9) return `Topped your rep range last time at a hard effort (est. RPE ${rpeLast}). Hold this weight one more session.`;
    return `Topped your rep range last time. Try adding weight this session.`;
  }
  if (topSet.reps && topSet.reps < lo) return `Came in under range last time (${topSet.reps} reps). Hold weight, aim for ${lo}+.`;
  return `In range last time. Build toward ${hi} reps before adding weight.`;
}

function getBelowRangeMuscles() {
  const sevenDaysAgo = addDaysLocal(todayStr(), -6);
  const counts = {};
  appState.trainingLogs.forEach(l => {
    if (l.date < sevenDaysAgo) return;
    const muscle = MUSCLE_MAP[l.exercise];
    if (!muscle) return;
    counts[muscle] = (counts[muscle] || 0) + 1;
  });
  const allMuscles = [...new Set(Object.values(MUSCLE_MAP))];
  return allMuscles.map(m => ({ muscle: m, count: counts[m] || 0 })).filter(x => x.count < VOLUME_LANDMARKS.low).sort((a, b) => a.count - b.count);
}
function getVolumeSuggestion(muscle) {
  for (const [day, info] of Object.entries(activeDays)) {
    for (const ex of info.exercises) {
      if (MUSCLE_MAP[ex] === muscle) return `Add a set to ${ex} on ${day} to close the gap.`;
    }
  }
  return null;
}

// DELOAD (performance-based only, no calendar-days auto-trigger,
// this is the fix for it "always being there")
// ============================================================
function computeAvgRPELast7Days() {
  const cutoff = addDaysLocal(todayStr(), -6);
  let total = 0, count = 0;
  appState.trainingLogs.forEach(l => {
    if (l.date < cutoff || !l.reps) return;
    const baseline = getBaseline1RM(l.exercise, l.date);
    const rpe = estimateRPE(l.weight, l.reps, baseline);
    if (rpe !== null) { total += rpe; count++; }
  });
  return count ? total / count : null;
}
function countDecliningExercises() {
  let count = 0;
  const allNames = [...new Set(Object.values(registry).flat())];
  const cutoff = addDaysLocal(todayStr(), -14);
  allNames.forEach(name => {
    const entries = getExerciseLogs(name);
    const dates = [...new Set(entries.map(e => e.date))];
    if (dates.length < 2 || dates[0] < cutoff) return;
    const trend = getTrendArrow(name);
    if (trend && trend.arrow === "▼") count++;
  });
  return count;
}
function getDeloadStatus() {
  const lastDeload = appState.lastDeload;
  if (lastDeload && lastDeload >= addDaysLocal(todayStr(), -9)) return { flag: false };
  const avgRPE = computeAvgRPELast7Days();
  const declineCount = countDecliningExercises();
  // Only real performance signals trigger this now, no time-based fallback.
  if ((avgRPE !== null && avgRPE >= 9) || declineCount >= 3) {
    return { flag: true, avgRPE, declineCount };
  }
  return { flag: false };
}

  wrap.style.cssText = "background:#1a2a3d; border-radius:16px; padding:14px; margin-bottom:12px;";
  const reason = status.avgRPE >= 9 ? `Average estimated RPE across the last 7 days is ${status.avgRPE.toFixed(1)}` : `${status.declineCount} exercises trending down over the last two sessions`;
  wrap.innerHTML = `

    <div style="font-size:12px; color:var(--sub); line-height:1.5; margin-bottom:10px;">${reason}. Consider a deload week: same exercises, roughly 40-50% less weight, stay around RPE 5-6.</div>

// ============================================================
// SHARED SET-LOGGING COMPONENT
// One implementation used everywhere a set gets logged (main exercise
// cards AND the abs quick-log), instead of two separate hand-rolled
// versions that could each go wrong in their own way. This is the actual
// root-cause fix for the abs button: it now runs the exact same, already
//-hardened code path as every other exercise, not a bespoke mini version.
// ============================================================
function buildSetLogRow(exerciseName, onLogged) {
  const wrap = document.createElement("div");
  wrap.className = "logrow";
  wrap.innerHTML = `
    <button class="bw-toggle" type="button">BW</button>
    <input type="number" inputmode="decimal" placeholder="Weight" class="w-input">
    <input type="number" inputmode="numeric" placeholder="Reps" class="r-input">
    <button class="log-btn">Log</button>
  `;
  const bwToggle = wrap.querySelector(".bw-toggle");
  const wInput = wrap.querySelector(".w-input");
  const rInput = wrap.querySelector(".r-input");
  const btn = wrap.querySelector(".log-btn");
  let bwMode = false;
  bwToggle.onclick = () => {
    bwMode = !bwMode;
    bwToggle.classList.toggle("on", bwMode);
    wInput.placeholder = bwMode ? "+ weight (0 = BW)" : "Weight";
  };
  btn.onclick = async () => {
    const reps = rInput.value ? parseInt(rInput.value) : null;
    let weight, addedWeight, isBW = false;
    if (bwMode) {
      addedWeight = wInput.value ? parseFloat(wInput.value) : 0;
      const bw = getLatestBodyweight();
      if (bw === null) { showToast("Log your bodyweight in the Body tab first"); return; }
      weight = bw + addedWeight;
      isBW = true;
    } else {
      // Fixed for good: "0" is a legitimate weight, only an empty field
      // should be rejected. The old bug rejected literal 0 because
      // JavaScript treats 0 as falsy.
      if (wInput.value === "") { showToast("Enter a weight (0 is fine)"); return; }
      weight = parseFloat(wInput.value);
    }
    const priorPR = getPR(exerciseName);
    const entry = { id: Date.now() + Math.random(), date: sessionDate, day: currentDay, exercise: exerciseName, weight, reps };
    if (isBW) { entry.bodyweight = true; entry.addedWeight = addedWeight; }
    appState.trainingLogs.push(entry);
    try {
      await saveState();
    } catch (e) {
      appState.trainingLogs = appState.trainingLogs.filter(l => l.id !== entry.id);
      return;
    }
    wInput.value = ""; rInput.value = "";
    if (!priorPR || weight > priorPR.weight) showPRToast(exerciseName, weight); else showToast(exerciseName + " logged");
    if (onLogged) onLogged();
  };
  return wrap;
}

// WORKOUT CONFIG (activeDays merges DEFAULT_DAYS with appState.workoutConfig)
// ============================================================
let activeDays = {};
let registry = { push: [], pull: [], legs: [] };

function rebuildActiveDaysAndRegistry() {
  activeDays = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  const overrides = appState.workoutConfig || {};
  Object.keys(overrides).forEach(day => {
    if (!activeDays[day]) return;
    const val = overrides[day];
    activeDays[day].exercises = val.exercises || activeDays[day].exercises;
    activeDays[day].supersets = val.supersets || [];
  });

  registry = appState.exerciseRegistry && Object.keys(appState.exerciseRegistry).length
    ? JSON.parse(JSON.stringify(appState.exerciseRegistry))
    : { push: [], pull: [], legs: [] };
  ["push", "pull", "legs"].forEach(type => {
    if (!registry[type]) registry[type] = [];
    Object.values(DEFAULT_DAYS).filter(d => d.type === type).forEach(d => {
      d.exercises.forEach(ex => { if (!registry[type].includes(ex)) registry[type].push(ex); });
    });
    Object.values(activeDays).filter(d => d.type === type).forEach(d => {
      d.exercises.forEach(ex => { if (!registry[type].includes(ex)) registry[type].push(ex); });
    });
  });
  appState.exerciseRegistry = registry;
}

async function saveWorkoutConfig() {
  const overrides = {};
  Object.keys(activeDays).forEach(day => {
    overrides[day] = { exercises: activeDays[day].exercises, supersets: activeDays[day].supersets || [] };
  });
  appState.workoutConfig = overrides;
  await saveState();
}

// ============================================================
// DRAG REORDER (touch + mouse via pointer events)
// ============================================================
function enableDragReorder(row, container) {
  const handle = row.querySelector(".drag-handle");
  if (!handle) return;
  handle.style.touchAction = "none";
  handle.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    row.setPointerCapture(e.pointerId);
    row.style.position = "relative";
    row.style.zIndex = "10";
    row.style.boxShadow = "var(--shadow)";
    row.style.transition = "none";
    row.style.background = "var(--card-hi)";
    row.style.borderRadius = "12px";
    let startY = e.clientY;
    const onMove = (moveEvent) => {
      const deltaY = moveEvent.clientY - startY;
      row.style.transform = `translateY(${deltaY}px)`;
      const prev = row.previousElementSibling;
      const next = row.nextElementSibling;
      const rowRect = row.getBoundingClientRect();
      if (prev) {
        const prevRect = prev.getBoundingClientRect();
        if (rowRect.top < prevRect.top + prevRect.height / 2) {
          container.insertBefore(row, prev);
          startY = moveEvent.clientY;
          row.style.transform = "translateY(0px)";
        }
      }
      if (next) {
        const nextRect = next.getBoundingClientRect();
        if (rowRect.bottom > nextRect.top + nextRect.height / 2) {
          container.insertBefore(row, next.nextSibling);
          startY = moveEvent.clientY;
          row.style.transform = "translateY(0px)";
        }
      }
    };
    const onUp = () => {
      row.style.transform = ""; row.style.position = ""; row.style.zIndex = "";
      row.style.boxShadow = ""; row.style.transition = ""; row.style.background = "";
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
    };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  });
}

      const rm = document.createElement("span");

      rm.textContent = "×";
      rm.onclick = () => { editorSupersets.splice(idx, 1); renderSupersetSection(); };

      supersetSection.appendChild(pairRow);

function getRecentSessions(rangeDays) {
  const cutoff = addDaysLocal(todayStr(), -(rangeDays - 1));
  const grouped = {};
  appState.trainingLogs.forEach(l => {
    if (l.date < cutoff) return;
    const key = l.date + "_" + l.day;
    if (!grouped[key]) grouped[key] = { date: l.date, day: l.day, sets: [] };
    grouped[key].sets.push(l);
  });
  const loggedDates = new Set(Object.values(grouped).map(g => g.date));
  Object.keys(appState.scheduleNotes).forEach(date => {
    if (date < cutoff || loggedDates.has(date)) return;
    grouped[date + "_noSession"] = { date, day: null, sets: [] };
  });
  return Object.values(grouped).sort((a, b) => b.date.localeCompare(a.date)).map(g => {
    const byExercise = {};
    g.sets.forEach(s => { if (!byExercise[s.exercise]) byExercise[s.exercise] = []; byExercise[s.exercise].push(s); });
    return { date: g.date, day: g.day, exerciseCount: Object.keys(byExercise).length, setCount: g.sets.length, note: appState.scheduleNotes[g.date] || null, byExercise };
  });
}

// ============================================================
// PEPTIDES
// ============================================================
let peptides = [];
function rebuildPeptides() {
  peptides = appState.peptideConfig && appState.peptideConfig.length ? appState.peptideConfig : JSON.parse(JSON.stringify(DEFAULT_PEPTIDES));
}
async function savePeptideConfig() { appState.peptideConfig = peptides; await saveState(); }

function dayDiff(startStr, dateStr) { return Math.round((parseUTC(dateStr) - parseUTC(startStr)) / 86400000); }
function mondayOffset(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const wd = new Date(Date.UTC(y, m - 1, d)).getUTCDay();
  return (wd + 6) % 7;
}
function buildGridDates(weeks) {
  const today = todayStr();
  const mondayThisWeek = addDaysLocal(today, -mondayOffset(today));
  const gridStart = addDaysLocal(mondayThisWeek, -7 * (weeks - 1));
  const dates = [];
  for (let i = 0; i < weeks * 7; i++) dates.push(addDaysLocal(gridStart, i));
  return dates;
}
function getPeptideStatus(p, dateStr) {
  const diff = dayDiff(p.start, dateStr);
  if (diff < 0) return { state: "not-started" };
  if (p.pattern === "daily") return { state: "due", dayNum: diff + 1 };
  if (p.pattern === "daily-finite") {
    if (diff >= p.cycleDays) return { state: "complete", dayNum: p.cycleDays };
    return { state: "due", dayNum: diff + 1, totalDays: p.cycleDays };
  }
  if (p.pattern === "weekly") {
    const dayNum = Math.floor(diff / 7) + 1;
    if (diff % 7 === 0) return { state: "due", dayNum };
    return { state: "off", dayNum, daysUntil: 7 - (diff % 7) };
  }
  if (p.pattern === "5on2off") {
    const cyclePos = diff % 7;
    const cycleNum = Math.floor(diff / 7) + 1;
    if (cyclePos < 5) return { state: "due", dayNum: cyclePos + 1, cycleNum, onOff: "on" };
    return { state: "off", dayNum: cyclePos - 4, cycleNum, onOff: "off" };
  }
  return { state: "due" };
}
function getWeeklyAdherence(p) {
  const today = todayStr();
  let due = 0, taken = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDaysLocal(today, -i);
    const status = getPeptideStatus(p, d);
    if (status.state !== "due") continue;
    due++;
    if (p.twiceDaily) {
      const amDone = (appState.peptideLog.taken[p.id] || []).includes(d + "_AM");
      const pmDone = (appState.peptideLog.taken[p.id] || []).includes(d + "_PM");
      if (amDone && pmDone) taken++;
    } else {
      if ((appState.peptideLog.taken[p.id] || []).includes(d)) taken++;
    }
  }
  return { due, taken };
}
function getEligibleSites(peptideId) { return SITE_RESTRICTIONS[peptideId] || INJECTION_SITES; }
function getSuggestedSite(peptideId, date) {
  const eligible = getEligibleSites(peptideId);
  const siteLog = (appState.peptideLog.sites || {})[peptideId] || {};
  const lastUsedKey = {};
  Object.keys(siteLog).sort().forEach(key => { lastUsedKey[siteLog[key]] = key; });
  const usedTodayByOthers = new Set();
  if (date) {
    peptides.forEach(p => {
      if (p.id === peptideId) return;
      const otherEligible = getEligibleSites(p.id);
      if (!otherEligible.some(s => eligible.includes(s))) return;
      const otherSiteLog = (appState.peptideLog.sites || {})[p.id] || {};
      Object.keys(otherSiteLog).forEach(key => { if (key.startsWith(date)) usedTodayByOthers.add(otherSiteLog[key]); });
    });
  }
  const preferred = eligible.filter(s => !usedTodayByOthers.has(s));
  const pool = preferred.length ? preferred : eligible;
  let best = pool[0], bestKey = lastUsedKey[best] || "";
  pool.forEach(site => { const key = lastUsedKey[site] || ""; if (key < bestKey) { best = site; bestKey = key; } });
  return best;
}
function getVialRemaining(p) {
  const startDate = (appState.vialTracker[p.id] && appState.vialTracker[p.id].startDate) || p.start;
  let used = 0;
  (appState.peptideLog.taken[p.id] || []).forEach(key => {
    const date = key.split("_")[0];
    if (date < startDate) return;
    if (p.twiceDaily) {
      if (key.endsWith("_AM")) used += p.unitsPerDoseAM;
      else if (key.endsWith("_PM")) used += p.unitsPerDosePM;
    } else { used += p.unitsPerDose; }
  });
  return { remaining: Math.max(0, p.vialUnits - used), total: p.vialUnits, used };
}
function estimateDaysRemaining(p, remaining) {
  let perWeekUnits;
  if (p.twiceDaily) perWeekUnits = (p.unitsPerDoseAM + p.unitsPerDosePM) * 7;
  else if (p.pattern === "weekly") perWeekUnits = p.unitsPerDose;
  else if (p.pattern === "5on2off") perWeekUnits = p.unitsPerDose * 5;
  else perWeekUnits = p.unitsPerDose * 7;
  if (!perWeekUnits) return null;
  return Math.round((remaining / perWeekUnits) * 7);
}
function computeStreak() {
  let d = todayStr(), streak = 0, firstDay = true;
  while (true) {
    let dueCount = 0, takenCount = 0;
    peptides.forEach(p => {
      const status = getPeptideStatus(p, d);
      if (status.state === "due") {
        dueCount++;
        const done = p.twiceDaily
          ? (appState.peptideLog.taken[p.id] || []).includes(d + "_AM") && (appState.peptideLog.taken[p.id] || []).includes(d + "_PM")
          : (appState.peptideLog.taken[p.id] || []).includes(d);
        if (done) takenCount++;
      }
    });
    const complete = dueCount === 0 || takenCount === dueCount;
    if (!complete) { if (firstDay) { firstDay = false; d = addDaysLocal(d, -1); continue; } break; }
    if (dueCount > 0) streak++;
    firstDay = false;
    d = addDaysLocal(d, -1);
    if (streak > 365) break;
    if (!peptides.some(p => d >= p.start)) break;
  }
  return streak;
}
function getDosesTodayStat() {
  const today = todayStr();
  let due = 0, taken = 0;
  peptides.forEach(p => {
    const status = getPeptideStatus(p, today);
    if (status.state !== "due") return;
    due++;
    const done = p.twiceDaily
      ? (appState.peptideLog.taken[p.id] || []).includes(today + "_AM") && (appState.peptideLog.taken[p.id] || []).includes(today + "_PM")
      : (appState.peptideLog.taken[p.id] || []).includes(today);
    if (done) taken++;
  });
  return { due, taken };
}
function renderPeptideSnapshot() {
  const el = document.getElementById("peptideSnapshot");
  if (!el) return;
  const streak = computeStreak();
  const doses = getDosesTodayStat();
  el.innerHTML = `
    <div style="flex:1;"><div class="eyebrow">Streak</div><div class="hero-number" style="font-size:24px; margin-top:4px; color:var(--gold);">${streak} day${streak === 1 ? '' : 's'}</div></div>
    <div style="flex:1;"><div class="eyebrow">Doses Today</div><div class="hero-number" style="font-size:24px; margin-top:4px;">${doses.taken}/${doses.due}</div></div>
  `;
}

  row.innerHTML = ["M", "T", "W", "T", "F", "S", "S"].map(l => `<div style="text-align:center; font-size:10px; font-weight:800; color:var(--sub-dim); text-transform:uppercase;">${l}</div>`).join("");
}

        <button class="pep-btn" data-slot="PM" style="flex:1; background:${takenPM ? 'var(--card-hi)' : 'var(--text)'}; color:${takenPM ? 'var(--sub)' : 'var(--bg)'}; border-radius:8px; font-weight:800; font-size:13px; padding:10px;">${takenPM ? 'PM done' : 'Mark PM'}</button>
      `;
      const timeInput = actions.querySelector(".pep-time-input");
      const siteInput = actions.querySelector(".pep-site-input");
      actions.querySelectorAll(".pep-btn").forEach(btn => {
        btn.onclick = async () => {
          const key = today + "_" + btn.dataset.slot;
          if (!appState.peptideLog.taken[p.id]) appState.peptideLog.taken[p.id] = [];
          if (!appState.peptideLog.times[p.id]) appState.peptideLog.times[p.id] = {};
          if (!appState.peptideLog.sites[p.id]) appState.peptideLog.sites[p.id] = {};
          const idx = appState.peptideLog.taken[p.id].indexOf(key);
          if (idx >= 0) { appState.peptideLog.taken[p.id].splice(idx, 1); delete appState.peptideLog.times[p.id][key]; delete appState.peptideLog.sites[p.id][key]; }
          else { appState.peptideLog.taken[p.id].push(key); appState.peptideLog.times[p.id][key] = timeInput.value || nowTimeStr(); appState.peptideLog.sites[p.id][key] = siteInput.value; }
          await saveState();
          renderPeptideTab();
        };
      });
      card.appendChild(actions);
    } else if (status.state === "due" || status.state === "off") {
      const actions = document.createElement("div");
      actions.style.cssText = "margin-top:12px; display:flex; gap:8px; align-items:center; flex-wrap:wrap;";
      const canToggle = status.state === "due";
      const suggestedSite = getSuggestedSite(p.id, today);
      const siteOptions = getEligibleSites(p.id).map(s => `<option value="${s}" ${s === suggestedSite ? 'selected' : ''}>${s}${s === suggestedSite ? ' (suggested)' : ''}</option>`).join("");
      actions.innerHTML = `
        ${canToggle ? `<input type="time" class="pep-time-input" value="${nowTimeStr()}" style="flex:1; min-width:100px; background: var(--card-hi); border-radius: 8px; color: var(--text); padding: 9px 8px; font-size: 13px;">` : ''}
        ${canToggle ? `<select class="pep-site-input" style="flex:1; min-width:130px; background: var(--card-hi); border-radius: 8px; color: var(--text); padding: 9px 8px; font-size: 13px;">${siteOptions}</select>` : ''}
        <button class="pep-btn" ${canToggle ? '' : 'disabled style="opacity:0.4"'} style="flex:1; background:${takenToday ? 'var(--card-hi)' : 'var(--text)'}; color:${takenToday ? 'var(--sub)' : 'var(--bg)'}; border-radius:8px; font-weight:800; font-size:13px; padding:10px;">${takenToday ? 'Mark not taken' : 'Mark taken'}</button>
      `;
      if (canToggle) {
        const timeInput = actions.querySelector(".pep-time-input");
        const siteInput = actions.querySelector(".pep-site-input");
        actions.querySelector(".pep-btn").onclick = async () => {
          if (!appState.peptideLog.taken[p.id]) appState.peptideLog.taken[p.id] = [];
          if (!appState.peptideLog.times[p.id]) appState.peptideLog.times[p.id] = {};
          if (!appState.peptideLog.sites[p.id]) appState.peptideLog.sites[p.id] = {};
          const idx = appState.peptideLog.taken[p.id].indexOf(today);
          if (idx >= 0) { appState.peptideLog.taken[p.id].splice(idx, 1); delete appState.peptideLog.times[p.id][today]; delete appState.peptideLog.sites[p.id][today]; }
          else { appState.peptideLog.taken[p.id].push(today); appState.peptideLog.times[p.id][today] = timeInput.value || nowTimeStr(); appState.peptideLog.sites[p.id][today] = siteInput.value; }
          await saveState();
          renderPeptideTab();
        };
      }
      card.appendChild(actions);
    }

    const vial = getVialRemaining(p);
    const vialPct = Math.round((vial.remaining / vial.total) * 100);
    const vialColor = vialPct > 30 ? "var(--push)" : vialPct > 10 ? "var(--gold)" : "var(--legs)";
    const daysLeft = estimateDaysRemaining(p, vial.remaining);
    const vialWrap = document.createElement("div");
    vialWrap.style.cssText = "margin-top:14px; padding-top:14px; border-top:1px solid var(--line);";
    vialWrap.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span class="eyebrow">Vial</span>
        <span style="font-size:12.5px; font-weight:700; color:${vialColor};">${vial.remaining}/${vial.total} units &middot; ${vialPct}%</span>
      </div>
      <div class="thin-bar"><div class="thin-bar-fill" style="width:${vialPct}%; background:${vialColor};"></div></div>
      ${vialPct <= 30 ? `<div style="color:${vialColor}; font-size:11px; font-weight:700; margin-top:8px;">${vialPct <= 10 ? 'Critically low' : 'Getting low'}${daysLeft !== null ? ` &middot; ~${daysLeft} day${daysLeft === 1 ? '' : 's'} left` : ''}, reorder soon</div>` : ''}
    `;
    const newVialBtn = document.createElement("button");
    newVialBtn.textContent = "Start New Vial";
    newVialBtn.style.cssText = "width:100%; margin-top:10px; background:var(--card-hi); color:var(--sub); border-radius:12px; padding:9px; font-weight:700; font-size:11.5px;";
    newVialBtn.onclick = () => {
      showConfirmModal(`Mixed a new ${p.name} vial today? This resets the tracker to ${p.vialUnits} units remaining.`, "Start New Vial", async () => {
        appState.vialTracker[p.id] = { startDate: todayStr() };
        await saveState();
        showToast("New vial started");
        renderPeptideTab();
      }, false);
    };
    vialWrap.appendChild(newVialBtn);
    card.appendChild(vialWrap);

    const dotsWrap = document.createElement("div");
    dotsWrap.style.cssText = "display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top:12px;";
    const gridDates = buildGridDates(3);
    const realToday = todayStr();
    gridDates.forEach(d => {
      const dStatus = getPeptideStatus(p, d);
      const dot = document.createElement("div");
      let bg = "var(--card-hi)";
      if (dStatus.state === "due") {
        if (p.twiceDaily) {
          const amDone = (appState.peptideLog.taken[p.id] || []).includes(d + "_AM");
          const pmDone = (appState.peptideLog.taken[p.id] || []).includes(d + "_PM");
          if (amDone && pmDone) bg = "var(--push)";
          else if (amDone || pmDone) bg = "linear-gradient(90deg, var(--push) 50%, var(--card-hi) 50%)";
        } else if ((appState.peptideLog.taken[p.id] || []).includes(d)) bg = "var(--push)";
      }
      dot.style.cssText = `aspect-ratio:1; border-radius:7px; background:${bg}; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:700; color:${bg.includes('var(--push)') ? '#0a0e12' : 'var(--sub)'};`;
      if (dStatus.state !== "due") dot.style.background = "repeating-linear-gradient(135deg, var(--card-hi), var(--card-hi) 3px, #151c24 3px, #151c24 6px)";
      dot.textContent = String(parseInt(d.split("-")[2], 10));
      dot.title = d;
      if (d === realToday) { dot.style.outline = "2px solid var(--gold)"; dot.style.outlineOffset = "1px"; }
      dotsWrap.appendChild(dot);
    });
    card.appendChild(dotsWrap);

    const allTaken = (appState.peptideLog.taken[p.id] || []).slice().sort().reverse();
    if (allTaken.length) {
      const expand = document.createElement("div");
      expand.className = "expand";
      expand.style.marginTop = "10px";
      allTaken.forEach(key => {
        const [dateStr, slot] = key.split("_");
        const time = (appState.peptideLog.times[p.id] || {})[key];
        const site = (appState.peptideLog.sites[p.id] || {})[key];
        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML = `<span>${dateStr}${slot ? ' &middot; ' + slot : ''}${time ? ' &middot; ' + time : ''}${site ? ' &middot; ' + site : ''}</span><span class="del">${ICONS.trash}</span>`;
        row.querySelector(".del").onclick = () => {
          showConfirmModal(`Delete this ${p.name} dose log (${dateStr}${slot ? ' ' + slot : ''})? This can't be undone.`, "Delete", async () => {
            appState.peptideLog.taken[p.id] = appState.peptideLog.taken[p.id].filter(k => k !== key);
            if (appState.peptideLog.times[p.id]) delete appState.peptideLog.times[p.id][key];
            if (appState.peptideLog.sites[p.id]) delete appState.peptideLog.sites[p.id][key];
            await saveState();
            renderPeptideTab();
          });
        };
        expand.appendChild(row);
      });
      card.appendChild(expand);
      const cardHeadArea = card.querySelector("div");
      cardHeadArea.style.cursor = "pointer";
      const chevronIcon = document.createElement("span");
      chevronIcon.style.cssText = "color:var(--sub-dim); transition:transform 0.25s ease; margin-top:2px;";
      chevronIcon.innerHTML = ICONS.chevron;
      cardHeadArea.appendChild(chevronIcon);
      cardHeadArea.onclick = () => {
        const isOpen = expand.classList.toggle("open");
        chevronIcon.style.transform = isOpen ? "rotate(180deg)" : "rotate(0deg)";
      };
    }
    wrap.appendChild(card);
  }
}

function buildCalcPanel() {
  const panel = document.getElementById("calcPanel");
  panel.innerHTML = `
    <div class="card" style="padding:18px;">
      <div style="font-weight:800; font-size:13.5px; margin-bottom:10px;">Reconstitution &amp; Dose Calculator</div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px;">
        <div><label class="modal-label">VIAL SIZE (mg)</label><input type="number" inputmode="decimal" id="calcVialMg" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:9px; font-size:14px;"></div>
        <div><label class="modal-label">BAC WATER (mL)</label><input type="number" inputmode="decimal" id="calcBacMl" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:9px; font-size:14px;"></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px;">
        <div><label class="modal-label">TARGET DOSE</label><input type="number" inputmode="decimal" id="calcDose" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:9px; font-size:14px;"></div>
        <div><label class="modal-label">UNIT</label>
          <select id="calcDoseUnit" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:9px; font-size:14px;">
            <option value="mg">mg</option><option value="mcg">mcg</option>
          </select>
        </div>
      </div>
      <div id="calcResult" style="background:var(--card-hi); border-radius:10px; padding:12px; text-align:center; font-weight:800; font-size:16px; color:var(--gold); margin-bottom:12px;">Enter values above</div>
      <svg id="syringeSvg" viewBox="0 0 260 70" style="width:100%; height:70px; display:block;">
        <rect x="10" y="24" width="200" height="22" rx="3" fill="none" stroke="var(--line)" stroke-width="2"/>
        <rect id="syringeFill" x="10" y="24" width="0" height="22" rx="3" fill="var(--gold)" opacity="0.85"/>
        <line x1="10" y1="24" x2="10" y2="46" stroke="var(--sub)" stroke-width="2"/>
        <rect x="210" y="30" width="30" height="10" fill="var(--sub)"/>
        <line x1="240" y1="35" x2="256" y2="35" stroke="var(--sub)" stroke-width="2"/>
      </svg>
      <div style="color:var(--sub); font-size:10px; margin-top:8px; line-height:1.5;">Assumes a U-100 syringe (1 mL = 100 units). Double check against your own protocol before drawing.</div>
    </div>
  `;
  const recalc = () => {
    const vialMg = parseFloat(document.getElementById("calcVialMg").value);
    const bacMl = parseFloat(document.getElementById("calcBacMl").value);
    const doseVal = parseFloat(document.getElementById("calcDose").value);
    const unit = document.getElementById("calcDoseUnit").value;
    const result = document.getElementById("calcResult");
    const fillRect = document.getElementById("syringeFill");
    if (!vialMg || !bacMl || !doseVal) { result.textContent = "Enter values above"; fillRect.setAttribute("width", 0); return; }
    const doseMg = unit === "mcg" ? doseVal / 1000 : doseVal;
    const concentration = vialMg / bacMl;
    const units = (doseMg / concentration) * 100;
    result.textContent = units.toFixed(1) + " units";
    const barrelUnits = bacMl * 100;
    fillRect.setAttribute("width", Math.max(0, Math.min(200, (units / barrelUnits) * 200)));
  };
  ["calcVialMg", "calcBacMl", "calcDose", "calcDoseUnit"].forEach(id => { document.getElementById(id).oninput = recalc; });
}

function buildStackPanel() {
  const panel = document.getElementById("stackPanel");
  panel.innerHTML = "";
  const note = document.createElement("div");
  note.style.cssText = "color:var(--sub); font-size:11px; margin-bottom:12px; line-height:1.5;";
  note.textContent = "Add, edit, or remove peptides in your active stack. Dosing decisions are yours and whoever's supervising your protocol.";
  panel.appendChild(note);
  const rows = document.createElement("div");
  const makeRow = (p) => {
    const row = document.createElement("div");
    row.className = "card";
    row.style.cssText = "padding:14px; margin-bottom:10px;";
    const id = p.id || ("pep" + Date.now() + Math.floor(Math.random() * 1000));
    row.innerHTML = `
      <input type="hidden" class="f-id" value="${id}">
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;">
        <div><label class="modal-label">NAME</label><input type="text" class="f-name" value="${(p.name || '').replace(/"/g, '&quot;')}" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;"></div>
        <div><label class="modal-label">DOSE LABEL</label><input type="text" class="f-dose" value="${(p.dose || '').replace(/"/g, '&quot;')}" placeholder="e.g. 6 units" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;"></div>
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px;">
        <div><label class="modal-label">START DATE</label><input type="date" class="f-start" value="${p.start || todayStr()}" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;"></div>
        <div><label class="modal-label">PATTERN</label>
          <select class="f-pattern" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;">
            <option value="daily" ${p.pattern === "daily" ? "selected" : ""}>Daily</option>
            <option value="daily-finite" ${p.pattern === "daily-finite" ? "selected" : ""}>Daily, fixed-length cycle</option>
            <option value="weekly" ${p.pattern === "weekly" ? "selected" : ""}>Weekly</option>
            <option value="5on2off" ${p.pattern === "5on2off" ? "selected" : ""}>5 days on / 2 off</option>
          </select>
        </div>
      </div>
      <div class="cycleDaysWrap" style="margin-bottom:8px; ${p.pattern === 'daily-finite' ? '' : 'display:none;'}">
        <label class="modal-label">CYCLE LENGTH (DAYS)</label><input type="number" class="f-cycledays" value="${p.cycleDays || 50}" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;">
      </div>
      <label style="display:flex; align-items:center; gap:8px; font-size:12px; color:var(--sub); margin-bottom:8px;"><input type="checkbox" class="f-twicedaily" ${p.twiceDaily ? "checked" : ""}> Twice daily (AM + PM)</label>
      <div class="singleDoseWrap" style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; ${p.twiceDaily ? 'display:none;' : ''}">
        <div><label class="modal-label">UNITS PER DOSE</label><input type="number" class="f-unitsdose" value="${p.unitsPerDose || ''}" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;"></div>
        <div><label class="modal-label">VIAL SIZE (UNITS)</label><input type="number" class="f-vialunits" value="${p.vialUnits || ''}" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;"></div>
      </div>
      <div class="twiceDoseWrap" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:8px; ${p.twiceDaily ? '' : 'display:none;'}">
        <div><label class="modal-label">AM UNITS</label><input type="number" class="f-unitsam" value="${p.unitsPerDoseAM || ''}" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;"></div>
        <div><label class="modal-label">PM UNITS</label><input type="number" class="f-unitspm" value="${p.unitsPerDosePM || ''}" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;"></div>
        <div><label class="modal-label">VIAL SIZE (UNITS)</label><input type="number" class="f-vialunits2" value="${p.vialUnits || ''}" style="width:100%; background:var(--card-hi); border-radius:8px; color:var(--text); padding:8px; font-size:13px;"></div>
      </div>
      <button class="removeRowBtn" style="width:100%; background:var(--card-hi); color:var(--legs); border-radius:8px; padding:8px; font-weight:700; font-size:11.5px;">Remove from Stack</button>
    `;
    row.querySelector(".f-pattern").onchange = (e) => { row.querySelector(".cycleDaysWrap").style.display = e.target.value === "daily-finite" ? "" : "none"; };
    row.querySelector(".f-twicedaily").onchange = (e) => {
      row.querySelector(".singleDoseWrap").style.display = e.target.checked ? "none" : "grid";
      row.querySelector(".twiceDoseWrap").style.display = e.target.checked ? "grid" : "none";
    };
    row.querySelector(".removeRowBtn").onclick = () => {
      showConfirmModal(`Remove ${p.name || "this peptide"} from your stack? Its logged history stays saved.`, "Remove", () => row.remove());
    };
    return row;
  };
  peptides.forEach(p => rows.appendChild(makeRow(p)));
  panel.appendChild(rows);

  const addBtn = document.createElement("button");
  addBtn.textContent = "+ Add Peptide";
  addBtn.style.cssText = "width:100%; margin-bottom:14px; background:var(--card-hi); border:1px dashed var(--line); color:var(--sub); border-radius:8px; padding:10px; font-weight:700; font-size:13px;";
  addBtn.onclick = () => { rows.appendChild(makeRow({ pattern: "daily", start: todayStr() })); };
  panel.appendChild(addBtn);

  const actions = document.createElement("div");
  actions.style.cssText = "display:flex; gap:8px;";
  const saveBtn = document.createElement("button");
  saveBtn.textContent = "Save Stack";
  saveBtn.style.cssText = "flex:1; background:var(--gold); color:var(--bg); border-radius:8px; padding:12px; font-weight:800; font-size:13.5px;";
  saveBtn.onclick = async () => {
    const newPeptides = [];
    [...rows.children].forEach((row, i) => {
      const name = row.querySelector(".f-name").value.trim();
      if (!name) return;
      const twiceDaily = row.querySelector(".f-twicedaily").checked;
      const pattern = row.querySelector(".f-pattern").value;
      const existingId = row.querySelector(".f-id").value;
      const p = { id: existingId || ("pep" + Date.now() + i), name, dose: row.querySelector(".f-dose").value.trim(), start: row.querySelector(".f-start").value || todayStr(), pattern, twiceDaily, color: PEPTIDE_COLORS[i % PEPTIDE_COLORS.length] };
      if (pattern === "daily-finite") p.cycleDays = parseInt(row.querySelector(".f-cycledays").value) || 50;
      if (twiceDaily) { p.unitsPerDoseAM = parseFloat(row.querySelector(".f-unitsam").value) || 0; p.unitsPerDosePM = parseFloat(row.querySelector(".f-unitspm").value) || 0; p.vialUnits = parseFloat(row.querySelector(".f-vialunits2").value) || 0; }
      else { p.unitsPerDose = parseFloat(row.querySelector(".f-unitsdose").value) || 0; p.vialUnits = parseFloat(row.querySelector(".f-vialunits").value) || 0; }
      newPeptides.push(p);
    });
    if (!newPeptides.length) { showToast("Add at least one peptide"); return; }
    peptides = newPeptides;
    await savePeptideConfig();
    showToast("Stack saved");
    document.getElementById("stackPanel").style.display = "none";
    renderPeptideTab();
  };
  const cancelBtn = document.createElement("button");
  cancelBtn.textContent = "Cancel";
  cancelBtn.style.cssText = "flex:1; background:var(--card-hi); color:var(--sub); border-radius:8px; padding:12px; font-weight:800; font-size:13.5px;";
  cancelBtn.onclick = () => { document.getElementById("stackPanel").style.display = "none"; };
  actions.appendChild(saveBtn); actions.appendChild(cancelBtn);
  panel.appendChild(actions);
}

let currentDataType = "push";

function buildChartSvg(entriesDesc) {
  const entries = entriesDesc.slice().sort((a, b) => a.date.localeCompare(b.date));
  const vals = entries.map(e => e.reps ? epley1RM(e.weight, e.reps) : e.weight);
  const w = 300, h = 90, pad = 8;
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 1;
  const points = vals.map((v, i) => [pad + (i / Math.max(1, vals.length - 1)) * (w - pad * 2), h - pad - ((v - minV) / range) * (h - pad * 2)]);
  const pathD = points.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
  const dots = points.map(pt => `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3" fill="var(--gold)"/>`).join("");
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:90px; display:block;"><path d="${pathD}" fill="none" stroke="var(--gold)" stroke-width="2"/>${dots}</svg>`;
}

function getMeasurementEntries(type) {
  return appState.measurements.filter(m => m.type === type).sort((a, b) => b.date.localeCompare(a.date));
}

function getSuggestedDay() {
  const today = todayStr();
  if (appState.dayOverrides[today] && TAB_ORDER.includes(appState.dayOverrides[today])) return appState.dayOverrides[today];
  const todaysLog = appState.trainingLogs.find(l => l.date === today);
  if (todaysLog && TAB_ORDER.includes(todaysLog.day)) return todaysLog.day;
  const priorDates = [...new Set(appState.trainingLogs.map(l => l.date))].filter(d => d < today).sort().reverse();
  if (!priorDates.length) return TAB_ORDER[0];
  const lastDayEntries = appState.trainingLogs.filter(l => l.date === priorDates[0]);
  const idx = TAB_ORDER.indexOf(lastDayEntries[0] ? lastDayEntries[0].day : null);
  if (idx === -1) return TAB_ORDER[0];
  return TAB_ORDER[(idx + 1) % TAB_ORDER.length];
}

function showDayPickerModal() {
  const overlay = document.createElement("div");
  overlay.className = "modal-overlay";
  const optionsHtml = TAB_ORDER.map(day => `<button class="dayPickBtn" data-day="${day}" style="width:100%; background:${day === currentDay ? 'var(--gold)' : 'var(--card-hi)'}; color:${day === currentDay ? 'var(--bg)' : 'var(--text)'}; border-radius:12px; padding:12px; font-weight:800; font-size:13.5px; margin-bottom:8px;">${day}</button>`).join("");
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">What are you actually doing today?</div>
      <div style="color:var(--sub); font-size:11px; margin-bottom:14px; line-height:1.5;">Overrides the auto-guess just for today.</div>
      ${optionsHtml}
      <button id="dayPickCancel" style="width:100%; background:none; color:var(--sub); padding:8px; font-weight:700; font-size:12.5px;">Cancel</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.querySelectorAll(".dayPickBtn").forEach(btn => {
    btn.onclick = async () => {
      currentDay = btn.dataset.day;
      appState.dayOverrides[todayStr()] = currentDay;
      overlay.remove();
      await saveState();
      renderAll();
    };
  });
  overlay.querySelector("#dayPickCancel").onclick = () => overlay.remove();
  overlay.addEventListener("click", (e) => { if (e.target === overlay) overlay.remove(); });
}

function goToView(view, subview) {
  const tab = document.querySelector(`.navtab[data-view="${view}"]`);
  if (tab) tab.click();
  if (subview) setTimeout(() => { const sub = document.querySelector(`.seg-tab[data-subview="${subview}"]`); if (sub) sub.click(); }, 0);
}

// AI COACH TIPS — layered over local tips, cached per day, never blocks
// ============================================================
const AI_CACHE_KEY = "ale-ai-coach-cache-v1";
function loadAiCache() { try { return JSON.parse(localStorage.getItem(AI_CACHE_KEY) || "{}"); } catch (e) { return {}; } }
function saveAiCache(cache) { localStorage.setItem(AI_CACHE_KEY, JSON.stringify(cache)); }
function getCachedAiTips(day, date) { return loadAiCache()[date + "_" + day] || null; }

async function fetchAiCoachTips(day) {
  const info = activeDays[day];
  const exercisesPayload = info.exercises.map(name => ({
    name, repRange: REP_RANGE_MAP[name] || null,
    history: getExerciseLogs(name).slice(0, 6).map(e => ({ date: e.date, weight: e.weight, reps: e.reps, bodyweight: !!e.bodyweight })),
  }));
  const belowRange = getBelowRangeMuscles();
  const muscleVolume = belowRange.map(m => ({ muscle: m.muscle, count: m.count, status: "below range" }));
  const cutoff = addDaysLocal(todayStr(), -14);
  const recentNotes = Object.keys(appState.scheduleNotes).filter(d => d >= cutoff).map(d => ({ date: d, text: appState.scheduleNotes[d] }));
  const res = await fetch(EDGE_FUNCTION_URL, {
    method: "POST",
    headers: { "content-type": "application/json", "Authorization": "Bearer " + SUPABASE_ANON_KEY, "apikey": SUPABASE_ANON_KEY },
    body: JSON.stringify({ day, exercises: exercisesPayload, muscleVolume, notes: recentNotes }),
  });
  if (!res.ok) throw new Error("AI coach request failed: " + res.status);
  return await res.json();
}
function ensureAiTipsFetched(day, date) {
  if (getCachedAiTips(day, date)) return;
  if (!supabaseClient) return;
  fetchAiCoachTips(day).then(result => {
    const cache = loadAiCache();
    cache[date + "_" + day] = result;
    saveAiCache(cache);
    if (currentDay === day && sessionDate === date) renderLogTab();
  }).catch(e => console.error("AI coach tip fetch failed, local tips still active", e));
}

// ============================================================
// TOP-LEVEL RENDER + VIEW SWITCHING
// ============================================================
let currentView = "home";
function renderAll() {
  rebuildActiveDaysAndRegistry();
  rebuildPeptides();
  if (currentView === "home") renderHomeView();
  else if (currentView === "log") renderLogTab();
  else if (currentView === "data") renderDataTab();
  else if (currentView === "peptides") renderPeptideTab();
}

document.getElementById("navbar").querySelectorAll(".navtab").forEach(tab => {
  tab.onclick = () => {
    currentView = tab.dataset.view;
    document.getElementById("navbar").querySelectorAll(".navtab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    document.getElementById("homeView").style.display = currentView === "home" ? "" : "none";
    document.getElementById("logView").style.display = currentView === "log" ? "" : "none";
    document.getElementById("dataView").style.display = currentView === "data" ? "" : "none";
    document.getElementById("peptideView").style.display = currentView === "peptides" ? "" : "none";
    document.getElementById("daylabel").textContent =
      currentView === "home" ? "Your day, at a glance" :
      currentView === "log" ? activeDays[currentDay].subtitle :
      currentView === "data" ? "Weight progress by exercise" : "Schedule and adherence";
    renderAll();
  };
});

document.getElementById("dataSubNav").querySelectorAll(".seg-tab").forEach(tab => {
  tab.onclick = () => {
    dataSubView = tab.dataset.subview;
    document.getElementById("dataSubNav").querySelectorAll(".seg-tab").forEach(t => t.classList.remove("active"));
    tab.classList.add("active");
    renderDataTab();
  };
});

document.getElementById("calcToggleBtn").onclick = () => {
  const panel = document.getElementById("calcPanel");
  const showing = panel.style.display !== "none";
  panel.style.display = showing ? "none" : "block";
  document.getElementById("libraryPanel").style.display = "none";
  document.getElementById("stackPanel").style.display = "none";
  if (!showing) buildCalcPanel();
};
document.getElementById("libraryToggleBtn").onclick = () => {
  const panel = document.getElementById("libraryPanel");
  const showing = panel.style.display !== "none";
  panel.style.display = showing ? "none" : "block";
  document.getElementById("calcPanel").style.display = "none";
  document.getElementById("stackPanel").style.display = "none";
  if (!showing) buildLibraryPanel();
};
document.getElementById("stackToggleBtn").onclick = () => {
  const panel = document.getElementById("stackPanel");
  const showing = panel.style.display !== "none";
  panel.style.display = showing ? "none" : "block";
  document.getElementById("calcPanel").style.display = "none";
  document.getElementById("libraryPanel").style.display = "none";
  if (!showing) buildStackPanel();
};

document.getElementById("scheduleNoteBtn").onclick = () => {
  const existing = appState.scheduleNotes[sessionDate] || "";
  showTextInputModal(`Note for ${sessionDate}`, existing, async (value) => {
    if (value) appState.scheduleNotes[sessionDate] = value; else delete appState.scheduleNotes[sessionDate];
    await saveState();
    renderScheduleNoteDisplay();
    showToast(value ? "Note saved" : "Note cleared");
  });
};

function updateClock() {
  const el = document.getElementById("clocklabel");
  if (el) el.textContent = new Date().toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZoneName: "short" });
}

// ============================================================
// EXPORT / IMPORT (manual backup, kept even with cloud sync live)
// ============================================================
document.getElementById("exportBtn").onclick = () => {
  const blob = new Blob([JSON.stringify({ ...appState, exportedAt: new Date().toISOString() }, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "training-log-backup-" + todayStr() + ".json";
  a.click();
  URL.revokeObjectURL(url);
  showToast("Backup downloaded");
};
document.getElementById("importBtn").onclick = () => document.getElementById("importFile").click();
document.getElementById("importFile").onchange = async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const data = JSON.parse(text);
    appState = normalizeState(data);
    await saveState();
    renderAll();
    showToast("Backup restored");
  } catch (err) {
    showToast("Import failed, bad file", true);
  } finally {
    e.target.value = "";
  }
};

// ============================================================
// AUTH
// ============================================================
function cacheSession(session) {
  if (session) { cachedAccessToken = session.access_token; cachedUserId = session.user.id; }
}
function showAuthGate() { document.getElementById("authGate").style.display = "flex"; }
function hideAuthGate() { document.getElementById("authGate").style.display = "none"; }

async function startApp() {
  hideAuthGate();
  await loadStateFromCloud();
  rebuildActiveDaysAndRegistry();
  rebuildPeptides();
  currentDay = getSuggestedDay();
  document.getElementById("daylabel").textContent = "Your day, at a glance";
  updateClock();
  setInterval(updateClock, 1000);
  renderAll();
}

async function checkAuthAndInit() {
  supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  const { data: sessionData } = await supabaseClient.auth.getSession();
  if (sessionData && sessionData.session) { cacheSession(sessionData.session); await startApp(); }
  else showAuthGate();
}

document.getElementById("authSignInBtn").onclick = async () => {
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value;
  const errEl = document.getElementById("authError");
  errEl.textContent = "";
  if (!email || !password) { errEl.textContent = "Enter your email and password"; return; }
  const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if (error) { errEl.textContent = error.message; return; }
  cacheSession(data.session);
  await startApp();
};
document.getElementById("authSignUpBtn").onclick = async () => {
  const email = document.getElementById("authEmail").value.trim();
  const password = document.getElementById("authPassword").value;
  const errEl = document.getElementById("authError");
  const statusEl = document.getElementById("authStatus");
  errEl.textContent = ""; statusEl.textContent = "";
  if (!email || !password || password.length < 6) { errEl.textContent = "Password needs at least 6 characters"; return; }
  const { data, error } = await supabaseClient.auth.signUp({ email, password });
  if (error) { errEl.textContent = error.message; return; }
  if (data && data.session) { cacheSession(data.session); await startApp(); }
  else statusEl.textContent = "Check your email to confirm your account, then sign in.";
};
async function signOutOfApp() {
  showConfirmModal("Sign out? You'll need your email and password to get back in.", "Sign Out", async () => {
    await supabaseClient.auth.signOut();
    location.reload();
  });
}
document.getElementById("signOutBtn").onclick = () => signOutOfApp();

checkAuthAndInit();

</script>
</body>
</html>
