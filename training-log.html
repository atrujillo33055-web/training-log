<!DOCTYPE html>

<title>Training Log</title>
<style>
  :root {
    --bg: #0a0e12;
    --card: #141b22;
    --card-hi: #1c2530;
    --line: rgba(200,220,255,0.08);
    --text: #eef4f8;
    --sub: #8a99a3;
    --sub-dim: #56636d;
    --push: #4dd4a0;
    --pull: #b8e94a;
    --legs: #ff6b4a;
    --gold: #2f8fff;
    --danger: #e2483f;
    --radius: 18px;
    --radius-sm: 12px;
    --shadow: inset 0 1px 0 rgba(200,220,255,0.05), 0 14px 28px -10px rgba(0,0,0,0.7), 0 2px 8px rgba(0,0,0,0.45);
    --shadow-sm: inset 0 1px 0 rgba(200,220,255,0.045), 0 8px 18px -8px rgba(0,0,0,0.65), 0 1px 4px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; background: var(--bg); }
  body {
    margin: 0;
    background: radial-gradient(ellipse 140% 60% at 50% -10%, #141b22 0%, var(--bg) 55%) fixed;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", Roboto, sans-serif;
    padding-bottom: 100px;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  button, input, select { font-family: inherit; }
  button { cursor: pointer; transition: opacity 0.15s ease, transform 0.1s ease; }
  button:active { transform: scale(0.97); opacity: 0.85; }
  header {
    padding: calc(20px + env(safe-area-inset-top)) 20px 16px;
    position: sticky;
    top: 0;
    background: rgba(10,14,18,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    z-index: 30;
  }
  header h1 {
    font-size: 22px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -0.03em;
  }
  header p {
    margin: 3px 0 0;
    color: var(--sub);
    font-size: 12.5px;
    letter-spacing: -0.01em;
  }
  .tabs {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 16px 20px 0;
  }
  .tab {
    padding: 11px 6px;
    border-radius: var(--radius-sm);
    text-align: center;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: -0.01em;
    background: var(--card);
    color: var(--sub);
    border: none;
    cursor: pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .tab.active[data-type="push"] { background: var(--push); color: #0a0e12; }
  .tab.active[data-type="pull"] { background: var(--pull); color: #0a0e12; }
  .tab.active[data-type="legs"] { background: var(--legs); color: #0a0e12; }
  .sub {
    color: var(--sub);
    font-weight: 500;
    font-size: 10.5px;
    display: block;
    margin-top: 1px;
  }
  main { padding: 18px 20px 0; }
  .exercise {
    background: var(--card);
    border: none;
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }
  .ex-head {
    padding: 18px 18px 14px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    cursor: pointer;
  }
  .ex-name { font-size: 14.5px; font-weight: 700; letter-spacing: -0.01em; }
  .ex-hint { color: var(--sub); font-size: 11px; margin-top: 3px; line-height: 1.4; }
  .pr {
    font-size: 13px;
    font-weight: 800;
    color: var(--gold);
    white-space: nowrap;
    margin-left: 10px;
  }
  .pr span { color: var(--sub); font-weight: 500; font-size: 9.5px; display: block; text-align: right; text-transform: uppercase; letter-spacing: 0.03em; }
  .history {
    padding: 0 14px 10px;
    color: var(--sub);
    font-size: 11.5px;
    line-height: 1.6;
  }
  .logrow {
    display: flex;
    gap: 8px;
    padding: 8px 14px 14px;
  }
  .logrow input {
    background: var(--card-hi);
    border: none;
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 10px 8px;
    font-size: 14px;
    width: 100%;
    text-align: center;
  }
  .logrow input::placeholder { color: var(--sub-dim); }
  .logrow button {
    background: var(--text);
    color: #0a0e12;
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 800;
    font-size: 13px;
    padding: 0 18px;
    white-space: nowrap;
  }
  .expand {
    max-height: 0;
    opacity: 0;
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
  }
  .expand.open { max-height: 400px; opacity: 1; overflow-y: auto; }
  .entry-row {
    display: flex;
    justify-content: space-between;
    padding: 9px 16px;
    border-top: 1px solid var(--line);
    font-size: 12.5px;
  }
  .entry-row .del { color: var(--danger); font-weight: 700; }
  .toast {
    position: fixed;
    bottom: 96px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--gold);
    color: #0a0e12;
    padding: 11px 20px;
    border-radius: 30px;
    font-weight: 700;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.25s ease, transform 0.25s ease;
    pointer-events: none;
    box-shadow: var(--shadow);
    white-space: nowrap;
  }
  .toast.show { opacity: 1; }
  .toast.pr-toast {
    background: linear-gradient(90deg, #2f8fff, #6bb8ff);
    font-size: 15px;
    padding: 14px 26px;
    box-shadow: 0 0 28px rgba(227, 171, 92, 0.55);
    animation: prPulse 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes prPulse {
    0% { transform: translateX(-50%) scale(0.8); }
    50% { transform: translateX(-50%) scale(1.06); }
    100% { transform: translateX(-50%) scale(1); }
  }
  @keyframes viewFadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .view-fade { animation: viewFadeIn 0.28s cubic-bezier(0.22, 1, 0.36, 1); }
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  .empty { color: var(--sub); font-size: 12.5px; text-align: center; padding: 30px 0; }
  .loading { color: var(--sub); font-size: 13px; text-align: center; padding: 40px 0; }

  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    background: rgba(20,27,34,0.85);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-top: 1px solid var(--line);
    padding: 8px 12px calc(10px + env(safe-area-inset-bottom));
    z-index: 40;
  }
  .navtab {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 4px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--sub-dim);
    border: none;
    transition: color 0.2s ease;
  }
  .navtab svg { width: 22px; height: 22px; stroke: var(--sub-dim); transition: stroke 0.2s ease; }
  .navtab.active { color: var(--gold); }
  .navtab.active svg { stroke: var(--gold); }

  .segmented-nav {
    display: flex;
    background: var(--card-hi);
    border-radius: var(--radius-sm);
    padding: 3px;
    gap: 2px;
    margin-bottom: 14px;
  }
  .seg-tab {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--sub);
    border-radius: 9px;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .seg-tab.active {
    background: var(--card);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  .pep-card {
    background: var(--card);
    border: none;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-sm);
  }
  .pep-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .pep-name {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: -0.01em;
  }
  .pep-sub {
    color: var(--sub);
    font-size: 11.5px;
    margin-top: 2px;
  }
  .pill {
    font-size: 10.5px;
    font-weight: 800;
    padding: 5px 11px;
    border-radius: 20px;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }
  .pill.due { background: rgba(90,171,132,0.16); color: var(--pull); }
  .pill.off { background: var(--card-hi); color: var(--sub); }
  .pill.done { background: var(--card-hi); color: var(--sub); }
  .pill.taken { background: rgba(227,171,92,0.16); color: var(--gold); }
  .pep-actions {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .pep-btn {
    flex: 1;
    background: var(--text);
    color: #0a0e12;
    border: none;
    border-radius: var(--radius-sm);
    font-weight: 800;
    font-size: 13px;
    padding: 10px;
  }
  .pep-btn.done-btn {
    background: var(--card-hi);
    color: var(--sub);
    border: none;
  }
  .dots {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-top: 12px;
  }
  .dot {
    aspect-ratio: 1;
    border-radius: 7px;
    background: var(--card-hi);
    border: none;
  }
  .dot.taken { background: var(--pull); }
  .dot.partial {
    background: linear-gradient(90deg, var(--pull) 50%, var(--card-hi) 50%);
  }
  .dot.na {
    background: repeating-linear-gradient(135deg, var(--card-hi), var(--card-hi) 3px, #151c24 3px, #151c24 6px);
  }
  .day-header-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
    margin-bottom: 6px;
  }
  .day-header-row div {
    text-align: center;
    font-size: 10px;
    font-weight: 800;
    color: var(--sub-dim);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .chart-card {
    background: var(--card);
    border: none;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow-sm);
  }
  .chart-stats {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .chart-stat-label { color: var(--sub); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .chart-stat-val { font-size: 20px; font-weight: 800; margin-top: 2px; letter-spacing: -0.02em; }

  .ring-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .ring-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 12px;
    box-shadow: var(--shadow-sm);
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }
  .ring-card .ring-name { font-size: 11.5px; font-weight: 700; margin-top: 8px; letter-spacing: -0.01em; }
  .ring-card .ring-detail { font-size: 10px; color: var(--sub); margin-top: 2px; }

  /* ---------- Home dashboard ---------- */
  .eyebrow {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--sub-dim);
  }
  .hero-card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 12px;
  }
  .hero-number {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
  }
  .thin-bar {
    background: var(--card-hi);
    border-radius: 4px;
    height: 5px;
    overflow: hidden;
    margin-top: 12px;
  }
  .thin-bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }
  .list-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 13px 2px;
    border-bottom: 1px solid var(--line);
  }
  .list-row:last-child { border-bottom: none; }
  .list-row-title { font-size: 13.5px; font-weight: 700; letter-spacing: -0.01em; }
  .list-row-sub { font-size: 10.5px; color: var(--sub); margin-top: 2px; }
  .quiet-stat { display: flex; align-items: center; gap: 8px; padding: 9px 0; }
  .quiet-stat-icon { color: var(--sub-dim); flex-shrink: 0; }
  .quiet-stat-label { font-size: 12px; color: var(--sub); flex: 1; }
  .quiet-stat-val { font-size: 12.5px; font-weight: 700; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<div id="authGate" style="position:fixed; inset:0; background:var(--bg); z-index:500; display:flex; align-items:center; justify-content:center; padding:24px;">
  <div style="width:100%; max-width:340px;">
    <div style="font-size:24px; font-weight:800; letter-spacing:-0.02em; margin-bottom:4px; text-align:center;">Training Log</div>
    <div style="color:var(--sub); font-size:12.5px; margin-bottom:24px; text-align:center;">Sign in to sync your data</div>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="email" style="width:100%; background:var(--card); border:none; border-radius:var(--radius-sm); color:var(--text); padding:13px; font-size:15px; margin-bottom:10px; box-shadow:var(--shadow-sm);">
    <input type="password" id="authPassword" placeholder="Password" autocomplete="current-password" style="width:100%; background:var(--card); border:none; border-radius:var(--radius-sm); color:var(--text); padding:13px; font-size:15px; margin-bottom:14px; box-shadow:var(--shadow-sm);">
    <button id="authSignInBtn" style="width:100%; background:var(--gold); color:var(--bg); border:none; border-radius:var(--radius-sm); padding:14px; font-weight:800; font-size:14px; margin-bottom:8px;">Sign In</button>
    <button id="authSignUpBtn" style="width:100%; background:var(--card); color:var(--text); border:none; border-radius:var(--radius-sm); padding:14px; font-weight:700; font-size:13px; box-shadow:var(--shadow-sm);">Create Account</button>
    <div id="authError" style="color:var(--legs); font-size:12px; margin-top:12px; text-align:center; min-height:16px;"></div>
    <div id="authStatus" style="color:var(--sub); font-size:11.5px; margin-top:8px; text-align:center;"></div>
  </div>
</div>


<header>
  <h1>Training Log</h1>
  <p id="daylabel">Loading...</p>
  <p id="clocklabel" style="color: var(--sub); font-size: 11px; margin-top: 2px;"></p>
  <div style="display:flex; gap:10px; margin-top:10px;">
    <button id="exportBtn" style="background:var(--card); border:1px solid var(--line); color:var(--sub); border-radius:12px; padding:6px 12px; font-size:11.5px; font-weight:700;">Export backup</button>
    <button id="importBtn" style="background:var(--card); border:1px solid var(--line); color:var(--sub); border-radius:12px; padding:6px 12px; font-size:11.5px; font-weight:700;">Import backup</button>
    <button id="signOutBtn" style="background:var(--card); border:1px solid var(--line); color:var(--sub); border-radius:12px; padding:6px 12px; font-size:11.5px; font-weight:700;">Sign Out</button>
    <input type="file" id="importFile" accept="application/json" style="display:none;">
  </div>
</header>

<div class="bottom-nav" id="navbar">
  <div class="navtab active" data-view="home">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9.5a1 1 0 0 0 1 1h3.5v-6h3v6H17a1 1 0 0 0 1-1V10"/></svg>
    Home
  </div>
  <div class="navtab" data-view="log">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6.5 6.5h11v11h-11z"/><path d="M9 10h5M9 13h5M9 16h2"/></svg>
    Log
  </div>
  <div class="navtab" data-view="data">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19V10M12 19V5M19 19v-7"/></svg>
    Data
  </div>
  <div class="navtab" data-view="peptides">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4.5" y="9.5" width="15" height="7" rx="3.5" transform="rotate(-30 12 13)"/><path d="M9.5 11.5l3-1.7" stroke-width="1.5"/></svg>
    Peptides
  </div>
</div>

<div id="homeView" style="padding: 16px 18px 0;"></div>

<div id="logView" style="display:none;">
<div class="tabs" id="tabs"></div>

<div style="padding: 12px 18px 0;">
  <label style="color: var(--sub); font-size: 11.5px; font-weight: 700; display: block; margin-bottom: 6px;">SESSION DATE</label>
  <input type="date" id="sessionDate" style="width: 100%; background: var(--card); border: none; border-radius: var(--radius-sm); color: var(--text); padding: 10px; font-size: 14px; font-weight: 700; box-shadow: var(--shadow-sm); margin-bottom: 8px;">
  <div style="display:flex; gap:8px;">
    <button id="scheduleNoteBtn" style="flex:1; min-width:0; background:var(--card); border:none; color:var(--sub); border-radius:var(--radius-sm); padding:10px 8px; font-size:12.5px; font-weight:700; white-space:nowrap; box-shadow: var(--shadow-sm); display:flex; align-items:center; justify-content:center; gap:5px;">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;"><path d="M14 3v4a1 1 0 0 0 1 1h4M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h7l5 5v11a2 2 0 0 1-2 2z"/><path d="M9 13h6M9 17h4"/></svg>
      Note
    </button>
    <button id="editExercisesBtn" style="flex:1; min-width:0; background:var(--card); border:none; color:var(--sub); border-radius:var(--radius-sm); padding:10px 8px; font-size:12.5px; font-weight:700; white-space:nowrap; box-shadow: var(--shadow-sm);">Edit</button>
  </div>
</div>
<div id="scheduleNoteDisplay" style="padding: 10px 18px 0;"></div>

<main id="main">
  <div class="loading">Loading your log...</div>
</main>
</div>

<div id="dataView" style="display:none; padding: 16px 18px 0;">
  <div class="segmented-nav" id="dataSubNav">
    <div class="seg-tab active" data-subview="exercise">By Exercise</div>
    <div class="seg-tab" data-subview="muscle">By Muscle Group</div>
    <div class="seg-tab" data-subview="body">Body</div>
  </div>
  <div class="tabs" id="dataTabs" style="padding:0 0 12px;"></div>
  <div id="dataList"></div>
</div>

<div id="peptideView" style="display:none; padding: 16px 18px 0;">
  <div id="peptideSnapshot" class="hero-card" style="display:flex; gap:20px;"></div>

// activeDays: what's actually shown/loggable today, editable per day.
// registry: every exercise name ever active for a given type, never shrinks,
// so swapping an exercise out never hides its history.
let activeDays = {};
let registry = { push: [], pull: [], legs: [] };

function loadWorkoutConfig() {
  activeDays = JSON.parse(JSON.stringify(DEFAULT_DAYS));
  Object.values(activeDays).forEach(d => { if (!d.supersets) d.supersets = []; });
  try {
    const overrides = JSON.parse(localStorage.getItem(WORKOUT_CONFIG_KEY) || "{}");
    Object.keys(overrides).forEach(day => {
      if (!activeDays[day]) return;
      const val = overrides[day];
      if (Array.isArray(val)) {
        // Old format: just an exercise list, no supersets yet.
        activeDays[day].exercises = val;
      } else if (val && typeof val === "object") {
        activeDays[day].exercises = val.exercises || activeDays[day].exercises;
        activeDays[day].supersets = val.supersets || [];
      }
    });
  } catch (e) {}

  try {
    const stored = JSON.parse(localStorage.getItem(REGISTRY_KEY) || "null");
    registry = stored || { push: [], pull: [], legs: [] };
  } catch (e) {
    registry = { push: [], pull: [], legs: [] };
  }
  ["push", "pull", "legs"].forEach(type => {
    if (!registry[type]) registry[type] = [];
    Object.values(DEFAULT_DAYS).filter(d => d.type === type).forEach(d => {
      d.exercises.forEach(ex => { if (!registry[type].includes(ex)) registry[type].push(ex); });
    });
    Object.values(activeDays).filter(d => d.type === type).forEach(d => {
      d.exercises.forEach(ex => { if (!registry[type].includes(ex)) registry[type].push(ex); });
    });
  });
  saveRegistry();
}

function saveWorkoutConfig() {
  const overrides = {};
  Object.keys(activeDays).forEach(day => {
    overrides[day] = { exercises: activeDays[day].exercises, supersets: activeDays[day].supersets || [] };
  });
  localStorage.setItem(WORKOUT_CONFIG_KEY, JSON.stringify(overrides));
}

function saveRegistry() {
  localStorage.setItem(REGISTRY_KEY, JSON.stringify(registry));
}

function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return y + "-" + m + "-" + day;
}

function nowTimeStr() {
  const d = new Date();
  const h = String(d.getHours()).padStart(2, "0");
  const min = String(d.getMinutes()).padStart(2, "0");
  return h + ":" + min;
}

function updateClock() {
  const el = document.getElementById("clocklabel");
  if (!el) return;
  const now = new Date();
  el.textContent = now.toLocaleString("en-US", { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit", timeZoneName: "short" });
}

async function loadLogs() {
  try {
    const value = localStorage.getItem(STORAGE_KEY);
    // Fixed: this used to silently seed old baked-in mid-July data into
    // localStorage (and therefore push it to the cloud) whenever a device
    // was empty. That made sense before sync existed, empty always meant
    // "brand new install." Now empty can also mean "existing user, new
    // device, hasn't synced yet," and auto-writing stale data here can
    // clobber the real thing on pull. Just start truly empty and let
    // pullFromCloud (which runs before this) bring in the real data.
    logs = value ? JSON.parse(value) : [];
  } catch (e) {
    logs = [];
  }

  // One-time patch: fix the entries that were mis-dated by the old UTC bug,
  // wherever this data actually lives (won't touch anything logged since).
  if (!localStorage.getItem(FIX_FLAG_KEY)) {
    let changed = false;
    logs.forEach(l => {
      if (FIX_IDS.has(l.id) && l.date === "2026-07-08") {
        l.date = "2026-07-07";
        changed = true;
      }
    });
    if (changed) await saveLogs();
    localStorage.setItem(FIX_FLAG_KEY, "1");
  }

  storageReady = true;
  render();
}

async function saveLogs() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
  } catch (e) {
    showToast("Save failed, try again");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show";
  setTimeout(() => t.classList.remove("show"), 1400);
}

function showPRToast(name, weight) {
  const t = document.getElementById("toast");
  t.textContent = "🎉 New PR! " + weight + " on " + name;
  t.className = "toast show pr-toast";
  setTimeout(() => t.classList.remove("show"), 2400);
}

function getExerciseLogs(name) {
  return logs.filter(l => l.exercise === name).sort((a, b) => b.date.localeCompare(a.date));
}

function getPR(name) {
  const entries = getExerciseLogs(name);
  if (!entries.length) return null;
  return entries.reduce((max, e) => e.weight > max.weight ? e : max, entries[0]);
}

// Best set from the most recent session before the given date, for
// "last time" reference while logging (progressive overload cue).
function getLastSession(name, beforeDate) {
  const entries = getExerciseLogs(name).filter(e => e.date < beforeDate);
  if (!entries.length) return null;
  const mostRecentDate = entries[0].date;
  const sameDay = entries.filter(e => e.date === mostRecentDate);
  const best = pickRepresentativeSet(sameDay, REP_RANGE_MAP[name]);
  return { date: mostRecentDate, weight: best.weight, reps: best.reps, bodyweight: best.bodyweight, addedWeight: best.addedWeight };
}

const TAB_ORDER = ["Push A", "Pull A", "Legs A", "Push B", "Pull B", "Legs B"];

const DAY_OVERRIDE_KEY = "ale-day-override-v1";
function getDayOverrides() {
  try { return JSON.parse(localStorage.getItem(DAY_OVERRIDE_KEY) || "{}"); } catch (e) { return {}; }
}
function setDayOverride(date, day) {
  const overrides = getDayOverrides();
  overrides[date] = day;
  localStorage.setItem(DAY_OVERRIDE_KEY, JSON.stringify(overrides));
}

// Figures out "today's day" from what actually happened, not a fixed
// calendar assumption. A manual override for that date always wins. If
// today already has logs, that's the day. Otherwise it looks at the most
// recent date that has ANY logged session (skipping gaps/rest days
// automatically, since a gap just has no entry) and advances one step in
// the rotation from there.
function getSuggestedDay() {
  const today = todayStr();
  const overrides = getDayOverrides();
  if (overrides[today] && TAB_ORDER.includes(overrides[today])) return overrides[today];

  const todaysLog = logs.find(l => l.date === today);
  if (todaysLog && TAB_ORDER.includes(todaysLog.day)) return todaysLog.day;

  const priorDates = [...new Set(logs.map(l => l.date))].filter(d => d < today).sort().reverse();
  if (!priorDates.length) return TAB_ORDER[0];

  const lastDate = priorDates[0];
  const lastDayEntries = logs.filter(l => l.date === lastDate);
  const lastDay = lastDayEntries.length ? lastDayEntries[0].day : null;
  const idx = TAB_ORDER.indexOf(lastDay);
  if (idx === -1) return TAB_ORDER[0];
  return TAB_ORDER[(idx + 1) % TAB_ORDER.length];
}

function renderTabs() {
  const tabsEl = document.getElementById("tabs");
  tabsEl.innerHTML = "";
  TAB_ORDER.filter(day => activeDays[day]).forEach(day => {
    const info = activeDays[day];
    const div = document.createElement("div");
    div.className = "tab" + (day === currentDay ? " active" : "");
    div.dataset.type = info.type;
    div.textContent = day;
    div.onclick = () => {
      currentDay = day;
      if (sessionDate === todayStr()) setDayOverride(sessionDate, day);
      render();
    };
    tabsEl.appendChild(div);
  });
}

function renderScheduleNoteDisplay() {
  const el = document.getElementById("scheduleNoteDisplay");
  if (!el) return;
  const note = scheduleNotes[sessionDate];
  if (!note) { el.innerHTML = ""; return; }
  el.innerHTML = `
    <div style="background:var(--card); border-radius:var(--radius-sm); padding:10px 12px; box-shadow:var(--shadow-sm); display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
      <div style="font-size:11.5px; color:var(--sub); line-height:1.5;"><strong style="color:var(--text);">Note:</strong> ${note.replace(/</g, "&lt;")}</div>
      <div class="del" style="cursor:pointer; flex-shrink:0; margin-top:2px;">${ICONS.trash}</div>
    </div>
  `;
  el.querySelector(".del").onclick = () => {
    showConfirmModal(`Delete the note for ${sessionDate}?`, "Delete", () => {
      delete scheduleNotes[sessionDate];
      saveScheduleNotes();
      renderScheduleNoteDisplay();
    });
  };
}

function render() {
  renderTabs();
  const dateInput = document.getElementById("sessionDate");
  if (!dateInput.value) dateInput.value = sessionDate;
  dateInput.onchange = () => { sessionDate = dateInput.value; renderScheduleNoteDisplay(); };
  renderScheduleNoteDisplay();

  const info = activeDays[currentDay];
  document.getElementById("daylabel").textContent = info.subtitle;
  const main = document.getElementById("main");

  if (!storageReady) {
    main.innerHTML = '<div class="loading">Loading your log...</div>';
    return;
  }

  const editBtn = document.getElementById("editExercisesBtn");
  editBtn.textContent = editMode ? "Done" : "Edit";
  editBtn.onclick = () => { editMode = !editMode; render(); };

  if (editMode) {
    renderExerciseEditor(main, info);
    return;
  }

  main.innerHTML = "";
  const measurementBanner = buildMeasurementReminder();
  if (measurementBanner) main.appendChild(measurementBanner);
  const deloadBanner = buildDeloadBanner();
  if (deloadBanner) main.appendChild(deloadBanner);
  main.appendChild(buildWeekSnapshot());

  ensureAiTipsFetched(currentDay, sessionDate);
  const aiTipsForDay = getCachedAiTips(currentDay, sessionDate);
  if (aiTipsForDay && aiTipsForDay.structuralNote) {
    const structNote = document.createElement("div");
    structNote.className = "hero-card";
    structNote.style.marginBottom = "12px";
    structNote.innerHTML = `<div class="eyebrow" style="color:var(--gold); margin-bottom:4px;">✨ Coach note</div><div style="font-size:12.5px; color:var(--text); line-height:1.5;">${aiTipsForDay.structuralNote}</div>`;
    main.appendChild(structNote);
  }

  main.appendChild(buildAbsQuickLog());

  function buildLogExerciseCard(name) {
    const pr = getPR(name);
    const last = getLastSession(name, sessionDate);
    const aiTips = getCachedAiTips(currentDay, sessionDate);
    const tip = (aiTips && aiTips.tips && aiTips.tips[name]) || getCoachTip(name, sessionDate);
    const tipIsAi = !!(aiTips && aiTips.tips && aiTips.tips[name]);
    const todaysSets = logs.filter(l => l.exercise === name && l.date === sessionDate && l.day === currentDay);

    const card = document.createElement("div");
    card.className = "exercise";

    const head = document.createElement("div");
    head.className = "ex-head";
    head.innerHTML = `
      <div>
        <div class="ex-name" style="display:flex; align-items:center; gap:6px;"><span style="color:var(--sub-dim); display:inline-flex;">${ICONS.dumbbell}</span>${name}</div>
        <div class="ex-hint">${todaysSets.length ? todaysSets.length + ' set' + (todaysSets.length === 1 ? '' : 's') + ' logged today' : 'No sets logged today'}</div>
        ${last ? `<div class="ex-hint" style="color:var(--gold);">Last: ${formatWeightDisplay(last)}${last.reps ? ' x ' + last.reps : ''} &middot; ${formatDateLabel(last.date)}</div>` : ''}
        ${tip ? `<div class="ex-hint" style="color:var(--pull); margin-top:3px; line-height:1.4;">${tipIsAi ? '✨' : '💡'} ${tip}</div>` : ''}
      </div>
      <div class="pr">${pr ? pr.weight : '—'}<span>PR</span></div>
    `;
    card.appendChild(head);

    const logrow = document.createElement("div");
    logrow.className = "logrow";
    logrow.style.alignItems = "center";
    logrow.innerHTML = `
      <button class="bw-toggle" type="button" style="flex:0 0 auto; background:var(--card-hi); color:var(--sub); border:none; border-radius:var(--radius-sm); padding:0 12px; font-weight:800; font-size:11px; height:44px;">BW</button>
      <input type="number" inputmode="decimal" placeholder="Weight" class="w-input" style="flex:1.3">
      <input type="number" inputmode="numeric" placeholder="Reps" class="r-input" style="flex:1">
      <button class="log-btn">Log</button>
    `;
    const bwToggle = logrow.querySelector(".bw-toggle");
    const wInput = logrow.querySelector(".w-input");
    const rInput = logrow.querySelector(".r-input");
    const btn = logrow.querySelector(".log-btn");
    let bwMode = false;
    bwToggle.onclick = () => {
      bwMode = !bwMode;
      bwToggle.style.background = bwMode ? "var(--gold)" : "var(--card-hi)";
      bwToggle.style.color = bwMode ? "var(--bg)" : "var(--sub)";
      wInput.placeholder = bwMode ? "+ weight (0 = BW)" : "Weight";
    };
    btn.onclick = async () => {
      const reps = rInput.value ? parseInt(rInput.value) : null;
      let weight, addedWeight, isBW = false;
      if (bwMode) {
        addedWeight = wInput.value ? parseFloat(wInput.value) : 0;
        const bw = getLatestBodyweight();
        if (bw === null) {
          showToast("Log your bodyweight in the Body tab first");
          return;
        }
        weight = bw + addedWeight;
        isBW = true;
      } else {
        if (wInput.value === "") { showToast("Enter a weight (0 is fine)"); return; }
        weight = parseFloat(wInput.value);
      }
      const priorPR = getPR(name);
      const entry = { id: Date.now() + Math.random(), date: sessionDate, day: currentDay, exercise: name, weight, reps };
      if (isBW) { entry.bodyweight = true; entry.addedWeight = addedWeight; }
      logs.push(entry);
      wInput.value = ""; rInput.value = "";
      await saveLogs();
      if (!priorPR || weight > priorPR.weight) {
        showPRToast(name, weight);
      } else {
        showToast(name + " logged");
      }
      render();
    };
    card.appendChild(logrow);

    if (todaysSets.length) {
      const baseline = getBaseline1RM(name, sessionDate);
      const expand = document.createElement("div");
      expand.className = "expand open";
      todaysSets.forEach((s, i) => {
        const rpe = estimateRPE(s.weight, s.reps, baseline);
        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML = `<span>Set ${i + 1}: ${formatWeightDisplay(s)}${s.reps ? ' x ' + s.reps : ''}${rpe ? ` <span style="color:var(--sub);">&middot; est. RPE ${rpe}</span>` : ''}</span><span class="del"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-8 0 1 13a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-13"/></svg></span>`;
        row.querySelector(".del").onclick = (ev) => {
          ev.stopPropagation();
          showConfirmModal(`Delete Set ${i + 1} (${s.weight}${s.reps ? ' x ' + s.reps : ''})? This can't be undone.`, "Delete", async () => {
            logs = logs.filter(l => l.id !== s.id);
            await saveLogs();
            render();
          });
        };
        expand.appendChild(row);
      });
      card.appendChild(expand);
    }

    return card;
  }

  const supersets = info.supersets || [];
  const grouped = new Set();
  info.exercises.forEach(name => {
    if (grouped.has(name)) return;
    const pairing = supersets.find(pair => pair.includes(name));
    if (pairing) {
      const groupWrap = document.createElement("div");
      groupWrap.style.cssText = "border-left:2px solid var(--gold); border-radius: 4px 0 0 4px; padding-left:8px; margin-bottom:12px;";
      const groupLabel = document.createElement("div");
      groupLabel.className = "eyebrow";
      groupLabel.style.cssText = "color:var(--gold); margin-bottom:6px;";
      groupLabel.textContent = "Superset";
      groupWrap.appendChild(groupLabel);
      pairing.forEach(memberName => {
        if (!info.exercises.includes(memberName)) return;
        grouped.add(memberName);
        const memberCard = buildLogExerciseCard(memberName);
        memberCard.style.marginBottom = "8px";
        groupWrap.appendChild(memberCard);
      });
      main.appendChild(groupWrap);
    } else {
      main.appendChild(buildLogExerciseCard(name));
    }
  });

  const finishWrap = document.createElement("div");
  finishWrap.style.padding = "4px 0 20px";
  const doneKey = sessionDate + "_" + currentDay;
  const finished = getFinishedSessions().includes(doneKey);
  const finishBtn = document.createElement("button");
  finishBtn.textContent = finished ? "Session complete" : "Finish workout";
  finishBtn.style.cssText = `width:100%; padding:14px; border-radius:12px; border:none; font-weight:800; font-size:14px; ${finished ? "background: var(--card-hi); color: var(--sub); border:1px solid var(--line);" : "background: var(--gold); color: #0a0e12;"}`;
  finishBtn.onclick = () => {
    const list = getFinishedSessions();
    if (!list.includes(doneKey)) {
      list.push(doneKey);
      localStorage.setItem(FINISHED_KEY, JSON.stringify(list));
    }
    showToast("Workout saved. Nice work.");
    render();
  };
  finishWrap.appendChild(finishBtn);
  main.appendChild(finishWrap);

  main.appendChild(buildRecentSessionsSection());
}

function formatDateLabel(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  const today = todayStr();
  const yesterday = addDaysLocal(today, -1);
  if (dateStr === today) return "Today";
  if (dateStr === yesterday) return "Yesterday";
  return dt.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

function addDaysLocal(dateStr, n) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  dt.setDate(dt.getDate() + n);
  const yy = dt.getFullYear();
  const mm = String(dt.getMonth() + 1).padStart(2, "0");
  const dd = String(dt.getDate()).padStart(2, "0");
  return yy + "-" + mm + "-" + dd;
}

const DELOAD_KEY = "ale-last-deload-v1";

function computeAvgRPELast7Days() {
  const cutoff = addDaysLocal(todayStr(), -6);
  let total = 0, count = 0;
  logs.forEach(l => {
    if (l.date < cutoff || !l.reps) return;
    const baseline = getBaseline1RM(l.exercise, l.date);
    const rpe = estimateRPE(l.weight, l.reps, baseline);
    if (rpe !== null) { total += rpe; count++; }
  });
  return count ? total / count : null;
}

function countDecliningExercises() {
  let count = 0;
  const allNames = [...new Set(Object.values(registry).flat())];
  const cutoff = addDaysLocal(todayStr(), -14);
  allNames.forEach(name => {
    const entries = getExerciseLogs(name);
    const dates = [...new Set(entries.map(e => e.date))];
    if (dates.length < 2 || dates[0] < cutoff) return;
    const trend = getTrendArrow(name);
    if (trend && trend.arrow === "▼") count++;
  });
  return count;
}

function getProgramStartDate() {
  if (!logs.length) return todayStr();
  return logs.reduce((min, l) => l.date < min ? l.date : min, logs[0].date);
}

function getDeloadStatus() {
  const lastDeload = localStorage.getItem(DELOAD_KEY);
  if (lastDeload && lastDeload >= addDaysLocal(todayStr(), -9)) return { flag: false };

  const avgRPE = computeAvgRPELast7Days();
  const declineCount = countDecliningExercises();
  if ((avgRPE !== null && avgRPE >= 9) || declineCount >= 3) {
    return { flag: true, type: "reactive", avgRPE, declineCount };
  }

  // Proactive fallback: research on 6x/week high-frequency, high-RPE training
  // points to roughly every 3-5 weeks, tighter than the general 4-8 week
  // range most guides quote, since frequency is the variable driving it here.
  const sinceDate = lastDeload || getProgramStartDate();
  const daysSince = Math.round((parseUTC(todayStr()) - parseUTC(sinceDate)) / 86400000);
  if (daysSince >= 35) {
    return { flag: true, type: "scheduled", weeksSince: Math.floor(daysSince / 7) };
  }

  return { flag: false };
}

function buildDeloadBanner() {
  const status = getDeloadStatus();
  if (!status.flag) return null;
  const wrap = document.createElement("div");
  wrap.style.cssText = "background:#1a2a3d; border:1px solid var(--gold); border-radius:14px; padding:14px; margin-bottom:12px;";
  let title, reason;
  if (status.type === "reactive") {
    title = "Deload signal";
    reason = status.avgRPE >= 9
      ? `Average estimated RPE across the last 7 days is ${status.avgRPE.toFixed(1)}`
      : `${status.declineCount} exercises trending down over the last two sessions`;
  } else {
    title = "Deload window open";
    reason = `It's been about ${status.weeksSince} week${status.weeksSince === 1 ? '' : 's'} since your last deload (or program start). At 6 days/week, research points to roughly every 3-5 weeks at this frequency`;
  }
  wrap.innerHTML = `
    <div style="font-weight:800; font-size:13.5px; color:var(--gold); margin-bottom:4px;">${title}</div>
    <div style="font-size:12px; color:var(--sub); line-height:1.5; margin-bottom:10px;">${reason}. Consider a deload week: same exercises, roughly 40-50% less weight, stay around RPE 5-6.</div>
  `;
  const btn = document.createElement("button");
  btn.textContent = "Log Deload Week";
  btn.style.cssText = "width:100%; background:var(--gold); color:#0a0e12; border:none; border-radius:12px; padding:10px; font-weight:800; font-size:12.5px;";
  btn.onclick = () => {
    localStorage.setItem(DELOAD_KEY, todayStr());

  wrap.appendChild(btn);
  return wrap;
}

// ---------- HOME DASHBOARD ----------
function getBelowRangeMuscles() {
  const sevenDaysAgo = addDaysLocal(todayStr(), -6);
  const counts = {};
  logs.forEach(l => {
    if (l.date < sevenDaysAgo) return;
    const muscle = MUSCLE_MAP[l.exercise];
    if (!muscle) return;
    counts[muscle] = (counts[muscle] || 0) + 1;
  });
  const allMuscles = [...new Set(Object.values(MUSCLE_MAP))];
  return allMuscles
    .map(m => ({ muscle: m, count: counts[m] || 0 }))
    .filter(x => x.count < VOLUME_LANDMARKS.low)
    .sort((a, b) => a.count - b.count);
}

  let totalDue = 0, totalTaken = 0;
  peptides.forEach(p => {

function getRecentSessions(rangeDays) {
  const cutoff = addDaysLocal(todayStr(), -(rangeDays - 1));
  const grouped = {};
  logs.forEach(l => {
    if (l.date < cutoff) return;
    const key = l.date + "_" + l.day;
    if (!grouped[key]) grouped[key] = { date: l.date, day: l.day, sets: [] };
    grouped[key].sets.push(l);
  });

  // Dates with a note but no logged sets still show up, that's the whole
  // point, an explained gap instead of a silent one.
  const loggedDates = new Set(Object.values(grouped).map(g => g.date));
  Object.keys(scheduleNotes).forEach(date => {
    if (date < cutoff || loggedDates.has(date)) return;
    grouped[date + "_noSession"] = { date, day: null, sets: [] };
  });

  return Object.values(grouped).sort((a, b) => b.date.localeCompare(a.date)).map(g => {
    const byExercise = {};
    g.sets.forEach(s => {
      if (!byExercise[s.exercise]) byExercise[s.exercise] = [];
      byExercise[s.exercise].push(s);
    });
    return {
      date: g.date,
      day: g.day,
      exerciseCount: Object.keys(byExercise).length,
      setCount: g.sets.length,
      note: scheduleNotes[g.date] || null,
      byExercise
    };
  });
}

// Touch/mouse drag reorder for a row within its sibling container. Works
// via pointer events so it's one code path for touch and mouse both.
function enableDragReorder(row, container) {
  const handle = row.querySelector(".drag-handle");
  if (!handle) return;
  handle.style.touchAction = "none";
  handle.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    row.setPointerCapture(e.pointerId);
    row.style.position = "relative";
    row.style.zIndex = "10";
    row.style.boxShadow = "var(--shadow)";
    row.style.transition = "none";
    row.style.background = "var(--card-hi)";
    row.style.borderRadius = "var(--radius-sm)";
    let startY = e.clientY;

    const onMove = (moveEvent) => {
      const deltaY = moveEvent.clientY - startY;
      row.style.transform = `translateY(${deltaY}px)`;

      const prev = row.previousElementSibling;
      const next = row.nextElementSibling;
      const rowRect = row.getBoundingClientRect();

      if (prev) {
        const prevRect = prev.getBoundingClientRect();
        if (rowRect.top < prevRect.top + prevRect.height / 2) {
          container.insertBefore(row, prev);
          startY = moveEvent.clientY;
          row.style.transform = "translateY(0px)";
        }
      }
      if (next) {
        const nextRect = next.getBoundingClientRect();
        if (rowRect.bottom > nextRect.top + nextRect.height / 2) {
          container.insertBefore(row, next.nextSibling);
          startY = moveEvent.clientY;
          row.style.transform = "translateY(0px)";
        }
      }
    };

    const onUp = () => {
      row.style.transform = "";
      row.style.position = "";
      row.style.zIndex = "";
      row.style.boxShadow = "";
      row.style.transition = "";
      row.style.background = "";
      window.removeEventListener("pointermove", onMove);
      window.removeEventListener("pointerup", onUp);
    };

    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);
  });
}

// ---------- PEPTIDE TRACKER ----------
const INJECTION_SITES = ["Abdomen L", "Abdomen R", "Thigh L", "Thigh R", "Glute L", "Glute R", "Love Handle L", "Love Handle R"];
// Hard restrictions, not just avoidance. GHK-Cu and Tesamorelin are
// locked to glute only, per Ale's protocol and tolerance, these two are
// harsh enough that the glute handles them best. Ipamorelin isn't harsh
// enough to need that, so it rotates freely. Anything not listed here
// (Retatrutide, custom peptides) rotates freely across the full site pool.
const SITE_RESTRICTIONS = {
  ghk: ["Glute L", "Glute R"],
  tesa: ["Glute L", "Glute R"],
};

function getEligibleSites(peptideId) {
  return SITE_RESTRICTIONS[peptideId] || INJECTION_SITES;
}

// Suggests the eligible site that's gone longest without use (or never used).
function getSuggestedSite(peptideId, date) {
  const eligible = getEligibleSites(peptideId);
  const siteLog = (peptideLog.sites || {})[peptideId] || {};
  const lastUsedKey = {};
  Object.keys(siteLog).sort().forEach(key => {
    lastUsedKey[siteLog[key]] = key;
  });

  // If another peptide sharing this same site pool already used a site
  // today, steer away from it, two separate injections shouldn't stack
  // in the exact same spot on the same day just because each rotation
  // was computed in isolation.
  const usedTodayByOthers = new Set();
  if (date) {
    peptides.forEach(p => {
      if (p.id === peptideId) return;
      const otherEligible = getEligibleSites(p.id);
      if (!otherEligible.some(s => eligible.includes(s))) return;
      const otherSiteLog = (peptideLog.sites || {})[p.id] || {};
      Object.keys(otherSiteLog).forEach(key => {
        if (key.startsWith(date)) usedTodayByOthers.add(otherSiteLog[key]);
      });
    });
  }
  const preferred = eligible.filter(s => !usedTodayByOthers.has(s));
  const pool = preferred.length ? preferred : eligible;

  let best = pool[0];
  let bestKey = lastUsedKey[best] || "";
  pool.forEach(site => {
    const key = lastUsedKey[site] || "";
    if (key < bestKey) { best = site; bestKey = key; }
  });
  return best;
}

function parseUTC(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  return Date.UTC(y, m - 1, d);
}
function dayDiff(startStr, dateStr) {
  return Math.round((parseUTC(dateStr) - parseUTC(startStr)) / 86400000);
}
function addDays(dateStr, n) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const dt = new Date(Date.UTC(y, m - 1, d));
  dt.setUTCDate(dt.getUTCDate() + n);
  return dt.toISOString().slice(0, 10);
}
function mondayOffset(dateStr) {
  const [y, m, d] = dateStr.split("-").map(Number);
  const wd = new Date(Date.UTC(y, m - 1, d)).getUTCDay(); // Sun=0..Sat=6
  return (wd + 6) % 7; // Mon=0..Sun=6
}
function buildGridDates(weeks) {
  const today = todayStr();
  const mondayThisWeek = addDays(today, -mondayOffset(today));
  const gridStart = addDays(mondayThisWeek, -7 * (weeks - 1));
  const dates = [];
  for (let i = 0; i < weeks * 7; i++) dates.push(addDays(gridStart, i));
  return dates;
}

}

function getPeptideStatus(p, dateStr) {
  const diff = dayDiff(p.start, dateStr);
  if (diff < 0) return { state: "not-started" };
  if (p.pattern === "daily") return { state: "due", dayNum: diff + 1 };
  if (p.pattern === "daily-finite") {
    if (diff >= p.cycleDays) return { state: "complete", dayNum: p.cycleDays };
    return { state: "due", dayNum: diff + 1, totalDays: p.cycleDays };
  }
  if (p.pattern === "weekly") {
    const dayNum = Math.floor(diff / 7) + 1;
    if (diff % 7 === 0) return { state: "due", dayNum };
    return { state: "off", dayNum, daysUntil: 7 - (diff % 7) };
  }
  if (p.pattern === "5on2off") {
    const cyclePos = diff % 7;
    const cycleNum = Math.floor(diff / 7) + 1;
    if (cyclePos < 5) return { state: "due", dayNum: cyclePos + 1, cycleNum, onOff: "on" };
    return { state: "off", dayNum: cyclePos - 4, cycleNum, onOff: "off" };
  }
  return { state: "due" };
}

async function loadPeptideLog() {
  try {
    const value = localStorage.getItem(PEPTIDE_KEY);

    peptideLog = value ? JSON.parse(value) : { taken: {}, times: {}, sites: {} };

  if (!peptideLog.times) peptideLog.times = {};
  if (!peptideLog.sites) peptideLog.sites = {};
}

}

function estimateDaysRemaining(p, remaining) {
  let perWeekUnits;
  if (p.twiceDaily) perWeekUnits = (p.unitsPerDoseAM + p.unitsPerDosePM) * 7;
  else if (p.pattern === "weekly") perWeekUnits = p.unitsPerDose;
  else if (p.pattern === "5on2off") perWeekUnits = p.unitsPerDose * 5;
  else perWeekUnits = p.unitsPerDose * 7; // daily / daily-finite
  if (!perWeekUnits) return null;
  return Math.round((remaining / perWeekUnits) * 7);
}

function getVialRemaining(p) {
  const startDate = vialTracker[p.id] ? vialTracker[p.id].startDate : p.start;
  let used = 0;
  (peptideLog.taken[p.id] || []).forEach(key => {
    const date = key.split("_")[0];
    if (date < startDate) return;
    if (p.twiceDaily) {
      if (key.endsWith("_AM")) used += p.unitsPerDoseAM;
      else if (key.endsWith("_PM")) used += p.unitsPerDosePM;
    } else {
      used += p.unitsPerDose;
    }
  });
  return { remaining: Math.max(0, p.vialUnits - used), total: p.vialUnits, used };
}

function getWeeklyAdherence(p) {
  const today = todayStr();
  let due = 0, taken = 0;
  for (let i = 0; i < 7; i++) {
    const d = addDaysLocal(today, -i);
    const status = getPeptideStatus(p, d);
    if (status.state !== "due") continue;
    due++;
    if (p.twiceDaily) {
      const amDone = (peptideLog.taken[p.id] || []).includes(d + "_AM");
      const pmDone = (peptideLog.taken[p.id] || []).includes(d + "_PM");
      if (amDone && pmDone) taken++;
    } else {
      if ((peptideLog.taken[p.id] || []).includes(d)) taken++;
    }
  }
  return { due, taken };
}

function computeStreak() {
  let d = todayStr();
  let streak = 0;
  let firstDay = true;
  while (true) {
    let dueCount = 0, takenCount = 0;
    peptides.forEach(p => {
      const status = getPeptideStatus(p, d);
      if (status.state === "due") {
        dueCount++;
        const done = p.twiceDaily
          ? (peptideLog.taken[p.id] || []).includes(d + "_AM") && (peptideLog.taken[p.id] || []).includes(d + "_PM")
          : (peptideLog.taken[p.id] || []).includes(d);
        if (done) takenCount++;
      }
    });
    const complete = dueCount === 0 || takenCount === dueCount;
    if (!complete) {
      if (firstDay) { firstDay = false; d = addDaysLocal(d, -1); continue; }
      break;
    }
    if (dueCount > 0) streak++;
    firstDay = false;
    d = addDaysLocal(d, -1);
    if (streak > 365) break;
    if (!peptides.some(p => d >= p.start)) break;
  }
  return streak;
}

function getDosesTodayStat() {
  const today = todayStr();
  let due = 0, taken = 0;
  peptides.forEach(p => {
    const status = getPeptideStatus(p, today);
    if (status.state !== "due") return;
    due++;
    const done = p.twiceDaily
      ? (peptideLog.taken[p.id] || []).includes(today + "_AM") && (peptideLog.taken[p.id] || []).includes(today + "_PM")
      : (peptideLog.taken[p.id] || []).includes(today);
    if (done) taken++;
  });
  return { due, taken };
}

    const takenToday = p.twiceDaily ? (takenAM && takenPM) : (peptideLog.taken[p.id] || []).includes(today);

    const card = document.createElement("div");
    card.className = "pep-card";

    let pillHtml = "";
    let subText = "";
    if (status.state === "not-started") {
      pillHtml = `<span class="pill off">Not started</span>`;
      subText = `Starts ${p.start}`;
    } else if (status.state === "complete") {
      pillHtml = `<span class="pill done">Cycle complete</span>`;
      subText = `Finished day ${status.dayNum} of ${p.cycleDays}`;
    } else if (status.state === "off") {
      pillHtml = `<span class="pill off">Off today</span>`;
      subText = p.pattern === "5on2off"
        ? `Off day ${status.dayNum} of 2 &middot; cycle ${status.cycleNum}`
        : `Next dose in ${status.daysUntil} day${status.daysUntil === 1 ? "" : "s"}`;
    } else if (p.twiceDaily) {
      const amTime = (peptideLog.times[p.id] || {})[today + "_AM"];
      const pmTime = (peptideLog.times[p.id] || {})[today + "_PM"];
      pillHtml = takenToday
        ? `<span class="pill taken">Both doses taken</span>`
        : (takenAM || takenPM)
          ? `<span class="pill taken">1 of 2 taken</span>`
          : `<span class="pill due">Due today</span>`;
      const timeBits = [];
      if (takenAM) timeBits.push("AM" + (amTime ? " " + amTime : ""));
      if (takenPM) timeBits.push("PM" + (pmTime ? " " + pmTime : ""));
      subText = `Day ${status.dayNum}` + (timeBits.length ? ` &middot; ${timeBits.join(", ")}` : "");
    } else if (takenToday) {
      const takenTime = (peptideLog.times[p.id] || {})[today];
      pillHtml = `<span class="pill taken">Taken today${takenTime ? " &middot; " + takenTime : ""}</span>`;
      subText = p.pattern === "daily-finite" ? `Day ${status.dayNum} of ${p.cycleDays}`
        : p.pattern === "5on2off" ? `On day ${status.dayNum} of 5 &middot; cycle ${status.cycleNum}`
        : p.pattern === "weekly" ? `Week ${status.dayNum}`
        : `Day ${status.dayNum}`;
    } else {
      pillHtml = `<span class="pill due">Due today</span>`;
      subText = p.pattern === "daily-finite" ? `Day ${status.dayNum} of ${p.cycleDays}`
        : p.pattern === "5on2off" ? `On day ${status.dayNum} of 5 &middot; cycle ${status.cycleNum}`
        : p.pattern === "weekly" ? `Week ${status.dayNum}`
        : `Day ${status.dayNum}`;
    }

    const adherence = getWeeklyAdherence(p);

    card.innerHTML = `
      <div class="pep-top">
        <div>
          <div class="pep-name" style="color:${p.color}; display:flex; align-items:center; gap:6px;"><span style="display:inline-flex;">${ICONS.syringe}</span>${p.name}</div>
          <div class="pep-sub">${p.dose} &middot; ${subText}</div>
          <div class="pep-sub" style="margin-top:2px;">This week: ${adherence.taken}/${adherence.due} due days hit</div>
        </div>
        ${pillHtml}
      </div>
    `;

    if (status.state === "due" && p.twiceDaily) {
      const actions = document.createElement("div");
      actions.className = "pep-actions";
      actions.style.flexWrap = "wrap";
      const suggestedSite = getSuggestedSite(p.id, today);
      const siteOptions = getEligibleSites(p.id).map(s => `<option value="${s}" ${s === suggestedSite ? 'selected' : ''}>${s}${s === suggestedSite ? ' (suggested)' : ''}</option>`).join("");
      actions.innerHTML = `
        <input type="time" class="pep-time-input" value="${nowTimeStr()}" style="flex:1; min-width:100px; background: var(--card-hi); border: 1px solid var(--line); border-radius: 12px; color: var(--text); padding: 9px 8px; font-size: 13px;">
        <select class="pep-site-input" style="flex:1; min-width:130px; background: var(--card-hi); border: 1px solid var(--line); border-radius: 12px; color: var(--text); padding: 9px 8px; font-size: 13px;">${siteOptions}</select>
        <button class="pep-btn ${takenAM ? 'done-btn' : ''}" data-slot="AM">${takenAM ? 'AM done' : 'Mark AM'}</button>
        <button class="pep-btn ${takenPM ? 'done-btn' : ''}" data-slot="PM">${takenPM ? 'PM done' : 'Mark PM'}</button>
      `;
      const timeInput = actions.querySelector(".pep-time-input");
      const siteInput = actions.querySelector(".pep-site-input");
      actions.querySelectorAll("button").forEach(btn => {
        btn.onclick = async () => {
          const key = today + "_" + btn.dataset.slot;
          if (!peptideLog.taken[p.id]) peptideLog.taken[p.id] = [];
          if (!peptideLog.times[p.id]) peptideLog.times[p.id] = {};
          if (!peptideLog.sites) peptideLog.sites = {};
          if (!peptideLog.sites[p.id]) peptideLog.sites[p.id] = {};
          const idx = peptideLog.taken[p.id].indexOf(key);
          if (idx >= 0) {
            peptideLog.taken[p.id].splice(idx, 1);
            delete peptideLog.times[p.id][key];
            delete peptideLog.sites[p.id][key];
          } else {
            peptideLog.taken[p.id].push(key);
            peptideLog.times[p.id][key] = timeInput.value || nowTimeStr();
            peptideLog.sites[p.id][key] = siteInput.value;
          }
          await savePeptideLog();
          renderPeptideView();
        };
      });
      card.appendChild(actions);
    } else if (status.state === "due" || status.state === "off") {
      const actions = document.createElement("div");
      actions.className = "pep-actions";
      actions.style.flexWrap = "wrap";
      const canToggle = status.state === "due";
      const suggestedSite = getSuggestedSite(p.id, today);
      const siteOptions = getEligibleSites(p.id).map(s => `<option value="${s}" ${s === suggestedSite ? 'selected' : ''}>${s}${s === suggestedSite ? ' (suggested)' : ''}</option>`).join("");
      actions.innerHTML = `
        ${canToggle ? `<input type="time" class="pep-time-input" value="${nowTimeStr()}" style="flex:1; min-width:100px; background: var(--card-hi); border: 1px solid var(--line); border-radius: 12px; color: var(--text); padding: 9px 8px; font-size: 13px;">` : ''}
        ${canToggle ? `<select class="pep-site-input" style="flex:1; min-width:130px; background: var(--card-hi); border: 1px solid var(--line); border-radius: 12px; color: var(--text); padding: 9px 8px; font-size: 13px;">${siteOptions}</select>` : ''}
        <button class="pep-btn ${takenToday ? 'done-btn' : ''}" ${canToggle ? '' : 'disabled style="opacity:0.4"'}>${takenToday ? 'Mark not taken' : 'Mark taken'}</button>
      `;
      if (canToggle) {
        const timeInput = actions.querySelector(".pep-time-input");
        const siteInput = actions.querySelector(".pep-site-input");
        actions.querySelector("button").onclick = async () => {
          if (!peptideLog.taken[p.id]) peptideLog.taken[p.id] = [];
          if (!peptideLog.times[p.id]) peptideLog.times[p.id] = {};
          if (!peptideLog.sites) peptideLog.sites = {};
          if (!peptideLog.sites[p.id]) peptideLog.sites[p.id] = {};
          const idx = peptideLog.taken[p.id].indexOf(today);
          if (idx >= 0) {
            peptideLog.taken[p.id].splice(idx, 1);
            delete peptideLog.times[p.id][today];
            delete peptideLog.sites[p.id][today];
          } else {
            peptideLog.taken[p.id].push(today);
            peptideLog.times[p.id][today] = timeInput.value || nowTimeStr();
            peptideLog.sites[p.id][today] = siteInput.value;
          }
          await savePeptideLog();
          renderPeptideView();
        };
      }
      card.appendChild(actions);
    }

    const dotsWrap = document.createElement("div");
    dotsWrap.className = "dots";
    const gridDates = buildGridDates(3);
    const realToday = todayStr();
    gridDates.forEach(d => {
      const dStatus = getPeptideStatus(p, d);
      const dot = document.createElement("div");
      let cls = "dot";
      if (dStatus.state !== "due") {
        cls += " na";
      } else if (p.twiceDaily) {
        const amDone = (peptideLog.taken[p.id] || []).includes(d + "_AM");
        const pmDone = (peptideLog.taken[p.id] || []).includes(d + "_PM");
        if (amDone && pmDone) cls += " taken";
        else if (amDone || pmDone) cls += " partial";
      } else {
        const wasTaken = (peptideLog.taken[p.id] || []).includes(d);
        if (wasTaken) cls += " taken";
      }
      dot.className = cls;
      dot.title = d;
      dot.textContent = String(parseInt(d.split("-")[2], 10));
      dot.style.display = "flex";
      dot.style.alignItems = "center";
      dot.style.justifyContent = "center";
      dot.style.fontSize = "9px";
      dot.style.fontWeight = "700";
      dot.style.color = cls.includes("taken") ? "#0a0e12" : "var(--sub)";
      if (d === realToday) {
        dot.style.outline = "2px solid var(--gold)";
        dot.style.outlineOffset = "1px";
      }
      dotsWrap.appendChild(dot);
    });
    card.appendChild(dotsWrap);

    const vial = getVialRemaining(p);
    const vialPct = Math.round((vial.remaining / vial.total) * 100);
    const vialColor = vialPct > 30 ? "var(--pull)" : vialPct > 10 ? "var(--gold)" : "var(--legs)";
    const daysLeft = estimateDaysRemaining(p, vial.remaining);
    const vialWrap = document.createElement("div");
    vialWrap.style.cssText = "margin-top:14px; padding-top:14px; border-top:1px solid var(--line);";
    vialWrap.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:baseline;">
        <span class="eyebrow">Vial</span>
        <span style="font-size:12.5px; font-weight:700; color:${vialColor};">${vial.remaining}/${vial.total} units &middot; ${vialPct}%</span>
      </div>
      <div class="thin-bar"><div class="thin-bar-fill" style="width:${vialPct}%; background:${vialColor};"></div></div>
      ${vialPct <= 30 ? `<div style="color:${vialColor}; font-size:11px; font-weight:700; margin-top:8px;">${vialPct <= 10 ? 'Critically low' : 'Getting low'}${daysLeft !== null ? ` &middot; ~${daysLeft} day${daysLeft === 1 ? '' : 's'} left at current pace` : ''}, reorder soon</div>` : ''}
    `;
    const newVialBtn = document.createElement("button");
    newVialBtn.textContent = "Start New Vial";
    newVialBtn.style.cssText = "width:100%; margin-top:10px; background:var(--card-hi); border:none; color:var(--sub); border-radius:12px; padding:9px; font-weight:700; font-size:11.5px;";
    newVialBtn.onclick = () => {
      showConfirmModal(`Mixed a new ${p.name} vial today? This resets the tracker to ${p.vialUnits} units remaining.`, "Start New Vial", () => {
        vialTracker[p.id] = { startDate: todayStr() };
        saveVialTracker();
        showToast("New vial started");
        renderPeptideView();
      });
    };
    vialWrap.appendChild(newVialBtn);
    card.appendChild(vialWrap);

    const allTaken = (peptideLog.taken[p.id] || []).slice().sort().reverse();
    if (allTaken.length) {
      const expand = document.createElement("div");
      expand.className = "expand";
      expand.style.marginTop = "10px";
      allTaken.forEach(key => {
        const [dateStr, slot] = key.split("_");
        const time = (peptideLog.times[p.id] || {})[key];
        const site = (peptideLog.sites[p.id] || {})[key];
        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML = `<span>${dateStr}${slot ? ' &middot; ' + slot : ''}${time ? ' &middot; ' + time : ''}${site ? ' &middot; ' + site : ''}</span><span class="del"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-8 0 1 13a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-13"/></svg></span>`;
        row.querySelector(".del").onclick = (ev) => {
          ev.stopPropagation();
          showConfirmModal(`Delete this ${p.name} dose log (${dateStr}${slot ? ' ' + slot : ''})? This can't be undone.`, "Delete", async () => {
            peptideLog.taken[p.id] = peptideLog.taken[p.id].filter(k => k !== key);
            if (peptideLog.times[p.id]) delete peptideLog.times[p.id][key];
            if (peptideLog.sites[p.id]) delete peptideLog.sites[p.id][key];
            await savePeptideLog();
            renderPeptideView();
          });
        };
        expand.appendChild(row);
      });
      card.appendChild(expand);
      const chevronEl = document.createElement("div");
      chevronEl.style.cssText = "color:var(--sub-dim); transition:transform 0.25s ease; margin-top:2px;";
      chevronEl.innerHTML = ICONS.chevron;
      card.querySelector(".pep-top").appendChild(chevronEl);
      card.querySelector(".pep-top").style.cursor = "pointer";
      card.querySelector(".pep-top").onclick = () => {
        expand.classList.toggle("open");
        chevronEl.style.transform = expand.classList.contains("open") ? "rotate(180deg)" : "rotate(0deg)";
      };
    }

    wrap.appendChild(card);
  });
}

// ---------- DATA VIEW (grouped, tap-to-expand history + chart) ----------
let currentDataType = "push";
let expandedExercise = null;
let expandedMeasurement = null;

const MEASUREMENT_TYPES = ["Weight", "Waist", "Chest", "Arms", "Thighs", "Hips", "Body Fat %"];
const MEASUREMENT_UNITS = { "Weight": "lbs", "Waist": "in", "Chest": "in", "Arms": "in", "Thighs": "in", "Hips": "in", "Body Fat %": "%" };
const MEASUREMENTS_KEY = "ale-measurements-v1";
let measurements = [];

function loadMeasurements() {
  try {
    measurements = JSON.parse(localStorage.getItem(MEASUREMENTS_KEY) || "[]");
  } catch (e) {
    measurements = [];
  }
}
function saveMeasurements() {
  localStorage.setItem(MEASUREMENTS_KEY, JSON.stringify(measurements));
}
function getMeasurementEntries(type) {
  return measurements.filter(m => m.type === type).sort((a, b) => b.date.localeCompare(a.date));
}
function getLatestBodyweight() {
  const entries = getMeasurementEntries("Weight");
  return entries.length ? entries[0].value : null;
}
function formatWeightDisplay(entry) {
  if (entry.bodyweight) {
    return entry.addedWeight ? `BW+${entry.addedWeight}` : "BW";
  }
  return String(entry.weight);
}
function daysSinceLastMeasurement() {
  if (!measurements.length) return null;
  const latest = measurements.reduce((max, m) => m.date > max ? m.date : max, measurements[0].date);
  return Math.round((parseUTC(todayStr()) - parseUTC(latest)) / 86400000);
}

function buildMeasurementChartHtml(entriesDesc, unit) {
  const entries = entriesDesc.slice().sort((a, b) => a.date.localeCompare(b.date));
  const latest = entries[entries.length - 1];
  const first = entries[0];
  const change = latest.value - first.value;
  const w = 300, h = 120, pad = 10;
  const values = entries.map(e => e.value);
  const minV = Math.min(...values) * 0.97;
  const maxV = Math.max(...values) * 1.03;
  const range = maxV - minV || 1;
  const points = entries.map((e, i) => {
    const x = pad + (i / Math.max(entries.length - 1, 1)) * (w - pad * 2);
    const y = h - pad - ((e.value - minV) / range) * (h - pad * 2);
    return [x, y];
  });
  const pathD = points.map((pt, i) => (i === 0 ? "M" : "L") + pt[0].toFixed(1) + "," + pt[1].toFixed(1)).join(" ");
  const dotsSvg = points.map(pt => `<circle cx="${pt[0].toFixed(1)}" cy="${pt[1].toFixed(1)}" r="3" fill="#2f8fff"/>`).join("");
  const changeColor = change === 0 ? "var(--sub)" : "var(--gold)";
  return `
    <div class="chart-card">
      <div class="chart-stats">
        <div><div class="chart-stat-label">Latest</div><div class="chart-stat-val">${latest.value}${unit}</div></div>
        <div><div class="chart-stat-label">Change</div><div class="chart-stat-val" style="color:${changeColor}">${change > 0 ? '+' : ''}${change.toFixed(1)}${unit}</div></div>
        <div><div class="chart-stat-label">Entries</div><div class="chart-stat-val">${entries.length}</div></div>
      </div>
      <svg viewBox="0 0 ${w} ${h}" style="width:100%; height:120px; overflow:visible;">
        <path d="${pathD}" fill="none" stroke="#2f8fff" stroke-width="2"/>
        ${dotsSvg}
      </svg>
    </div>
  `;
}

    head.onclick = () => { expandedMeasurement = expandedMeasurement === type ? null : type; renderBodyView(list); };
    card.appendChild(head);

    if (expandedMeasurement === type && entries.length) {
      const chartDiv = document.createElement("div");
      chartDiv.style.padding = "0 14px 14px";
      chartDiv.innerHTML = buildMeasurementChartHtml(entries, unit);
      card.appendChild(chartDiv);

      const expand = document.createElement("div");
      expand.className = "expand open";
      entries.forEach(e => {
        const row = document.createElement("div");
        row.className = "entry-row";
        row.innerHTML = `<span>${e.date} &middot; ${e.value}${unit}</span><span class="del"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px; margin-right:3px;"><path d="M4 7h16M9 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2m-8 0 1 13a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-13"/></svg></span>`;
        row.querySelector(".del").onclick = (ev) => {
          ev.stopPropagation();
          showConfirmModal(`Delete this entry (${e.date}, ${e.value}${unit})? This can't be undone.`, "Delete", () => {
            measurements = measurements.filter(m => m.id !== e.id);
            saveMeasurements();
            renderBodyView(list);

      card.appendChild(expand);
    }

    list.appendChild(card);
  });
}

// ---------- AUTO-RPE ENGINE ----------
// Epley formula estimates a 1RM assuming the set was taken to true failure
// (0 reps in reserve). Comparing a new set's estimated 1RM against a recent
// known baseline tells us how far from failure it probably was, which maps
// to RPE. This is an estimate, not a lab measurement, and needs at least
// one prior logged session on that exercise to work. Accuracy is best in
// the 3-8 rep zone; above ~12 reps the load-to-reps relationship gets
// meaningfully less predictable (this is a known limitation in the
// research, not just this app), so treat high-rep RPE numbers loosely.
function epley1RM(weight, reps) {
  return weight * (1 + reps / 30);
}

// Below this logged weight, percentage-based math breaks down (e.g.
// bodyweight exercises logged with a placeholder weight like "1"). RPE
// estimation is skipped entirely for sets under this threshold.
const RPE_MIN_WEIGHT = 10;

// Real %1RM drop per rep-in-reserve isn't linear, it accelerates the
// further you get from failure (RPE9=96%, RPE8=92%, RPE7=86%, per
// Zourdos et al. 2016 / RTS chart). Cumulative % drop from 100% at RIR 0..6:
const RIR_PCT_DROPS = [0, 4, 8, 14, 22, 30, 38];

function pctDropToRIR(dropPct) {
  for (let i = 0; i < RIR_PCT_DROPS.length - 1; i++) {
    if (dropPct <= RIR_PCT_DROPS[i + 1]) {
      const frac = (dropPct - RIR_PCT_DROPS[i]) / (RIR_PCT_DROPS[i + 1] - RIR_PCT_DROPS[i]);
      return i + frac;
    }
  }
  return RIR_PCT_DROPS.length - 1;
}

// Picks the set that best represents a session's real performance for
// progression purposes. If a rep-range target exists, this prefers the
// heaviest set that actually reached the floor of that range, ignoring
// heavier "miss" attempts that came up short on reps, since a heavy set
// you back off from isn't the set that should drive next session's plan.
// Ties on weight break toward more reps. Falls back to highest-reps set
// if nothing hit the floor, and to heaviest-weight if there's no target
// range configured for the exercise.
function pickRepresentativeSet(sets, range) {
  if (!sets.length) return null;
  const byWeightThenReps = (max, s) =>
    (s.weight > max.weight || (s.weight === max.weight && (s.reps || 0) > (max.reps || 0))) ? s : max;
  if (!range) {
    return sets.reduce(byWeightThenReps, sets[0]);
  }
  const [lo] = range;
  const qualifying = sets.filter(s => s.reps && s.reps >= lo);
  if (qualifying.length) {
    return qualifying.reduce(byWeightThenReps, qualifying[0]);
  }
  return sets.reduce((max, s) => (s.reps || 0) > (max.reps || 0) ? s : max, sets[0]);
}

function getCoachTip(name, beforeDate) {
  const range = REP_RANGE_MAP[name];
  if (!range) return null;
  const entries = getExerciseLogs(name);
  const dates = [...new Set(entries.map(e => e.date))].filter(d => d < beforeDate).sort((a, b) => b.localeCompare(a));
  if (!dates.length) return "Log a session or two here and I'll start giving tips.";

  const lastDate = dates[0];
  const lastSets = entries.filter(e => e.date === lastDate);
  const topSet = pickRepresentativeSet(lastSets, range);
  const baselineForLast = getBaseline1RM(name, lastDate);
  const rpeLast = estimateRPE(topSet.weight, topSet.reps, baselineForLast);

  let regressed = false;
  if (dates.length >= 2) {
    const priorSets = entries.filter(e => e.date === dates[1]);
    const priorTop = pickRepresentativeSet(priorSets, range);
    if (priorTop && topSet.reps && priorTop.reps) {
      const currentE1RM = epley1RM(topSet.weight, topSet.reps);
      const priorE1RM = epley1RM(priorTop.weight, priorTop.reps);
      if (currentE1RM < priorE1RM * 0.97) regressed = true; // >3% dip, ignore noise under that
    } else if (priorTop && topSet.weight < priorTop.weight) {
      regressed = true;
    }
  }

  const [lo, hi] = range;
  if (regressed) {
    return "Dropped from the session before that, hold here and check sleep/food before pushing more.";
  }
  if (topSet.reps && topSet.reps >= hi) {
    if (rpeLast !== null && rpeLast >= 9) {
      return `Topped your rep range last time at a hard effort (est. RPE ${rpeLast}). Hold this weight one more session.`;
    }
    return `Topped your rep range last time. Try adding weight this session.`;
  }
  if (topSet.reps && topSet.reps < lo) {
    return `Came in under range last time (${topSet.reps} reps). Hold weight, aim for ${lo}+.`;
  }
  return `In range last time. Build toward ${hi} reps before adding weight.`;
}

function getBaseline1RM(name, beforeDate) {
  const windowStart = addDaysLocal(beforeDate, -60);
  const priorSets = logs.filter(l => l.exercise === name && l.date < beforeDate && l.date >= windowStart && l.reps && l.weight >= RPE_MIN_WEIGHT);
  if (!priorSets.length) return null;
  return Math.max(...priorSets.map(s => epley1RM(s.weight, s.reps)));
}

function estimateRPE(weight, reps, baseline1RM) {
  if (!baseline1RM || !reps || weight < RPE_MIN_WEIGHT) return null;
  const setE1RM = epley1RM(weight, reps);
  const gapPct = ((baseline1RM - setE1RM) / baseline1RM) * 100;
  const rir = pctDropToRIR(Math.max(0, gapPct));
  const rpe = Math.round((10 - rir) * 2) / 2; // nearest 0.5
  return Math.max(1, Math.min(10, rpe));
}

function getTrendArrow(name) {
  const entries = getExerciseLogs(name); // newest first
  const dates = [...new Set(entries.map(e => e.date))];
  if (dates.length < 2) return null;
  const range = REP_RANGE_MAP[name];
  const e1RMOnDate = d => {
    const rep = pickRepresentativeSet(entries.filter(e => e.date === d), range);
    return rep && rep.reps ? epley1RM(rep.weight, rep.reps) : (rep ? rep.weight : 0);
  };
  const latest = e1RMOnDate(dates[0]);
  const prior = e1RMOnDate(dates[1]);
  if (latest > prior * 1.01) return { arrow: "▲", color: "var(--pull)" };
  if (latest < prior * 0.99) return { arrow: "▼", color: "var(--legs)" };
  return { arrow: "▬", color: "var(--sub)" };
}

// For a muscle group under its weekly floor, points to a specific active
// exercise and day already in the routine, add a set there rather than
// restructuring anything. Never invents a new exercise or day.
function getVolumeSuggestion(muscle) {
  for (const [day, info] of Object.entries(activeDays)) {
    for (const ex of info.exercises) {
      if (MUSCLE_MAP[ex] === muscle) {
        return `Add a set to ${ex} on ${day} to close the gap.`;
      }
    }
  }
  return null;
}

function renderMuscleGroupView(list) {
  list.innerHTML = "";

  const note = document.createElement("div");
  note.style.cssText = "color:var(--sub); font-size:11px; margin-bottom:14px; line-height:1.5;";
  note.textContent = "Working sets logged in the trailing 7 days per muscle group. Research range for growth is roughly 8-20 sets/week.";
  list.appendChild(note);

  const sevenDaysAgo = addDaysLocal(todayStr(), -6);
  const counts = {};
  logs.forEach(l => {
    if (l.date < sevenDaysAgo) return;
    const muscle = MUSCLE_MAP[l.exercise];
    if (!muscle) return;
    counts[muscle] = (counts[muscle] || 0) + 1;
  });

  const allMuscles = [...new Set(Object.values(MUSCLE_MAP))];
  const wrap = document.createElement("div");
  wrap.className = "hero-card";
  wrap.style.padding = "6px 16px";

  allMuscles.forEach(muscle => {
    const count = counts[muscle] || 0;
    const inRange = count >= VOLUME_LANDMARKS.low && count <= VOLUME_LANDMARKS.high;
    const ringColor = count === 0 ? "var(--sub-dim)" : inRange ? "var(--pull)" : count < VOLUME_LANDMARKS.low ? "var(--legs)" : "var(--gold)";
    const label = count === 0 ? "No sets" : inRange ? "In range" : count < VOLUME_LANDMARKS.low ? "Below range" : "Above range";
    const belowRange = count < VOLUME_LANDMARKS.low;
    const suggestion = belowRange ? getVolumeSuggestion(muscle) : null;

    // Ring progress caps visually at the top of the healthy range, so a
    // full ring means "in range," not "as much volume as physically possible."
    const pct = Math.min(1, count / VOLUME_LANDMARKS.high);
    const r = 16, circ = 2 * Math.PI * r;
    const offset = circ * (1 - pct);

    const row = document.createElement("div");
    row.className = "list-row";
    row.innerHTML = `
      <div style="display:flex; align-items:center; gap:12px; flex:1; min-width:0;">
        <svg viewBox="0 0 40 40" width="40" height="40" style="flex-shrink:0;">
          <circle cx="20" cy="20" r="${r}" fill="none" stroke="var(--card-hi)" stroke-width="4"/>
          <circle cx="20" cy="20" r="${r}" fill="none" stroke="${ringColor}" stroke-width="4"
            stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
            transform="rotate(-90 20 20)" style="transition: stroke-dashoffset 0.5s ease;"/>
        </svg>
        <div style="min-width:0;">
          <div class="list-row-title">${muscle}</div>
          ${suggestion ? `<div class="list-row-sub" style="line-height:1.4;">💡 ${suggestion}</div>` : `<div class="list-row-sub" style="color:${ringColor};">${label}</div>`}
        </div>
      </div>
      <div style="text-align:right; flex-shrink:0; margin-left:10px;">
        <div style="font-size:15px; font-weight:800;">${count}</div>
        <div style="font-size:9px; color:var(--sub-dim); text-transform:uppercase; letter-spacing:0.03em;">sets</div>
      </div>
    `;
    wrap.appendChild(row);
  });

  list.appendChild(wrap);
}

    const card = document.createElement("div");

    const isOpen = expandedExercise === name;
    const head = document.createElement("div");
    head.className = "ex-head";

    head.innerHTML = `
      <div style="display:flex; align-items:flex-start; gap:8px; flex:1;">

          <div class="ex-name">${name}${isRetired ? ' <span style="color:var(--sub); font-weight:600; font-size:10.5px;">(not in current routine)</span>' : ''}</div>
          <div class="ex-hint">${entries.length ? entries.length + ' session' + (entries.length === 1 ? '' : 's') + ' &middot; last ' + entries[0].date : 'No entries yet'}</div>
